배기구에 더 많이 관여할 수 있는 근거를 제공한다","KAM 목적"],[19,"진","공계변별","핵심감사사항 커뮤니케이션이 제공하지 않는 것\n701-4 공계변별\n① 해당 재무보고체계에서 경영진에게 작성하도록 요구하거나 또는 공정한 표시를 달성하기 위해 필요한 재무제표 공시를 대체\n② 계속기업으로서의 존속능력에 대하여 유의적 의문을 불러일으킬 수 있는 사건이나 상황과 관련한 중요한 불확실성이 존재하는 경우 감사기준서상 \"계속기업에 대한 보고\"를 대체\n③ 특정 감사업무의 상황에서 요구되는 경우 감사인의 변형의견 표명을 대체\n④ 개별 사항들에 대한 별도 의견","KAM 미제공"],[19,"진","R유판사","유의적감사인주의를 요구한 사항 결정 시 고려사항\n701-9 R유판사\n① 중요왜곡표시위험(RMM)이 더 높게 평가되거나 유의적 위험으로 식별된 분야\n② 추정불확실성이 높은 것으로 식별된 회계추정치를 포함하여, 유의적경영진판단이 수반된 재무제표 분야와 관련되는 유의적감사인판단\n③ 보고기간 중 발생한 유의적인 사건이나 거래가 감사에 미치는 영향","주의 결정"],[19,"진","지중회필통","가장 유의적인 사항 결정 시 고려사항\n701-10, A27~30\n지중회필통\n① 지배기구와 커뮤니케이션 성격, 범위 및 빈도 등 고려\n② 재무제표에서 해당 사항의 중요성\n③ 경영진의 회계정책 선택에 수반되는 복잡성이나 주관성\n④ 해당 사항을 다루기 위해 필요한 감사노력의 성격과 범위\n⑤ 식별된 통제 미비점의 심각성\n⑥ 감사증거를 입수하는데 있어서의 어려움의 성격과 심각성\n⑦ 해당 사항이 다수의 감사 고려사항과 관련되는지 여부","가장 유의적"],[19,"진","공유방 응근 사과주소","핵심감사사항의 보고(개별 핵심감사사항 기술)\n701-13 공유방/응근 사과주소\n감사보고서의 핵심감사사항단락의 각각의 핵심사항에 대한 기술은 재무제표의 관련 공시에 대한 언급을 포함하여야 하고 다음 사항을 다루어야 한다\n① 해당 사항이 감사에서 가장 유의적인 사항 중 하나로 고려되어 핵심감사사항으로 결정된 이유\n② 해당 사항이 감사에서 다루어진 방법\n• 해당 사항에 가장 관련성이 있거나 평가된 중요왜곡표시위험에 특유한 감사인의 대응 및 접근방법\n• 수행된 감사절차의 개략적인 개요\n• 감사절차의 결과에 대한 암시\n• 해당 사항과 관련한 주요 관찰사항 또는 이러한 요소들 중 일부의 결합","개별 KAM"],[19,"진","판사재벌","핵심감사사항의 보고(도입문구)\n701-11 판사재벌\n① 핵심감사사항은 감사인의 전문가적 판단에 따라 [당기] 재무제표감사에서 가장 유의적인 사항임\n② 해당 사항은 재무제표 전체에 대한 감사의 관점에서, 재무제표 전체에 대한 감사의견을 형성할 때 다루어진 사항이며, 감사인은 이 사항에 대하여 별도의 의견을 제공하지 않음","KAM 도입"],[19,"진","법배 부공","핵심감사사항으로 결정된 사항을 감사보고서에 기재하지 않을 수 있는 예외적인 경우\n701-14 법배부공\n① 법규에서 해당 사항에 대한 공시를 배제함\n② 극히 드문 상황에서, 해당 사항을 감사보고서에 커뮤니케이션함으로써 발생할 수 있는 부정적결과가 그러한 커뮤니케이션의 공익적 효익을 훨씬 넘어설 것이라고 합리적으로 예상되기 때\n문에 감사인이 감사보고서에 해당 사항을 커뮤니케이션해서는 안된다고 결정한 사항(단, 기업이 해당 사항에 관한 정보를 공시한 적이 있는 경우에는 동 문단을 적용해서는 안 됨)","KAM 미커뮤"],[19,"진","재이근중","강조사항문단의 정의\n706-7 재이근중\n강조사항문단이란 재무제표에 적절하게 표시되거나 공시되어 있지만, 이용자가 재무제표를 이해하는데 근본이 될 정도로 중요한 사항이라고 판단되어 감사인이 이러한 사항을 언급하는 감사보고서에 포함된 문단","강조사항"],[19,"진","후회재송","강조사항문단을 포함시킬 필요가 있다고 고려할 수 있는 상황[강조사항문단을 포함시킬 필요가 있는지 고려하는 상황]\n706-A5 후회재송\n① 재무제표일과 감사보고서일 사이에 발생한 유의적인 후속사건\n② 재무제표에 중요한 영향을 미치는 새로운 회계기준을 조기적용하는 경우\n③ 해당 기업의 재무상태에 유의적인 영향을 미쳤거나 계속해서 영향을 미치고 있는 주요 재해\n④ 예외적인 소송이나 규제조치의 미래 결과에 대한 불확실성","강조 기재"],[19,"진","감책보관","기타사항문단의 정의\n706-7 감책보관\n기타사항문단이란 재무제표에 표시되거나 공시되지 아니한 사항으로서 이용자가 감사, 감사인의 책임 또는 감사보고서를 이해하는데 관련성이 있다고 판단되어 감사인이 이러한 사항을 언급하는 감사보고서에 포함된 문단","기타사항"],[19,"진","용어공변","감사보고서에 강조사항문단을 포함시키는 경우 준수할 사항\n706-9 목포공변\n① \"강조사항\"이라는 용어를 포함하는 적합한 제목을 가진 감사보고서의 별도의 단락 내에 해당 문단을 포함함\n② 강조할 사항 및 이를 상세하게 기술하고 있는 재무제표의 관련 공시의 위치를 명확하게 언급함. 강조사항문단에서는 재무제표에 표시되거나 공시된 정보만을 언급하여야 함\n③ 강조된 사항과 관련하여 감사의견이 변형되지 않는다는점을 나타냄","강조 준수"],[19,"진","임보 계약 전 복사","기타사항문단으로 포함할 수 있는 예[기타사항문단이 필요할 수 있는 상황]\n706-A9~15 임보 계약 전 불복사\n① 감사인의 책임이나 감사보고서에 대한 이용자의 이해와 관련성이 있는 경우\n② 계속감사시 전기의견의 변경(ISA 710-16)\n③ 감사보고서의 배포나 이용의 제한(제약)\n④ 초도감사 시\n• 전기재무제표를 타감사인이 감사한 경우\n• 전기재무제표가 감사받지 않은 경우\n⑥ 하나 이상(복수)의 재무제표에 대한 보고\n⑦ 감사에 대한 이용자의 이해와 관련성이 있는 경우","기타 기재"],[19,"진","법캠","기타사항에 포함될 조건\n706-10 금핵\n① 기타사항문단을 포함하는 것이 법규상 금지되어 있지 않음\n② 해당사항이 감사보고서에서 커뮤니케이션되어야 하는 핵심감사사항으로 결정되지 않았음","기타 조건"],[19,"진","용어 표공않","감사보고서에 기타사항문단을 포함시키는 경우 준수할 사항\n706-11, A15 목포공구\n① \"기타사항\" 또는 기타 적합한 제목을 가진 별도의 단락 내에 해당 문단을 포함하여야 함\n② 해당 기타사항이 재무제표에 표시 또는 공시가 요구되지 않는다는 점을 명확하게 나타냄","기타 준수"],[19,"진","사실 문안","강조사항 및 기타사항의 기재가 예상되는 경우 지배기구와 커뮤니케이션하여야 하는 사항\n706-12 기상/문안\n① 강조사항이나 기타사항의 기재가 예상된다는 사실\n② 해당문단의 예상문안","예상 커뮤"],[19,"진","일치 필수서 후기","비교표시 전기재무제표에 대한 감사절차(평가할 사항)\n710-7 일치\n① 비교정보에 반영된 회계정책이 당기의 회계정책과 일관성이 있는지, 또는 회계정책의 변경이 있었다면 그러한 변경이 적절히 회계처리되고 적절하게 표시 및 공시되었는지 여부\n② 비교정보가 전기에 표시되었던 금액 및 기타 공시와 일치하는지, 또는 적절한 경우 재작성된 금액 및 기타 공시와 일치하는지 여부\n\n비교표시 전기재무제표에 대한 감사절차(감사절차)\n710-8~9 필수서 후기\n① 당기의 감사를 수행하는 과정에서 비교정보에 대한 중요한 왜곡표시의 가능성을 알게 된 경우, 해당 상황에서 필요한 정도의 추가적인 감사절차를 수행\n② 전기재무제표가 수정되었다면 비교정보가 수정된 재무제표와 일치하는지 여부를 결정하여야 함\n③ 감사의견에서 언급된 모든 기간에 대하여 서면진술을 요구하여야 함. 또한 비교정보에 영향을 미치는 전기재무제표의 중요한 왜곡표시를 수정하기 위해 행해진 재작성에 대하여 구체적인 서면진술을 입수하여야 함\n④ (계속감사시) 후속사건에 대한 감사절차도 준수하여야 함\n⑤ (초도감사시) 기초잔액에 대한 감사절차를 수행","비교표시"],[19,"진","감일유","전임감사인이 제3자에 대해 감사보고서를 재발행한 경우로서, 전기감사보고서의 재발행에 동의하지 않는 경우\n710-17 감일유\n다음 사항을 감사보고서 기타사항문단에 기재\n① 전기재무제표는 전임감사인이 감사하였음\n② 전임감사인의 감사보고서일\n③ 전임감사인이 표명한 의견의 유형, 그리고 해당 의견이 변형되었으면 그 이유","전임 불일치"],[19,"진","경배컴 알","전임감사인이 적정의견 표명한 전기재무제표에 중요한 왜곡표시 존재 시 감사절차\n710-18 경배컴 알\n① 적합한 수준의 경영진, 그리고 지배기구의 모든 구성원이 그 기업의 경영에 참여하고 있지 않는 한 지배기구와 해당 왜곡표시를 커뮤니케이션함\n② 이러한 사실을 전임감사인에게 알리도록 요청함","전기 왜곡"],[19,"진","전전 의유변이 전일","전임감사인이 제3자에 대해 감사보고서를 재발행한 경우로서, 당기감사보고서에 첨부할 전기감사보고서의 재발행에 동의하지 않는 경우\n710-18, A12 감일유 전표\n다음 사항을 감사보고서 기타사항문단에 기재\n① 전기재무제표는 전임감사인이 감사하였음\n② 전임감사인의 감사보고서일\n③ 전임감사인이 표명한 의견의 유형, 그리고 해당 의견이 변형되었으면 그 이유","전임감사인 재발행o 부동의"],[19,"진","전전 의유변이 전일 수의표","전임감사인이 제3자에 대해 감사보고서를 재발행하지 않은 경우로서, 전기감사보고서의 재발행에 동의하지 않는 경우\n710-18, A12 감일유 전표\n다음 사항을 감사보고서 기타사항문단에 기재\n① 전기재무제표는 전임감사인이 감사하였음\n② 전임감사인의 감사보고서일\n③ 전임감사인이 표명한 의견의 유형, 그리고 해당 의견이 변형되었으면 그 이유\n④ 전임감사인은 수정전 전기재무제표에 대하여 의견을 표명했다는 사실","전임감사인이 제3자에 대해 감사보고서를 재발행x 부동의"],[20,"진","목이경","특정목적 재무보고체계의 수용가능성 결정시 이해할 사항\n  1) 해당재무제표가 작성되는 목적\n  2) 의도된 이용자\n  3) 해당 상황에서 해당재무보고체계가 수용될 수 있는지 여부를 결정하기 위해 경영진이 취한 조치","특목 재무보고체계 업무수임시 고려사항"],[21,"진","삼대기증서","인증업무의 구성요소\n개념체계 26 삼대기증서\n① 인증인, 인증대상책임자 및 의도된 이용자로 구성되는 삼자관계\n② 적절한 인증대상\n③ 적합한 준거기준\n④ 충분하고 적합한 증거\n⑤ 합리적 확신업무 또는 제한적 확신업무에 적합한 형태의 서면 인증보고서","인증 5요소"],[21,"진","체감 부규 허접수","그룹감사업무의 조건\n600-A20 체감 부규 허접수\n① 해당 재무보고체계를 명시한다\n② 그룹업무팀과 부문감사인 간의 커뮤니케이션은 법규상 가능한 정도까지 제한 없이 이루어져야 함\n③ 부문감사인, 부문지배기구 및 부문경영진 간의 중요한 커뮤니케이션 내용(부문 내부통제의 유의적 미비점에 관한 커뮤니케이션 포함)은 그룹업무팀에도 커뮤니케이션 되어야 함\n④ 재무보고 사항에 관한 규제기관과 부문 간의 중요한 커뮤니케이션 내용은 그룹업무팀에 커뮤니케이션되어야 함\n⑤ 다음의 사항은 그룹업무팀이 필요하다고 판단하는 정도까지 허용되어야 함\n• 부문정보, 부문지배기구, 부문경영진 및 부문감사인에 대한 접근(그룹업무팀이 원하는 관련 감사문서를 포함함)\n• 부문재무정보에 대한 업무를 그룹업무팀이 수행하거나 부문감사인이 수행하도록 요청함","그룹 조건"],[21,"진","유식충이 충필업관평","수용 및 유지 결정 시 수행절차\n600-12 유식/입관\n① 그룹업무팀은 유의적일 것 같은 부문을 식별하는데 충분하도록 해당 그룹과 부문 및 그 환경을 이해하여야 한다\n② 그룹업무수행이사는 재무제표감사의 품질관리를 할 때 그룹감사의견의 근거가 되는 연결절차 및 부문재무정보에 관한 충분하고 적합한 감사증거가 입수될 수 있을 것으로 합리적으로 기대 가능한지 여부를 결정하여야 한다. 또한, 부문감사인이 그러한 부문의 재무정보에 대한 업무를 수행할 예정인 경우, 그룹업무팀이 충분하고 적합한 감사증거를 입수하는데 필요한 만큼 부문감사인들의 업무에 관여할 수 있을 것인지 여부를 평가하여야 한다","연결 절차"],[21,"진","서동주 복근에 기권 군필","수용 및 유지 여부 결정시 이해할 사항(그룹업무팀이 이해할 사항)\n600-A11 서동주 복근에 기권 군필\n① 공유 서비스센터 등 서비스조직의 이용\n② 그룹에 유의적인 부문사업활동\n③ 법적 구조와 조직체계 등 그룹의 구조\n④ 연결절차의 복잡성\n⑤ 그룹경영진이 둘 이상의 감사인을 선임한 논리적 근거\n⑥ 그룹업무수행이사가 소속된 회계법인이나 그 네트워크 회계법인에 소속되지 않은 부문감사인\n이 부문의 재무정보에 대한 업무를 수행할 것인지 여부\n⑦ 그룹차원의 통제에 대한 기술서\n⑧ 그룹업무팀이 다음의 권한을 보유하고 있는지 여부\n• 그룹지배기구, 그룹경영진, 부문지배기구, 부문경영진, 부문정보 및 부문감사인에 대하여 제약을 받지 않고 접근할 수 있음\n• 그룹업무팀이 부문의 재무정보에 대하여 필요한 업무를 수행할 수 있음","수용 및 유지 여부 결정시 이해할 사항(그룹업무팀이 이해할 사항)"],[21,"진","수이강 연이","그룹•부문과 그 환경을 이해하기 위한 절차(그룹업무팀의 위험평가절차)\n600-17 수이강 연이\n① 업무의 수용 또는 유지 단계에서 입수한 그룹•부문과 그 환경(그룹차원의 통제 포함)에 대한 이해를 강화함\n② 연결절차(그룹경영진이 부문들에 내린 지침 포함)를 이해함","그룹 R평가"],[21,"진","유초재수 그평","그룹•부문과 그 환경에 대하여 이해할 사항(위험평가절차의 목적)\n600-18 재수/중\n그룹업무팀은 다음을 수행하는데 충분하도록 관련 사항을 이해하여야 한다.\n① 유의적일 것 같은 부문에 대한 최초 식별내용을 재확인하거나 수정함\n② 부정이나 오류로 인한 그룹재무제표의 중요왜곡표시위험을 평가함","그룹•부문과 그 환경에 대하여 이해할 사항(위험평가절차의 목적)"],[21,"진","윤독 문지술체 업규","그룹업무팀이 부문감사인에 대해 이해할 사항\n600-19, A38 독재관 격해지기\n① 부문감사인이 그룹감사와 관련된 윤리적 요구사항을 이해하고 있으며 이를 준수할 것인지 여부, 특히 부문감사인이 독립적인지 여부\n② 감사인을 적극적으로 감독하는 규제환경하에서 부문감사인이 업무를 수행하는지 여부\n③ 그룹업무팀이 충분하고 적합한 감사증거를 입수하는 데 필요한 만큼 부문감사인들의 업무에 관여할 수 있을 것인지 여부\n④ 부문감사인의 전문가적 적격성\n• 해당되는 경우, 부문감사인이 그룹감사에서 부문감사인의 책임을 완수하는 데 충분할 만큼해당 재무보고체계를 이해하고 있는지 여부\n• 부문감사인이 그룹감사에서 부문감사인의 책임을 완수하는 데 충분할 만큼 그룹감사에 적용되는 감사기준과 기타의 기준에 대하여 지식을 보유하고 있는지 여부\n• 부문감사인이 해당 부문재무정보에 대한 업무를 수행하는 데 필요한 전문기술을 보유하고있는지 여부","부문감사인"],[21,"진","서방질토자질","최초 연도의) 부문감사인 이해 방법\n600-A35\n서방질 토자질\n① 부문감사인에게 위 표의 ①②④에 기술된 사항에 대하여 서면으로 확인해 줄 것을 요청함\n② 위 표의 ①②④의 사항을 토의하기 위해 부문감사인을 방문함\n③ 부문감사인에게 위 표의 ①②④에 기술된 사항에 관한 질문서에 대하여 답변을 작성할 것을 요청함\n④ 그룹업무수행이사가 소속된 회계법인의 동료나 부문감사인에 대한 지식이 있는 명망있는 제3자와 부문감사인에 대하여 토의함\n⑤ 부문감사인이 소속된 전문직 조직이나 부문감사인의 전문자격을 부여하는 기관 또는 기타의 제3자로부터 확인서를 입수함\n⑥ 공통의 모니터링 정책과 절차에 따라 운영되고 이를 준수하는 회계법인이나 네트워크 회계법인에 그룹업무팀과 부문감사인이 함께 속해있는 경우 품질관리 모니터링 시스템의 결과를 평가함","부문 이해"],[21,"진","특활부중윤독","(요구사항과 관련 있는) 부문감사인과 커뮤니케이션할 사항\n600-40 특활부 중독\n① 그룹경영진이 작성한 특수관계자 목록 및 그룹업무팀이 알고 있는 기타의 특수관계자\n② 그룹업무팀이 자신의 업무를 활용할 것을 알고 있는 부문감사인이 그룹업무팀에 협조할 것을 확인해 주도록 하는 요청\n③ 부문의 재무정보에 대한 감사나 검토를 수행하는 경우, 부문중요성(그리고 적용가능한 경우, 특정거래유형, 계정잔액 또는 공시에 대한 중요성 수준들) 및 한도기준(즉, 왜곡표시가 그 기준을 초과하면 그룹재무제표에 대하여 명백하게 사소하다고 간주할 수 없는 한도기준\n④ 부문감사인의 업무와 관련성이 있는 부정이나 오류로 인한, 그룹재무제표의 식별된 유의적인 중요왜곡표시위험\n⑤ 그룹감사와 관련된 윤리적 요구사항, 특히 독립성 요구사항","부문 커뮤"],[21,"진","사 정취 식문","부문감사인의 위험평가에 대한 관여\n600-30 동율문 왜취\n① 그룹에 유의적인 부문사업활동에 대하여 부문감사인이나 부문경영진과 토의함\n② 그룹재무제표의 식별된 유의적인 중요왜곡표시위험(RMM)에 대한 부문감사인의 문서화 내용을 검토함\n③ 부정이나 오류로 인한 재무정보의 중요한 왜곡표시에 대한 부문의 취약성에 대하여 부문감사인과 토의함","R평가 관여"],[21,"진","유미편법 주윤발 재 커요","(그룹업무팀의 결론과 관련 있는) 부문감사인과 커뮤니케이션할 사항\n600-41 유미편법/주윤발 쟤 커요\n① 부문수준에서 식별된 유의적인 내부통제 미비점에 대한 설명\n② 부문재무정보에 대한 미수정왜곡표시의 목록(이 목록에는 그룹업무팀이 커뮤니케이션한, 명백하게 사소한 왜곡표시의 한도기준에 미달되는 왜곡표시는 포함될 필요가 없다)\n③ 경영진의 편의가능성을 나타내는 징후\n④ 그룹재무제표에 중요한 왜곡표시를 초래할 수 있는 법규위반 사례에 대한 정보\n⑤ 그룹감사와 관련성이 있을 수 있거나, 부문감사인이 그룹업무팀의 주의를 끌고 싶어하는 사항들\n⑥ 부문감사인이 그룹감사와 관련된 윤리적 요구사항(독립성 및 전문가적 적격성 포함)을 준수하였는지 여부\n⑦ 부문감사인의 전반적 발견사항, 결론 또는 의견\n⑧ 부문감사인의 보고대상인 부문재무정보의 식별\n⑨ 부문감사인이 지배구조에게 커뮤니케이션했거나 커뮤니케이션할 것으로 기대되는 기타의 유의적 사항들\n⑩ 부문감사인이 그룹업무팀의 요구사항을 준수했는지 여부","수행 후 커뮤"],[21,"진","추적 추관","부문감사인의 추가감사절차에 대한 관여\n600-31 추적 추관\n① 그룹업무팀은 해당 위험에 대응하여 수행할 추가감사절차의 적합성을 평가하여야 한다\n② 그룹업무팀은 부문감사인에 대한 이해를 바탕으로 하여 추가감사절차에 관여할 필요가 있는지 여부를 결정하여야 한다","부문 RMM"],[21,"진","유사토 기검결","부문감사인의 커뮤니케이션 평가 시 그룹업무팀이 수행할 절차\n600-42 유사토 기검결\n① 이러한 평가에서 나타난 유의적 사항을 부문감사인, 부문경영진 또는 그룹경영진 등 적절한 대상과 토의함\n② 부문감사인의 감사문서 중 기타의 관련 부분을 검토할 필요가 있는지 여부를 결정함","적합성 평가"],[21,"진","추수결 누수결","부문감사인의 업무가 불충분한 경우 그룹업무팀이 수행해야 할 절차\n600-43 어추/부그\n① 어떠한 추가적인 절차가 수행되어야 할지 결정\n② 추가절차를 부문감사인이 수행할지 그룹업무팀이 수행할지 여부를 결정(즉, 그룹업무팀은 부문감사인에게 추가적인 절차를 수행하도록 요청하거나, 부문감사인에 의한 추가적인 절차의 수행이 실행가능하지 않은 경우, 그룹업무팀은 부문재무정보에 대하여 직접 그 자신의 절차를 수행하여야 한다.)","업무 불충분"],[21,"진","유통연 분","그룹업무팀이 연결절차에서 발생할 수 있는 위험에 대응하여 수행해야 되는 감사절차\n600-32~37 정편일 커추통\n① 회계정책의 일관성, 수정 시 적합성 평가\n② 연결조정 및 재분류 적합성, 완전성 및 정확성 평가 및 부정위험요소나 경영진의 편의가능성 징후 존재 여부 평가\n③ 재무제표일이 다른 부문재무제표가 포함된 경우 조정 여부 평가\n④ 부문감사인과의 커뮤니케이션에서 식별된 재무정보가 그룹재무제표에 포함되어 있는지 여부 결정\n⑤ 연결절차에서 발생하는 그룹재무제표의 평가된 중요왜곡표시위험에 대응하는 연결절차에 대한 추가감사절차(그룹재무제표에 모든 부문들이 포함되어 있는지에 대한 평가 포함)\n⑥ 그룹차원의 통제의 운영효과성 검증","연결 감사"],[21,"진","연통효기 실만없","그룹차원의 통제의 운영효과성을 테스트하는 경우\n600-32 연기 실만없\n① 연결절차에 대하여 수행할 업무의 성격, 시기 및 범위가 그룹차원의 통제가 효과적으로 운영\n되고 있다는 기대에 근거하거나\n② 실증절차만으로는 경영진주장 수준의 충분하고 적합한 감사증거가 제공될 수 없는 경우","그룹 통제"],[21,"진","통연이 직테 부테","600-32 통연이 직테 부테\n① 그룹업무팀은 그룹차원의 통제 및 연결절차(그룹경영진이 부문들에게 내린 지침 포함)를 이해한다\n② 그룹업무팀은 직접 그룹차원의 통제의 운영효과성을 테스트한다\n③ 그룹업무팀의 요청을 받은 부문감사인이 통제의 운영효과성을 테스트한다","연결 운영"],[21,"진","연다일","실증절차 전 수행절차\n연다일\n① 연결절차에서 발생하는 그룹재무제표의 평가된 중요왜곡표시위험에 대응하는 연결절차에 대한 추가감사절차(=연결범위의 적절성 검토, ISA 600-33)\n② 재무제표일이 다른 부문재무제표가 포함된 경우 조정 여부 평가(ISA 600-37)\n③ 회계정책의 일관성, 수정 시 적합성 평가(ISA 600-35)","실증절차 전 수행절차"],[21,"진","계리인/뒷문/근사/거미액 정제","연결조정분개의 검토절차(비경상적인 연결조정사항의 적절성, 완전성, 정확성을 평가할 때의 수행절차)\n600-A56 계리인/뒷문/근사/거미액 정제\n① 그룹경영진, 그리고 해당되는 경우 부문경영진이 유의적 조정사항을 올바르게 계산, 처리 및 승인하였는지 여부를 결정함\n② 유의적 조정사항은 적절히 뒷받침되고 충분히 문서화되었는지 여부를 결정함\n③ 유의적 조정사항은 그 근거가 되는 사건이나 거래를 적합하게 반영하고 있는지 여부를 평가함\n④ 그룹 내부거래와 미실현이익 그리고 그룹내부계정의 잔액은 조정 및 제거되었는지를 점검함","연결조정분개의 검토절차"],[21,"진","알거지 해비","부문경영진이 파악하지 못한 유의적인 사항을 그룹업무팀이 알게 된 경우 수행절차\n600-48 알거지 해비\n① 그룹경영진에게 해당 사항을 부문경영진에게 알리도록 요청하여야 한다\n② 만약 그룹경영진이 이 사항을 해당 부문경영진에게 커뮤니케이션하는 것을 거부한다면, 그룹업무팀은 이 사항을 그룹의 지배기구와 논의하여야 한다\n③ 해당 사항이 해결되지 않고 있는 경우, 그룹업무팀은 법적 및 전문직 비밀유지책임에 대한 고려 하에, 부문감사인에게 이 사항이 해결될 때까지 부문의 재무제표에 대한 감사보고서를 발행하지 않도록 조언할지 여부를 고려하여야 한다","미파악 사항"],[21,"진","부유한 관우","그룹지배기구와 커뮤니케이션할 사항\n600-49 부유한 관우\n① 경영진, 부문경영진, 그룹차원의 통제에 유의적인 역할을 수행하는 종업원, 또는 그룹재무제표에 중요한 왜곡표시가 초래되는 부정과 관련된 기타의 사람들이 연루되어 있는 부정이나 의심되는 부정\n② 부문재무정보에 대하여 수행되는 업무유형의 개요\n③ 그룹감사에 대한 제한(ex. 그룹업무팀이 정보에 접근하는데 제약이 가해진 경우)\n④ 유의적 부문의 재무정보에 대하여 부문감사인이 수행할 업무에 대하여 그룹업무팀이 계획하고 있는 관여의 성격에 대한 개요\n⑤ 부문감사인의 업무에 대한 그룹업무팀의 평가가 해당 감사인의 업무품질에 대하여 우려를 발생시키는 사례","그룹지배기구"],[21,"진","유 관성시범 서커","그룹업무팀이 문서화할 사항\n600-50 파분유 서커 관성\n① 유의적인 부문을 파악하는 부문 분석 및 부문재무정보에 대하여 수행된 업무의 유형\n② 그룹업무팀의 요구사항에 대하여 그룹업무팀과 부문감사인 간에 이루어진 서면 커뮤니케이션\n③ 유의적 부문에 대하여 부문감사인이 수행한 업무에 대한 그룹업무팀의 관여의 성격, 시기 및 범위","그룹 문서화"],[22,"진","식내오장임기","내부회계관리제도 관련 회사의 의무\n「외감법」§8 오분내방장\n① 회계정보의 오류를 통제하고 이를 수정하는 방법에 관한 사항\n② 회계정보의 작성 및 공시와 관련된 임직원의 업무 분장과 책임에 관한 사항\n③ 회계정보에 대한 정기적인 점검 및 조정 등 내부검증에 관한 사항\n④ 회계정보(회계정보의 기초가 되는 거래에 관한 정보 포함)의 식별, 측정, 분류, 기록 및 보고방법에 관한 사항\n⑤ 회계정보를 기록•보관하는 장부의 관리방법과 위조, 변조, 훼손 및 파기를 방지하기 위한 통제\n절차에 관한 사항","내부회계규정"],[22,"진","상 직자5비","내부회계관리제도 적용 대상기업\n「외감법」§8\n상 직자5비\n① 모든 주권상장법인과\n② 직전연도 자산총액이 5천억 원 이상인 주권비상장회사(금융X, 유한X)\n③ (직전 사업연도 말의 자산총액이 1천억 원 이상인 공정거래법상 공시대상 기업집단 소속 국내 회사, 사업보고서 제출대상법인, 금융회사)","내회관 대상 기업"],[22,"진","점직첨 오빠충","외부감사법에 의해 운영실태보고서에 포함되어야 할 사항\n외-시행령 §9 점직첨 오빠충\n① 내부회계관리제도의 운영실태를 점검한 결과 및 취약 사항에 대한 시정조치 계획\n② 직전 사업연도에 보고한 시정조치 계획의 이행 결과\n③ 다음 사항을 확인하고 서명하여 보고 내용에 첨부하였다는 사실\n• 보고 내용에 중대한 오해를 일으키는 내용이 기재되거나 표시되지 아니하였다는 사실\n• 보고 내용이 거짓으로 기재되거나 표시되지 아니하였고, 기재하거나 표시하여야 할 사항을 빠뜨리고 있지 아니하다는 사실\n• 충분한 주의를 다하여 보고 내용의 기재 사항을 직접 확인•검토하였다는 사실","외감법 실태보고서 포함사항"],[22,"진","재능통영","효과적인 내부회계관리제도의 요건\n개념체계 16\n재능통영\n① 내부회계관리제도의 각 구성요소와 관련 원칙이 존재하고 기능한다\n② 내부회계관리제도의 구성요소가 연계되어 통합적으로 운영된다","내회관 효과적 요건"],[22,"진","감정적 부도","내부회계관리제도의 5가지 구성요소(통제환경)\n개념체계 38~54\n감정적 부도\n① 내부회계관리제도 감독 책임\n② 조직구조, 권한 및 책임 정립\n③ 적격성 유지\n④ 내부회계관리제도 책임 부여\n⑤ 도덕성과 윤리적 가치에 대한 책임","내부회계관리제도의 5가지 구성요소(통제환경)"],[22,"진","CRIME","내부회계관리제도의 5가지 구성요소\n개념체계 38~54 CRIME\n① 통제활동(C)\n② 위험평가(R)\n③ 정보 및 의사소통(I)\n④ 모니터링 활동(M)\n⑤ 통제환경(E)","내회관 5요소"],[22,"진","화목부식","내부회계관리제도의 5가지 구성요소(위험평가)\n개념체계 38~54 화목부식\n① 중요한 변화의 식별과 분석\n② 구체적인 목적 수립\n③ 부정위험 평가\n④ 위험 식별 및 분석","내부회계관리제도의 5가지 구성요소(위험평가)"],[22,"진","선일실","내부회계관리제도의 5가지 구성요소(통제활동)\n개념체계 38~54 황보절\n① 통제활동의 선택과 구축\n② 정보기술 일반통제의 선정과 구축\n③ 정책과 절차를 통한 실행","내회관 통제활동"],[22,"진","관내외","내부회계관리제도의 5가지 구성요소(정보 및 의사소통)\n개념체계 38~54 내외관\n① 내부 의사소통\n② 외부 의사소통\n③ 관련 있는 정보의 사용","내회관 정보/의사소통"],[22,"진","상미","내부회계관리제도의 5가지 구성요소(모니터링 활동)\n개념체계 38~54 미개 모독\n① 미비점 평가와 개선활동\n② 상시적인 모니터링과 독립적인 평가 수행\n5가지 구성요소에 17가지 원칙을 달성하기 위한 중점 고려사항과 통","내회관 모니터링"],[22,"진","목달존 설달못","설계의 미비점과 운영의 미비점\n모범규준 15 존설운수\n설계의 미비점은\n① 내부회계관리제도의 목적을 달성하기 위한 내부통제가 존재하지 않거나 ② 내부회계관리제도가 적절하게 설계되어 있지 않아서 내부회계관리제도가 설계된대로 작동하더라도 그 목적이 달성되지 못할 때 발생함","내회관 설계 미비점"],[22,"진","질검관","설계효과성과 운영효과성의 테스트 감사방법 (질관검 / 질관검재): 설계효과성 테스트 - **질**문, **검**사, **관**찰","내회관 설계 테스트"],[22,"진","적설운 효필권","운영의 미비점은 ① 적절하게 설계된 내부회계관리제도가 설계된대로 운영되지 않거나 ② 통제를 수행하는 담당자가 통제를 효과적으로 수행하기 위해 필요한 권한이나 자질을 갖고 있지 않을 때 발생함","내회관 운영 미비점"],[22,"진","재질검관","설계효과성과 운영효과성의 테스트 감사방법 (질관검 / 질관검재): 운영효과성 테스트 - **재**수행, **질**문, **검**사, **관**찰","내회관 운영 테스트"],[22,"진","고재감효","중요한 취약점의 식별(내부회계관리제도의 중요한 취약점을 나타내는 지표)\n보고기준 5 고재감효\n① 금액이 중요한지와 관계 없이 고위 경영진에 의한 부정이 발견된 경우\n② 중요한 왜곡표시의 수정을 반영하기 위하여 기존 재무제표를 재작성하는 경우\n③ 회사의 내부회계관리제도에 의해 파악하지 못한 중요한 당기 수정사항으로써 외부감사인에 의하여 파악된 경우(최종 재무제표에 동 수정사항을 반영하였는지 여부는 관계 없음)\n④ 회사의 외부 재무보고와 내부회계관리제도에 대한 감사(또는 감사위원회)의 감독기능이 효과적이지 않은 경우","중요한 취약점 식별"],[22,"진","보객","중요한 취약점이 아니라고 결정하는 경우 고려해야할 사항\n1100-49~50 보객\n① 보완통제의 영향을 평가하여야 한다. 감사인은 보완통제가 중요한 왜곡표시를 예방 또는 발견•수정할 수 있는 정밀한 수준으로 운영되는지 여부를 결정하기 위하여, 그러한 보완통제의 운영효과성을 테스트하여야 한다.\n② 동일한 사실과 상황에 대한 지식을 가진, 회계와 내부회계관리제도에 충분한 전문지식을 갖춘 객관적인 사람이 동일한 결론에 도달할 것인지 여부를 고려하여야 한다","중요한 취약점이 아니라고 결정하는 경우 고려해야할 사항"],[22,"진","추미왜통","내부회계관리제도의 효과성에 대한 의견을 형성할 때 증거의 원천\n1100-56 추미왜통\n① 재무제표에 대한 의견표명과 관련된 목적을 달성하기 위해 수행한 추가적인 통제테스트\n② 식별된 미비점들\n③ 재무제표감사 과정에서 발견된 왜곡표시\n④ 내부회계관리제도감사를 위한 감사인의 통제테스트","내부회계관리제도의 효과성에 대한 의견을 형성할 때 증거의 원천"],[22,"진","중취합 표커","내부회계관리제도감사에 대한 개요(감사목적)\n기합표커\n① 평가기준일 현재 내부회계관리제도에 중요한 취약점이 존재하는지 여부에 대한 합리적인 확신을 얻음\n② 내부회계관리제도의 효과성에 대한 감사의견을 표명하고 경영진 및 지배기구와 커뮤니케이션함","내회관 감사 목적"],[22,"진","동일 유준첨 문제","내부회계관리제도감사의 전제조건을 확인하기 위한 절차\n1100-7 동일 유준첨 문제\n(1) 다음의 책임을 인정하고 이해하고 있다는 점에 대하여 경영진의 동의를 받음\n① 효과적인 내부회계관리제도를 설계, 실행 및 유지할 책임\n② 적합하고 이용가능한 준거기준을 사용하여 기업의 내부회계관리제도의 효과성을 평가할 책임\n③ 감사보고서에 첨부되는 보고서에 내부회계관리제도에 대한 경영진의 평가(운영실태보고서)를 제공할 책임\n④ 충분한 평가와 문서화를 통해 기업의 내부회계관리제도의 효과성에 대한 기업의 평가를 뒷받침할 책임\n⑤ 다음의 사항을 제공할 책임\na. 기록, 문서, 기타사항 등 내부회계관리제도에 대한 경영진의 평가와 관련하여 경영진이 알고\n있는 모든 정보에 대한 접근\nb. 감사인이 내부회계관리제도감사 목적으로 경영진에게 요청하는 추가적인 정보\nc. 감사인이 감사증거를 입수하기 위하여 필요하다고 결정한 기업 내부의 관계자들에 대한 제한없는 접근\n(2) 해당 평가기준일이 해당 재무제표 대상 기간의 재무상태표일과 일치한다는 결정","내회관 전제조건"],[22,"진","감뒷 통뒷","통합감사에서 통제테스트의 목적\n1100-10 동감모테 감뒷통뒷\n내부회계관리제도감사와 재무제표감사의 목적이 동일하지 않더라도, 감사인은 각각의 감사목적을 동시에 달성할 수 있도록 통합감사를 계획하고 수행하여야 한다. 감사인은 아래의 목적을 모두 달성할 수 있도록 통제테스트를 설계하여야 한다.\n① 평가기준일(통상적으로 보고기간말일) 현재의 내부회계관리제도에 대한 감사의견을 뒷받침할 충분하고 적합한 증거를 입수함\n② 재무제표감사 목적상 감사인의 통제위험 평가를 뒷받침할 충분하고 적합한 감사증거를 입수","통합감사 통제테스트 목적"],[22,"진","재반전 유주내충","하향식 접근법\n1100-A28~29 재반전 유주내충\n① 재무제표수준에서 시작함\n② 내부회계관리제도의 전반적인 위험에 대한 감사인의 이해를 사용함\n③ 전사적 수준 통제에 초점을 둠\n④ 유의적인 거래유형, 계정잔액, 공시 및 관련 경영진주장으로 업무를 옮겨감\n⑤ 재무제표에 중요한 왜곡표시가 존재할 가능성이 낮지 않음을 나타내는 거래유형, 계정, 공시 및 경영진주장으로 감사인의 주의를 기울이게 함\n⑥ 기업의 프로세스 내에 존재하는 위험에 대한 감사인의 이해를 검증함\n⑦ 각각의 관련경영진주장에 대한 평가된 왜곡표시위험에 충분히 대처하는 통제를 테스트 대상으로 선정함","하향식 접근법"],[22,"진","감평공부 전후수준","서면진술에 포함될 사항\n1100-61 감평공부 전후수준\n① 통합감사 중에 감사인이 수행한 감사절차를 경영진이 내부회계관리제도 효과성에 대한 경영진 평가에 대한 근거의 일부로 활용하지 않았음을 명시함\n② 평가기준일 현재 준거기준에 근거한 내부회계관리제도 효과성에 대한 경영진 평가에 대한 근거의 일부로 활용하지 않았음을 명시함\n③ 내부회계관리제도의 설계 또는 운영 상의 모든 미비점을 감사인에게 공개하였음을 명시함(유의적 미비점이나 중요한 취약점이라고 생각되는 모든 미비점을 경영진이 별도로 감사인에게 공개한 것을 포함함)\n④ 기업의 재무제표에 중요한 왜곡표시를 초래하는 부정과 재무제표에 중요한 왜곡표시를 초래하지는 않지만 고위경영진 또는 기업의 내부회계관리제도에서 유의적인 역할을 담당하는 경영진 또는 기타 직원이 연루된 부정을 기술함\n⑤ 이전의 업무를 수행하는 동안에 식별되고 경영진과 지배기구에게 커뮤니케이션된 유의적 미비점과 중요한 취약점이 해결되었는지 여부를 명시하고, 해결되지 않은 미비점을 구체적으로 식별함\n⑥ 유의적 미비점과 중요한 취약점에 대하여 경영진이 취한 시정조치를 포함하여, 내부회계관리제도의 변경 또는 내부회계관리제도에 유의적으로 영향을 미칠 수 있는 다른 상황이 평가기준일 후에 후속적으로 존재했는지 여부를 명시함\n⑦ 효과적인 내부회계관리제도를 수립하고 유지할 경영진의 책임을 인정함\n⑧ 경영진이 기업의 내부회계관리제도의 효과성에 대한 평가를 수행하였음을 진술하고, 준거기준을 구체적으로 명시함","내회관 서면진술 포함사항"],[22,"진","추미왜통","내부회계관리제도의 효과성에 대한 의견을 형성할 때 증거의 원천\n1100-56 추미왜통\n① 재무제표에 대한 의견표명과 관련된 목적을 달성하기 위해 수행한 추가적인 통제테스트\n② 식별된 미비점들\n③ 재무제표감사 과정에서 발견된 왜곡표시\n④ 내부회계관리제도감사를 위한 감사인의 통제테스트","내부회계관리제도의 효과성에 대한 의견을 형성할 때 증거의 원천"],[22,"진","제수업이명일","내부회계관리제도 감사보고서의 구성요소\n 1) 보고서 제목\n 2) 수신인\n 3) 업무수행이사의 이름\n 4) 감사인명\n 5) 감사보고서일","내회관 감사보고서 형식"],[22,"진","초크/통거실","통합감사 중 유의적 미비점 또는 중요한 취약점이 존재하는지 여부에 대한 결정\n1100-51, A74 초크/통거실\n① 미비점 혹은 미비점들로부터 초래되는 잠재적 왜곡표시의 크기\n② 기업의 통제가 거래유형, 계정잔액이나 공시의 왜곡표시의 예방 또는 발견•수정에 실패할 가능성이 낮지 않은지 여부","심각성 평가"],[23,"진","질관검분/질관검재/질관검재외","위험평가절차, 통제테스트, 세부테스트에서 사용하는 감사기술\n질관검분/질관검재/질관검재외\n① 위험평가절차: 질문, 관찰, 검사, 분석적절차\n② 통제테스트: 질문, 관찰, 검사, 재수행\n③ 세부테스트: 질문, 관찰, 검사, 재계산, 외부조회","위험평가절차, 통제테스트, 세부테스트에서 사용하는 감사기술"],[22,"진","요자추상","외부감사인의 내부회계관리제도에 대한 검토(검토 절차)\n요자추상\n① 외부감사법 등 법규 요구사항의 충족 여부 검토\n② 경영진의 자체평가에 대한 검토\n• 경영진 자체평가 근거자료의 적정성 검토\n• 경영진의 자체평가 및 결론의 적정성 검토\n③ 필요시 감사인의 추가적 검토절차 수행\n• 내부통제 미비점의 평가\n• 내부통제의 미비점 고려\n④ 중요한 취약점일 수 있는 상황의 고려","내회관 검토 통제미비점 평가절차"],[22,"진","의근경지책감책정의한계","내부회계관리제도 감사보고서의 내용\n 1) 내부회계관리제도에 대한 감사의견\n 2) 내부회계관리제도 감사의견 근거\n 3) 내부회계관리제도에 대한 경영진과 지배기구의 책임\n 4) 내부회계관리제도감사에 대한 감사인의 책임\n 5) 내부회계관리제도의 정의와 한계","내회관 감사보고서 내용"],[23,"진","중기서검","연간재무제표 감사와 중간재무제표 검토에 동일하게 적용되는 사항\n중요성의 설정기준/기업과 기업환경, 해당 재무보고체계 및 기업의 내부통제시스템 이해/서면진술/검토의견의 종류","연간 중간 동일 적용"],[23,"진","질분","중간 재무제표 검토\n질문, 분석적절차","중간 재무제표 검토"],[6,"진","고발규위 타유","유의적 위험의 정의\n(1) 고유위험요소가 왜곡표시의 발생가능성과 왜곡표시가 발생했을 때 규모의 결합에 영향을 미치는 정도로 인하여, 고유위험요소가 고유위험의 범위 위쪽 끝에 가까운 것으로 식별된 중요왜곡표시위험\n(2) 타 감사 기준서(ex.240, 550)의 요구사항에 따라 유의적 위험으로 다루는 위험","유의적 위험"],[6,"진","조소지사 재측 산규기","감사인은 다음을 이해하기 위하여 위험평가절차를 수행해야 한다.\n1)기업과 기업환경의 다음과 같은 측면\n  (1)기업의 조직구조, 소유 및 지배구조, 그리고 기업의 사업모델\n  (2)내*외부적으로 기업의 재무성과를 평가하는데 사용하는 측정\n  (3)산업적 요인, 규제적 요인, 기타 외부적 요인\n2)해당 재무보고체계와 기업의 회계정책 및 변경시 그 이유","기업과 기업환경 관련 이해 사항"],[6,"진","전영전대","감사인이 재무제표 수준에서 중요왜곡표시위험을 식별하는 이유\n(1) 위험이 전반적인 영향을 주는지 결정한다.\n(2) 감사 기준서 330에 따른 전반적인 대응을 요구하는지 결정한다.","FS수준 RMM 식별 이유"],[6,"진","재경평영 성규평","재무제표 수준에서 식별된 중요왜곡표시위험을 평가할 때(또는 평가한 후) 수행절차\n(1) 재무제표 수준의 위험이 경영진 주장 수준의 위험 평가에 영향을 주는지 결정한다.\n(2) 재무제표에 미치는 전반적인 영향의 성격과 규모를 평가한다.","FS수준 RMM 평가 수행절차"],[6,"진","정감이근 중식평","관련경영진주장과 유의적인 거계공을 결정하는 이유\n(1) 기업의 정보시스템에 대한 감사인의 이해범위에 대한 근거를 제공한다.\n(2) 이러한 이해는 더 나아가 감사인이 중요왜곡표시위험을 식별하고 평가하는데 도움을 준다.","관련경영진주장 유의적 거계공 결정 이유"],[6,"진","고왜영 재경중고영","고유위험 평가시 왜곡표시의 발생가능성과 규모를 평가할 때 고려할 사항\n(1) 고유위험요소가 관련경영진주장의 왜곡표시가능성에 영향을 미치는 방법과 그 정도\n(2) 재무제표 수준의 중요왜곡표시위험이, 경영진 주장 수준의 중요왜곡표시위험의 고유위험 평가에 영향을 미치는 방법과 그 정도","고유위험 평가시 왜곡표시 발생가능성 규모 평가 고려사항"],[6,"진","토유 이원차 설실 중","위험평가절차와 관련하여 문서화할 사항\n(1) 업무팀원 간의 토의내용 및 도달된 유의적 결정사항\n(2) 감사인의 이해의 주요 요소, 감사인이 이해를 얻은 정보의 원천, 그리고 수행한 위험평가절차\n(3) 식별된 통제의 설계에 대한 평가와 그러한 통제가 실행되었는지 여부에 대한 결정\n(4) 식별되고 평가된 재무제표 수준과 경영진주장 수준의 중요왜곡표시위험","위험평가절차 문서화"],[7,"진","권지경인책","5가지 이해할 사항\n(1) 기업의 권한과 책임의 배부\n(2) 지배기구가 경영진과 분리되어 있는 경우, 지배기구의 독립성과 기업의 내부통제시스템에 대한 감독\n(3) 기업 문화, 경영진의 성실성과 윤리적 가치에 대한 약속 등과 같이, 경영진이 감독 책임을 이행하는 방법\n(4) 기업이 적격성 있는 인력을 유치하고, 육성하고 유지하는 방법\n(5) 기업이 내부통제시스템의 목적을 추구하는 데 있어, 개인에게 책임을 지도록 하는 방법","(E) 통제환경 5가지 이해할 사항"],[7,"진","경지문 통다기 미다약","3가지 평가할 사항\n(1) 경영진이, 지배기구 감독과 함께, 정직하고 윤리적으로 행동하는 문화를 조성하고 유지하는지 여부\n(2) 기업의 성격과 복잡성을 고려했을 때, 통제환경이 내부통제시스템의 다른 구성요소에 대하여 적절한 기반을 제공하는지 여부\n(3) 통제환경에서 식별된 미비점이 기업의 내부통제시스템의 다른 구성요소를 약화시키는지 여부","(E) 통제환경 평가할 사항"],[7,"진","상별내이 정원신근이","2가지 이해할 사항\n  1) 다음을 다루는 기업의 절차의 측면들을 이해한다.\n(1) 통제의 효과성 모니터링과 식별된 통제 미비점에 대한 식별과 개선을 위한 상시적인 평가 및 별도의 평가\n(2) 내부감사기능이 있는 경우, 기업의 내부감사기능(그 성격 책임 및 활동을 평가)\n 2) 내부통제시스템을 모니터링하는 기업의 절차에서 사용되는 정보의 원천과, 경영진이 해당 정보를 목적상 충분히 신뢰성 있는 정보라고 생각하는 근거를 이해한다.","(M) 모니터링 절차 2가지 이해 사항"],[7,"진","성복적","평가할 사항\n기업의 성격과 복잡성을 고려했을 때, 기업의 위험평가절차가 기업의 상황에 적합한지 여부","(M) 모니터링 절차 평가할 사항"],[6,"진","계회변이\n고왜어영미","감사인은 다음을 이해하기 위하여 위험평가절차를 수행해야 한다.\n2)해당 재무보고체계와 기업의 회계정책 및 변경시 그 이유\n1)과 2)에서 얻은 이해를 기초로 했을 때, 해당 재무보고체계에 따른 재무제표의 작성에 있어 고유위험요소가 경영진주장의 왜곡표시 가능성에 어떻게 영향을 미치는지, 그리고 영향을 미치는 정도","재무보고체계 관련 이해 사항"],[6,"진","재무제표 수준의 중요왜곡표시위험 개념","재무제표 전체에 전반적으로 관련된 위험, 잠재적으로 다수의 경영진주장에 영향을 미친다.","재무제표 수준의 중요왜곡표시위험 개념"],[6,"진","관유결","감사인은 경영진주장 수준의 중요왜곡표시위험을 평가할 때, 관련경영진주장과 유의적 거래유형, 계정잔액 및 공시를 결정해야 한다.","경영진주장 수준의 RMM 식별시 수행절차"],[7,"진","내부통제시스템 정의","내부통제시스템의 정의\n재무보고의 신뢰성, 경영의 효과성 및 효율성, 관련 법규의 준수에 관련된, 기업의 목적 달성에 관한 합리적 확신을 제공하기 위해, 지배기구, 경영진 및 기타 인원에 의해 설계, 실행, 유지되고 있는 시스템.","내부통제시스템 정의"],[7,"진","사식 발유 대","3가지 이해할 사항\n(1) 재무보고목적과 관련된 사업위험의 식별\n(2) 이러한 위험의 발생가능성을 포함한 위험의 유의성 평가\n(3) 이러한 위험에 대한 대응","(R) 기업의 위험평가절차 관련 3가지 이해할 사항"],[7,"진","성복적","평가할 사항\n기업의 성격과 복잡성을 고려했을 때, 기업의 위험평가절차가 기업의 상황에 적합한지 여부","(R) 기업의 위험평가절차 관련 평가할 사항"],[7,"진","정커재작뒷","평가할 사항\n기업의 정보시스템 및 커뮤니케이션이 해당 재무보고체계에 따른 기업의 재무제표 작성을 적절하게 뒷받침하는지 여부","(IT) IT 시스템 평가할 사항"],[7,"진","흐:거포보 외포공/ 증절자","(1) 기업의 정보시스템 내 정보의 흐름. 다음을 포함한다.\n  • 거래가 개시되고 거래에 대한 정보가 기록, 처리되고 필요시 수정되고 총계정원장에 포함되고 재무제표에 보고되는 방법\n  • 거래 외에 사건과 상황에 대한 정보가 포착, 처리되고 재무제표에 공시되는 방법\n(2) 회계기록, 재무제표의 특정 계정 및 기타 정보시스템의 정보 흐름에 관한 기타 증빙 기록\n(3) 공시를 포함하여 기업의 재무제표 작성에 사용된 재무보고절차\n(4) 위 (1)~(3)과 관련한 IT 환경을 포함한 기업의 자원","정보처리활동 포함사항"],[7,"진","경 : 유 비분 운테 목\n환식\n관일식","식별해야 할 통제\n  1) 통제활동 구성요소에서 경영진주장 수준의 중요왜곡표시위험에 대처하는 다음과 같은 통제를 식별한다.\n  (1) 유의적 위험으로 결정된 위험에 대처하는 통제\n  (2) 비반복적이고 일상적이지 않은 거래나 조정에 사용되는, 비표준적인 분개를 포함한 분개에 대한 통제\n  (3) 감사인이 실증테스트의 성격, 시기 및 범위를 결정하는 데 있어 운영효과성을 테스트하기로 계획된 통제\n2) 1)에서 식별한 통제를 바탕으로, IT 응용프로그램과, IT 사용으로 인한 위험이 따르는 기업의 IT 환경의 기타 측면을 식별한다.\n3) 2)에서 식별된 IT 응용프로그램과 IT 환경의 기타 측면에 대하여 다음을 식별한다.\n  (1) IT 사용으로 인한 관련 위험\n  (2) 그러한 위험에 대처하는 기업의 정보기술 일반통제","(C) 통제활동 통제 식별사항"],[7,"진","효설평 실결","평가 및 결정할 사항\n1)과 3)의 (2)에서 식별된 통제에 대하여,\n(1) 통제가 경영진주장 수준의 중요왜곡표시위험에 대처하기에 효과적으로 설계되었는지, 또는 다른 통제의 운영을 지원하기에 효과적으로 설계되었는지 여부를 평가한다.\n(2) 기업의 인원에 대한 질문에 추가된 절차를 수행함으로써, 기업의 통제가 실행되었는지 여부를 결정한다.","(C) 통제활동 통제 평가 및 결정할 사항"],[7,"진","무직응수통","정보의 무결성에 대한 위험에 직접적으로 대응하는 통제로써, 기업의 정보시스템 내 IT 응용프로그램의 정보처리 또는 수작업 정보처리와 관련된 통제","정보처리 통제"],[7,"진","지운뒷통","IT 환경의 지속적이고 적절한 운영을 뒷받침하는 기업의 IT 프로세스에 대한 통제","정보기술 일반통제 (ITGC)"],[7,"진","네 : 세원인대\n운 : 무용접해\n데 : 직접무대\n응 : 응기접관","1) 네트워크 : 네트워크 계층의 정보기술 일반통제는 일반적으로 네크워크 세분화, 원격접속 및 인증과 관련된 IT 사용으로 인한 위험에 대처한다. 네트워크 통제는 기업이 재무보고에 사용되는 웹상의 응용프로그램을 가지고 있는 경우에 관련될 수 있다.\n  2) 운영체제 : 운영체제 계층의 정보기술 일반통제는 일반적으로 다른 통제의 무력화를 용이하게 할 수 있는 접근관리와 관련된 IT 위험을 해결한다. 여기에는 다른 사용자의 자격증명의 손상, 인증되지 않은 새 사용자의 추가, 악성 프로그램이나 스크립트 또는 기타 인증되지 않은 프로그램의 실행과 같은 행동이 포함된다.\n  3) 데이터베이스 : 데이터베이스 계층의 정보기술 일반통제는 일반적으로 데이터베이스에 직접 접근하거나, 스크립트 또는 프로그램을 실행하여 제이터베이스의 재무보고 정보에 대한 무단 업데이트와 관련된 IT 사용으로 인한 위험에 대처한다.\n  4) 응용프로그램 : IT 응용프로그램 계층의 정보기술 일반통제는 응용프로그램 기능의 특성과 범위 및 기술에서 허용되는 접근 경로와 관련이 있다.","IT 환경의 각 측면별 정보기술 일반통제의 성격"],[7,"진","관이시변","변경관리 절차, 변경 이관에 대한 업무분장, 시스템 개발*구매*실행, 데이터 변환","IT 환경에 대한 프로그램 또는 기타 변경 사항 관리 프로세스 일반통제"],[7,"진","침일모백","침입 탐지, 작업 일정 관리, 작업 모니터링, 백업 및 복구","운영관리 프로세스 일반통제"],[7,"진","인권접특닝해보물","인증, 권한 부여, 사용자 접근 검토, 특별 권한 접근, 프로비저닝, 프로비저닝 해제, 보안구성 통제, 물리적 접근","접근관리 프로세스 일반통제"],[7,"진","병: 간삭 직별","2) 병행처리법 \n장점 : \n(1) 감사대상회사의 실제자료를 이용하므로 회사가 실제 사용한 프로그램과 통제절차의 운영효과성을 간접적으로 검증할 수 있음\n(2) 실제자료를 이용하므로 모의자료를 작성하거나 삭제해야 하는 번거로움이 없음\n단점 :\n(1) 감사대상회사가 사용하고 있는 프로그램에 대한 직접적인 검증이 이루어지지 않음\n(2) 별도 프로그램 개발에 시간과 비용이 많이 소요될 수 있음","유형별 장단점\n병행처리법"],[7,"진","통: 실직별 하삭","3) 통합자료법 \n장점 : \n(1) 회사의 실제 시스템에 영향을 미치지 않으면서, 회사가 실제로 사용하는 시스템을 직접 검증할 수 있음.\n(2) 프로그램에 대한 직접적인 검증이 이루어지게 됨\n(3) 병행처리법과 같이 별도의 프로그램을 개발할 필요가 없음\n단점 :\n(1) 별도의 하위 시스템을 설치하는 데 시간과 비용이 많이 소요될 수 있음\n(2) 모의자료를 작성하고 삭제해야 하는 번거로움이 있음","유형별 장단점\n통합자료법"],[7,"진","적독기절","유형 1*2 보고서가 제공하는 증거의 충분성과 적합성을 결정시 만족할 사항\n(1) 서비스 감사인의 전문가적 적격성 및 서비스조직으로부터의 독립성\n(2) 발행된 유형 1 또는 유형 2 보고서에 적용된 기준의 적절성","보고서 이용 충적 만족 사항"],[8,"진","통제테스트","경영진주장 수준의 중요왜곡표시위험을 예방 또는 발견 및 수정하기 위한 통제의 운영효과성을 평가하기 위해 설계된 감사절차","통제테스트"],[8,"진","실증절차","경영진주장 수준의 중요한 왜곡표시를 발견하기 위해 설계된 감사절차","실증절차"],[8,"진","판수내고","(1) 감사인의 위험평가에는 판단이 수반되므로, 모든 중요왜곡표시위험이 식별되지 않을 수 있다. \n(2) 경영진의 통제무력화 등 내부통제시스템에 고유한계가 존재한다.","중요한 거계공 반드시 실증절차"],[8,"진","환중거후","(1) 통제환경 및 기타의 관련통제\n (2) 평가된 중요왜곡표시위험\n (3) 거래유형 및 계정잔액의 성격과 관련경영진주장\n (4) 감사인이 수행할 절차에 필요한 정보가 이후 입수될 수 있는지 여부 등","중간기간 실증절차 고려"],[9,"진","출회입지","당기중의 회수내역을 검토함\n당기중의 지급내역을 검토함","유동항목 - 매출채권 매입채무"],[9,"진","3조 검기","제3자가 회사의 재고를 보관하고 있는 경우 수행절차\n 다음 중 하나의 절차를 수행해야 한다.\n (1) 기업을 위해 보관하고 있는 재고자산의 수량과 상태에 대하여 제3자의 조회를 요청한다\n (2) 해당 상황에 적합한 검사 또는 기타의 감사절차를 수행함","제3자 보관"],[9,"진","최결반 최감","실사입회 후에 추가적으로 수행되어야 하는 절차와 그 목적\n (1) 재고자산의 최종 기록이 재고자산 실사의 결과를 정확하게 반영하고 있는지 여부를 결정하기 위해 (수행목적)\n (2) 재고자산의 최종 기록에 대한 감사절차를 수행 (실사기록사본과 재고자산 최종기록 대사)","실사입회 후 추가 수행절차"],[9,"진","유형자산 계정잔액 세부테스트","(1) 부동산 : 등기부등본 실발권의 표갑갑을 \n(by 재무제표일 이후 발급된 등기부등본 →  소유권 확인)\n(2) 이외의 : by 실물검사 → 실재성 확인\n(3) 모형 : by 감정평가보고서 → 공정가치 평가 적절성\n(4) by 감가상각비 재계산 → 감가상각누계액 적절성","유형자산 계정잔액 세부테스트"],[9,"진","중요한 지서수","매입채무에 대한 세부테스트\n (1) 잔액이 없거나 거의 없더라도 당기 중 중요한 거래처를 중심으로 채권채무조회서를 발송한다.\n (2) 재무제표일 이후 현금지급내역을 조사한다.\n (3) 제3자로부터의 서신을 조사한다.\n (4) 상품수령증과 같은 기타 기록에 대해 조사한다.","매입채무 세부테스트"],[9,"진","차입금 세부테스트","기중 거래가 있었던 모든 은행에 대해 은행조회서를 발송해 확인함","차입금 세부테스트"],[10,"진","경예발 감재합","(1) 경영진 : 부정과 오류의 예방과 발견에 대한 주된 책임\n(2) 감사인 : 재무제표에 부정과 오류로 인한 중요한 왜곡표시가 없다는 합리적 확신을 얻을 책임","부정에 대한 경영진과 감사인의 책임"],[10,"진","실의혐알 견","내부감사기능 내 적합한 담당자에게 질문할 사항\n실제로 발생했거나, 의심 중인 부정 또는 혐의 중인 부정을 알고 있는지 여부","부정 위험평가절차시 내부감사 질문"],[11,"진","감전위정통결","감독관리, 전문 기술 지식 필요성, 기업의 위험평가절차, 정보시스템, 통제활동, 이전 결과","회계 추정치 내부통제시스템 이해"],[11,"진","흐 공:가방데원이대","다음과 관련된 내용을 포함한 기업의 정보시스템\n 1) 기업의 정보시스템 내에서 유의적인 거래유형, 계정잔액 또는 공시에 대한 회계추정치 및 관련 공시에 관한 정보의 흐름\n 2) 그러한 회계추정치와 관련 공시에 대한 다음 사항\n (1) 경영진이 해당 재무보고체계의 관점에서 적합한 관련된 방법, 가정 또는 데이터의 원천, 그 변경 필요성을 식별하는 방법으로 다음을 포함한다.\n (2) 측정 결과의 가능한 범위에 대한 고려를 포함하여 경영진이 추정불확실성의 정도를 이해하는 방법\n (3) 재무제표에 포함될 점추정치와 관련 공시의 선택을 포함하여 경영진이 추정불확실성에 대응하는 방법","회계 추정치 내부통제시스템 이해 - 정보시스템"],[11,"진","가방데원 : 모방대가데선","경영진이 해당 재무보고체계의 관점에서 적합한 관련된 방법, 가정 또는 데이터의 원천, 그 변경 필요성을 식별하는 방법으로 다음을 포함한다.\n (1) 경영진이 모델의 이용을 포함하여 사용된 방법을 선택, 설계 및 적용한 방법\n (2) 경영진이 대용치를 포함한 사용된 가정을 선택하고 유의적 가정을 식별한 방법\n (3) 경영진이 사용된 데이터를 선택한 방법","회계추정치와 관련 공시 : 가방데원"],[11,"진","변효복추편징","과거 회계추정치와 당기결과의 비교를 통해서 얻을 수 있는 정보\n (1) 경영진의 과거 추정절차의 효과성\n (2) 재무제표의 공시가 요구될 수 있는 변경의 원인과 같은 사항에 대한 감사증거\n (3) 회계추정치와 관련된 복잡성과 추정불확실성에 대한 정보\n (4) 회계추정치의 경영진 편의 가능성이나, 경영진 편의의 가능성을 나타내는 징후에 대한 정보","이전 회계추정치 비교"],[11,"진","추정 복주고정","중요왜곡표시위험을 식별하고 고유위험을 평가할 때 고려사항\n 1) 회계추정치에 추정불확실성이 있는 정도 \n 2) 다음 사항이 복잡성, 주관성 또는 기타 고유위험요소에 영향을 받는 정도\n (1) 회계추정치를 도출할 때 방법, 가정, 그리고 데이터의 선택과 적용\n (2) 재무제표에 포함될 경영진의 점추정치와 관련 공시의 선택","회계추정치 RMM 고유위험평가"],[11,"진","후 방테 점범","회계추정치와 관련된 감사인의 추가감사절차\n (1) 감사보고서일까지 발생한 사건으로부터 감사증거를 입수\n (2) 경영진의 회계추정치 도출방법에 대한 테스트\n (3) 감사인의 점추정치 또는 범위추정치의 도출","회계추정치 추가감사절차"],[11,"진","계징일의","유의적 가정과 관련한 추가감사절차에 포함되어야 하는 사항\n (1) 유의적 가정이 해당 재무보고체계의 관점에서 적합하며, 해당되는 경우 전기로부터의 변경이 적합한지 여부\n (2) 유의적 가정을 선택할 때 이루어진 판단이, 경영진의 편의가능성에 대한 징후를 발생시키는지 여부\n (3) 유의적 가정이 서로 간에, 그리고 다른 회계추정치에 사용되는 가정과 일관되는지, 또는 감사에서 입수한 감사인의 지식에 근거했을 때, 기업의 사업활동의 다른 분야에서 사용되는 가정과 일관되는지 여부\n (4) 해당되는 경우 경영진이 특정한 일련의 조치를 취할 의도가 있고 그러한 능력이 있는지 여부","회계추정치 유의적 가정 추가감사절차"],[11,"진","증합추추","만약 경영진이 유의적 위험이 유발되는 회계추정치의 추정불확실성에 따른 영향에 적절히 대응하지 못했다고 판단하면, 회계추정치의 합리성을 평가하기 위한 범위추정치를 도출해야 한다.\n감사인이 범위추정치를 도출하는 경우 수행절차\n (1) 충분하고 적합한 감사증거에 의해 뒷받침되며, 해당 재무보고체계의 측정목적과 기타 요구사항의 관점에서 합리적이라고 감사인에 의해 평가된 금액만 포함하는지를 판단한다.\n (2) 추정불확실성을 기술하는 재무제표의 공시에 대한 평가된 중요왜곡표시위험과 관련된 충분하고 적합한 감사증거를 입수하기 위한 추가감사절차를 설계하고 수행한다.","감사인 범위추정치 도출 수행절차"],[11,"진","계증여","수행한 감사절차와 입수한 감사증거를 바탕으로 평가할 사항\n (1) 경영진 편의가능성을 나타내는 징후가 식별되었을 때를 포함하여, 경영진주장 수준의 중요왜곡표시위험의 평가가 여전히 적합한지 여부\n (2) 회계추정치의 인식, 측정, 재무제표에의 표시 및 공시에 대한 경영진의 결정이, 해당 재무보고체계에 따르는지 여부\n (3) 충분하고 적합한 감사증거를 입수했는지 여부","회계추정치 감사증거의 평가"],[11,"진","유가방데적","회계추정치와 관련하여 경영진으로부터 수령해야 할 서면진술 \n경영진이 회계추정치와 관련 공시를 도출할 때 사용한 방법, 유의적 가정, 데이터가 해당 재무보고체계에 따른 인식, 측정 또는 공시를 달성하기에 적합한지 여부","회계추정치 서면진술의 수령"],[6,"진","이해감유","커뮤니케이션 형태에 영향을 미치는 요인\n260-A47 이해감유\n① 경영진이 이전에 그러한 사항들에 대해 커뮤니케이션 한 적이 있었는지 여부\n② 해당 사항들이 만족할 정도로 해결되었는지 여부\n③ 해당 사항의 논의가 감사보고서에 포함될 것인지 여부\n④ 특정 사항의 유의성","커뮤니 시기 영향 요인"],[17,"진","발록간식수","재무제표일 후 감사보고서일까지 발생한 사건에 대한 구체적인 절차\n560-7 발록간식수\n① 경영진이 후속사건을 식별하기 위해 수립한 절차들을 이해한다\n② 재무제표에 영향을 미칠 수 있는 후속사건이 발생했는지 여부에 대하여 경영진(지배기구)에게 질문한다\n③ 재무제표일 후에 개최된 주주, 경영진 그리고 지배기구 회의록이 있을 경우 이를 열람하고, 회의록이 아직 이용가능하지 않는 경우에는 해당 회의에서 논의된 사항들에 대하여 질문함\n④ 기업의 최근 후속 중간재무제표가 있다면, 이를 열람한다","재무제표일 후 감사보고서일까지 발생 사건 구체적 절차"],[17,"진","특전 소미 후회","재무제표의 작성 관련 필수 서면진술에 포함되는 사항\n580-보론2 특전 소미 후회\n① 특수관계자\n② 감사 전제조건\n③ 소송과 배상청구\n④ 미수정왜곡표시\n⑤ 후속사건\n⑥ 회계추정치","재무제표 작성 관련 필수 서면진술"],[16,"진","포베중단 추행투평","통제테스트로서의 속성표본감사의 유의사항\n포베중단 추행투평\n① 포아송분포를 가정함\n② 과대신뢰위험(β위험)만 고려함\n③ 이탈이란 통제가 설계된대로 운영되지 않을 때 발생하며, 중요성기준이 적용되지 않음\n④ 표본단위는 물리적 단위이므로, 체계적 추출법을 사용할 경우 장부금액이 아니라, 거래처 수 등을 표본크기로 나누어 표본추출간격을 계산하여야 함\n⑤ 표본추출 시 무작위추출법 등 통계적 표본추출방법이 적용되어야 함\n⑥ 질문, 관찰, 검사 및 재수행만 수행됨\n⑦ 표본이탈율을 모집단에 투영하지 않음\n⑧ 결과 평가 시 모집단이탈상한율을 허용이탈율과 비교하여야 함","통제테스트로서의 속성표본감사의 유의사항"],[16,"진","포베단 추행투평","세부테스트로서의 금액가중확률표본감사의 유의사항\n포베단 추행투평\n① 포아송분포를 가정함\n② 부당수용위험(β위험)만 고려함\n③ 표본단위는 화폐단위이므로, 체계적 추출법을 사용할 경우 장부금액을 표본크기로 나누어 표본추출간격을 계산하여야 함\n④ 표본추출 시 금액단위추출법, 층화추출법, 체계적추출법이 동시에 사용되고, 첫 표본의 경우 임의추출법 또는 무작위추출법을 사용할 수 있음\n⑤ 왜곡표시가 공통된 특징을 갖고 있는 경우 이에 대해 감사절차를 확대하기로 결정하거나 전수조사를 수행하여야 함\n⑥ 왜곡표시의 규모에 대한 개괄적 관점을 얻기 위해 왜곡표시를 모집단에 투영해야함. 그러나 변이로 밝혀진 왜곡표시를 모집단으로 투영하지 않음\n⑦ 결과 평가 시 추정오류상한액을 허용오류금액과 비교하여야 함","세부테스트로서의 금액가중확률표본감사의 유의사항"],[16,"진","공모확 의부고","감사인이 식별된 이탈과 왜곡표시를 분석할 때 어떤 공통된 특징이 발견된 경우 결정해야 할 사항\n530-A17 공모확 의부고\n① 모집단에서 해당 공통된 특징을 가지고 있는 모든 항목을 식별하여 이에 대하여 감사절차를 확대하기로 결정할 수 있을 것이다\n② 이와 같은 종류의 이탈과 왜곡표시는 의도적인 것일 수 있고 따라서 부정의 가능성을 나타내는 것인지 고려해야 한다","감사인이 식별된 이탈과 왜곡표시를 분석할 때 어떤 공통된 특징이 발견된 경우 결정해야 할 사항"],[16,"진","목타미영 변모대높","이탈과 왜곡표시의 성격과 원인 조사과정에서 파악해야할 사항\n530-12~13\n목타미영 변모대높\n① 감사인은 식별된 이탈이나 왜곡표시의 성격과 원인을 조사하고, 감사절차의 목적과 타 감사분야에 미칠 수 있는 영향을 평가하여야 한다\n② 극히 드문 상황에서, 감사인이 표본에서 발견된 어떤 왜곡표시나 이탈이 변이라고 고려하는 경우, 감사인은 그러한 왜곡표시나 이탈이 모집단을 대표하는 것이 아니라는 것에 대하여 높은 수준의 확실성을 가져야 한다","이탈과 왜곡표시의 성격과 원인 조사과정에서 파악해야할 사항"],[19,"진","의거중캠책책 강기","감사보고서 내용과 관련된 구성요소\n의거중캠책책 강기\n① 감사의견\n② 감사의견근거\n③ 계속기업 관련 중요한 불확실성\n④ 핵심감사사항(KAM)\n⑤ 재무제표에 대한 경영진과 지배기구의 책임\n⑥ 재무제표감사에 대한 감사인의 책임\n⑦ 강조사항문단 및 기타사항문단","감사보고서 내용과 관련된 구성요소"],[19,"진","이사단명간주","감사의견단락 전단(형식적인 정보): 감사대상\n이사단명간주\n① 감사대상 기업의 이름\n② 해당 재무제표가 감사받았다는 사실\n③ 재무제표를 구성하는 단위재무제표의 명칭\n④ 재무제표를 구성하는 단위재무제표의 보고대상 일자나 기간\n⑤ 유의적인 회계정책의 요약을 포함한 재무제표의 주석에 대한 언급","감사의견단락 전단(형식적인 정보): 감사대상"],[19,"진","우별회한","감사의견단락 후단(실질적인 정보): 감사의견\n우별회한\n① 우리의 의견으로는\n② 별첨된 회사의 재무제표는\n③ 회사의 20XX년 12월 31일 현재의 재무상태와 동일로 종료되는 보고기간이 재무성과 및 현금흐름을\n④ 한국채택국제회계기준에 따라, 중요성의 관점에서 공정하게 표시하고 있습니다","감사의견단락 후단(실질적인 정보): 감사의견"],[21,"진","개무적 격상중","유의적 부문의 결정 기준\n600-9 개무적 격상중\n① 그룹에 대하여 개별적으로 재무적 유의성을 가짐\n② 고유한 성격이나 상황으로 인하여 그룹재무제표의 유의적인 중요왜곡표시위험을 포함","유의적 부문의 결정 기준"],[21,"진","정커전","수용 및 유지 여부 결정시 이해할 사항(신규업무의 경우 정보의 원천)\n600-A10 정커전\n① 그룹경영진이 제공한 정보\n② 그룹경영진과의 커뮤니케이션\n③ 해당되는 경우, 전기의 그룹업무팀, 부문경영진 또는 부문감사인과의 커뮤니케이션","수용 및 유지 여부 결정시 이해할 사항(신규업무의 경우 정보의 원천)"],[21,"진","개무적 격상중","부문재무정보가 유의한지 여부를 판단하는 기준\n600-26, 27 개무적 격상중\n① 그룹에 대하여 개별적으로 재무적 유의성을 가짐\n② 고유한 성격이나 상황으로 인하여 그룹재무제표의 유의적인 중요왜곡표시위험을 포함","부문재무정보가 유의한지 여부를 판단하는 기준"],[22,"진","수업감","내부회계관리제도감사의 감사보고서와 재무제표 감사보고서의 동일사항\n1100-69 수업감\n① 수신인\n② 업무수행이사 이름\n③ 감사보고서일\n내부회계관리제도감사의 전제조건을 확인","내부회계관리제도감사의 감사보고서와 재무제표 감사보고서의 동일사항"],[22,"진","수식원통 미속의컴보","내부회계관리제도 감사 FLOW\n수식원통 미속의컴보\n① ICFR 감사계획 수립: 위험평가 및 중요성 결정\n② 유의적인 거래유형, 계정잔액 및 공시와 관련 경영진주장 식별\n③ 왜곡표시 가능한 원천에 대한 이해\n④ 테스트 대상 통제의 선정 및 통제테스트(설계효과성 및 운영효과성 테스트)\n⑤ 내부회계관리제도 미비점의 식별과 평가\n⑥ 후속사건에 대한 고려\n⑦ 의견형성 및 경영진 서면진술 입수\n⑧ 내부회계 관련사항의 커뮤니케이션\n⑨ 내부회계 관리제도에 대한 보고","내부회계관리제도 감사 FLOW"],[16,"진","표적층 작계","금액가중확률 표본감사의 장점\n표적층 작계\n① 표본수를 결정할 때 표준편차 등을 직접 고려할 필요가 없다\n② 일반적으로 실물단위표본감사(전통적 변수표본감사)보다 적용하기가 쉽다\n③ 표본이 화폐금액에 비례해서 추출되기 때문에 자동적으로 계층화의 결과를 가져온다. 그리고 금액이 큰 항목은 추출될 확률이 높아서 자동적으로 큰 금액이 강조된다\n④ 오류의 발생이 예상되지 않는다면 실물단위표본감사(전통적 변수표본감사)보다 추출할려 할 표본수가 작아 효율적이다\n⑤ 모집단이 체계적으로 구성되어 있지 아니하더라도 추출이 가능하고, 표본의 설계가 비교적 쉽다","금액비례 표본감사의 장점"],[16,"진","대소영 허수","금액가중확률 표본감사의 단점\n대소영 허수\n① 만약 표본에서 과대계상액과 과소계상액이 함께 확인되었다면 표본 결과를 평가할 때 이들을 상호분리하여 별도로 계산하여야 하는 번거로움이 있다\n② 금액이 0인 항목은 표본으로 추출되지 않기 때문에 따로 분리해서 그 항목들을 검증하여야 한다\n③ 표본결과를 평가할 때 오류가 발견되었을 경우, 주어진 위험수준에서 표본위험의 허용치를 과\n대평가할 수 있다. 이에 따라 채택되어야 할 모집단이 오히려 기각될 위험도 있다\n④ 모집단의 예상오류액이 증가함에 따라 금액가중확률 표본감사에서의 표본수가 증가한다. 이런 상황에서는 전통적 변수표본감사(실물단위표본감사)보다 표본수가 더 커질 수 있다","금액비례 표본감사의 단점"],[16,"진","(B×R)/T-(S×EF)\n율계상 결질반","금액가중확률 표본감사의 표본수\n(B×R)/T-(S×EF)\nB 장부가액\nT 허용오류액\nS 예상오류액\nR 신뢰계수\nEF 확장계수\n\n금액가중확률 표본감사의 적용\n율계상 결질반\n① 표본결과의 항목별 오류율의 계산\n② 신뢰계수의 계산\n③ 추정오류상한액의 계산\n④ 통계적인 결론\n⑤ 오류의 질적인 요소","금액비례 표본감사의 표본수\n\n금액가중확률 표본감사의 적용"],[19,"진","문발적협후술","기타정보의 입수와 관련한 수행절차\n감사인은 기타정보의 입수와 관련하여, 다음의 절차를 수행하여야 한다.\n  1) 경영진과의 논의를 통해, 사업보고서를 구성하는 문서와 기업이 계획한 그러한 문서의 발행 방식과 시기를 결정함\n  2) 사업보고서를 구성하는 문서의 최종본을 적시에, 가능하다면 감사보고서일 전에 입수하기 위하여, 경영진과 적절한 협의를 함\n  3) 1)에서 결정한 문서의 일부 혹은 전부가 감사보고서일 이후에야 제공될 수 있는 경우, 경영진에게 감사인이 감사기준서 720에서 요구되는 절차들을 완료할 수 있도록, 해당 문서의 최종본을 제공할 수 있을 때, 기업이 발행하기 전에 감사인에게 제공하겠다는 서면 진술을 요청함","기타정보 입수와 관련한 수행절차"],[19,"진","열재지불","기타정보 열람시 수행절차\n감사인은 기타정보를 열람하여야 하며, 이 과정에서 다음 절차를 수행하여야 한다.\n  1) 기타정보와 재무제표 간 중요한 불일치가 있는지 고려함\n  2) 감사에서 입수한 감사증거와 도달한 결론의 관점에서, 기타정보와 감사에서 얻은 감사인의 지식 간에 중요한 불일치가 있는지 고려함","기타정보 열람시 수행절차"],[19,"진","기재환","중요한 불일치 존재나 기타정보가 중요하게 왜곡표시된 것으로 보이는 경우 추가감사절차를 수행해 결론을 내려야 하는 3가지 사항\n  1) 기타정보에 중요한 왜곡표시가 존재하는지 여부\n  2) 재무제표에 중요한 왜곡표시가 존재하는지 여부\n  3) 기업과 기업환경에 대한 감사인의 이해가 갱신될 필요가 있는지 여부","중요한 불일치 존재나 기타정보가 중요하게 왜곡표시된 것으로 보이는 경우 추가감사절차를 수행해 결론을 내려야 하는 3가지 사항"],[19,"진","수수컴","기타정보에 중요한 왜곡표시가 존재한다고 결론을 내린 경우 수행절차\n  1) 경영진에게 기타정보를 수정할 것을 요구하여야 한다.\n  2) 이후 다음의 절차를 수행하여야 한다.\n  (1) 경영진이 수정에 동의하는 경우, 수정이 이루어졌는지 결정함\n  (2) 경영진이 수정을 거부하는 경우, 이 사실을 지배기구와 커뮤니케이션하고 수정을 요구함","기타정보에 중요한 왜곡표시가 존재한다고 결론을 내린 경우 수행절차"],[19,"진","시계컴해 / 주법","지배기구와 커뮤니케이션한 후에도 기타정보가 수정되지 않는 경우 수행절차\n  1) 감사보고서일 전\n(1) 감사보고서에 미치는 시사점을 고려하고, 감사보고서에서 중요한 왜곡표시를 어떻게 다룰 계획인지 지배기구와 커뮤니케이션함\n(2) 해당 법규에서 가능한 경우, 감사업무를 해지함\n 2) 감사보고서일 후 \n감사보고서 이용자가 중요한 미수정왜곡표시에 적절하게 주의를 기울일 수 있도록, 감사인의 법적 권리와 의무를 고려하여 적절한 조치를 취함","지배기구와 커뮤니케이션한 후에도 기타정보가 수정되지 않는 경우 수행절차"],[19,"진","책식표책전없미","기타정보 단락에 포함할 사항\n  1) 경영진이 기타정보에 책임이 있다는 설명\n  2) 감사보고서일 전에 입수한 기타정보와, 상장기업의 경우 감사보고서일 후에 입수할 것으로 예상되는 기타정보의 식별\n  3) 감사의견은 기타정보를 포함하지 않으며, 따라서 감사인은 기타정보에 대해 감사의견이나 어떠한 형태의 확신도 표명하지 않고, 앞으로도 표명하지 않을 것이라는 설명\n  4) 기타정보의 열람, 고려, 보고와 관련된 감사인의 책임에 대한 기술\n  5) 기타정보가 감사보고서일 전에 입수된 경우, 다음 중 하나\n(1) 감사인이 보고할 내용이 없다는 설명\n(2) 감사인이 기타정보에 중요한 미수정왜곡표시가 있다고 결론내린 경우, 기타정보의 중요한 미수정왜곡표시를 기술하는 설명","기타정보 단락에 포함할 사항"],[7,"진","유정활이 유커이 내경지삼","정보시스템 및 커뮤니케이션과 관련하여 이해할 사항\n  1) 유의적인 거래유형, 계정잔액 및 공시에 대한 기업의 정보처리활동을 이해한다.\n  2) 기업이 재무제표 작성과 관련 보고 책임을 뒷받침하는 유의적 사항들을, 정보시스템과 내부통제시스템의 기타 구성요소에서 다음의 커뮤니케이션을 하는 방법을 이해한다.\n (1) 재무보고 역할과 책임이 커뮤니케이션되는 방법을 포함한 기업 내 사람들 간의 커뮤니케이션\n (2) 경영진과 지배기구 간의 커뮤니케이션\n (3) 규제당국과 같은 외부 제삼자와의 커뮤니케이션","(IT) IT 시스템 2가지 이해할 사항"]];

    };
    const oldSt=localStorage.getItem(OLD_SK);
    if(oldSt){localStorage.setItem(SK,JSON.stringify(migrateIds(JSON.parse(oldSt))))}
    const oldQz=localStorage.getItem(OLD_QK);
    if(oldQz){localStorage.setItem(QK,JSON.stringify(migrateIds(JSON.parse(oldQz))))}
    const oldHist=localStorage.getItem(OLD_HK);
    if(oldHist){
      const h=JSON.parse(oldHist);
      const newH={};
      for(const d in h){
        const entry=h[d];
        const newItems=(entry.i||[]).map(id=>MIG[id]).filter(x=>x!==undefined);
        newH[d]={c:entry.c||0,i:newItems};
      }
      localStorage.setItem(HK,JSON.stringify(newH));
    }
    const oldStrk=localStorage.getItem(OLD_STK);
    if(oldStrk){localStorage.setItem(STK,oldStrk)}
    console.log("[v9 migration] Data migrated from v8 localStorage keys");
  }catch(e){console.warn("Migration failed:",e)}
})();

function useS(key,def){
  const[d,setD]=useState(()=>{try{const s=localStorage.getItem(key);if(s)return JSON.parse(s)}catch(e){}return def});
  const ref=useRef(d);
  useEffect(()=>{ref.current=d;try{localStorage.setItem(key,JSON.stringify(d))}catch(e){}},[key,d]);
  const up=useCallback(fn=>{setD(p=>{const n=typeof fn==="function"?fn(p):fn;ref.current=n;return n})},[]);
  return[d,up,ref];
}

function App(){

  const[qzM,saveQz,qzR]=useS(QK,{});

  const[streak,saveStrk]=useS(STK,{d:0,l:""});
  const[mode,setMode]=useState("home");
  const[sf,setSf]=useState("전체");
  const[cf,setCf]=useState("전체");
  const[qsf,setQsf]=useState("전체");
  const[sq,setSq]=useState("");
  const[toast,setToast]=useState(false);
  const tR=useRef(null);
  const flash=useCallback(()=>{setToast(true);if(tR.current)clearTimeout(tR.current);tR.current=setTimeout(()=>setToast(false),1200)},[]);

  useEffect(()=>{
    const td=new Date().toISOString().slice(0,10);
    if(streak.l!==td){
      const yd=new Date(Date.now()-86400000).toISOString().slice(0,10);
      saveStrk({d:streak.l===yd?streak.d+1:1,l:td});
    }
  },[]);

  const gs=useCallback(id=>stM[id]||ALL[id]?.st||"진행 중",[stM]);
  const ss=useCallback((id,s)=>{
    saveSt(p=>({...p,[id]:s}));flash();
    const td=new Date().toISOString().slice(0,10);
    saveHist(p=>{const h={...p};if(!h[td])h[td]={c:0,i:[]};h[td].c++;if(!h[td].i.includes(id))h[td].i.push(id);return h});
  },[saveSt,flash,saveHist]);
  const gq=useCallback(id=>qzM[id]||null,[qzM]);
  const sqz=useCallback((id,m)=>{saveQz(p=>({...p,[id]:m}));flash()},[saveQz,flash]);

  const fi=useMemo(()=>ALL.filter(it=>{
    const s=gs(it.id);
    if(sf!=="전체"&&s!==sf)return false;
    if(cf!=="전체"&&it.ch!==cf)return false;
    if(sq){const q=sq.toLowerCase();return it.tp.toLowerCase().includes(q)||it.ac.toLowerCase().includes(q)||it.ct.toLowerCase().includes(q)}
    return true;
  }),[sf,cf,sq,gs]);

  const stats=useMemo(()=>{
    const s={total:ALL.length,"완벽":0,"헷갈림":0,"진행 중":0};
    ALL.forEach(it=>{s[gs(it.id)]++});return s;
  },[gs]);

  const weakCnt=useMemo(()=>ALL.filter(it=>{const s=gs(it.id);const m=gq(it.id);return s==="헷갈림"||m==="틀림"||m==="헷갈림"}).length,[gs,gq]);

  const T=toast&&<div style={{position:"fixed",top:12,right:12,zIndex:9999,padding:"8px 14px",borderRadius:8,background:"#065f46",color:"#d1fae5",fontSize:12,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,0.3)",animation:"toast 1.5s ease-in-out",border:"1px solid #10b981"}}>✓ 저장됨</div>;

  if(mode==="home")return<>{T}<Home stats={stats} setMode={setMode} gs={gs} gq={gq} stR={stR} qzR={qzR} histR={histR} streak={streak} weakCnt={weakCnt}
    onRestore={(s,q)=>{if(s)saveSt(s);if(q)saveQz(q);flash()}}/></>;
  if(mode==="study")return<>{T}<Study items={fi} gs={gs} ss={ss} sf={sf} setSf={setSf} cf={cf} setCf={setCf} sq={sq} setSq={setSq} stats={stats} back={()=>setMode("home")}/></>;
  if(mode==="quiz")return<>{T}<Quiz items={ALL} gs={gs} ss={ss} gq={gq} sqz={sqz} qsf={qsf} setQsf={setQsf} cf={cf} setCf={setCf} back={()=>setMode("home")}/></>;
  if(mode==="flash")return<>{T}<Flash items={ALL} gs={gs} ss={ss} cf={cf} setCf={setCf} back={()=>setMode("home")}/></>;
  if(mode==="stats")return<>{T}<Stats stats={stats} gs={gs} gq={gq} histR={histR} back={()=>setMode("home")}/></>;
  if(mode==="weak")return<>{T}<Weak items={ALL} gs={gs} ss={ss} gq={gq} back={()=>setMode("home")}/></>;
  return null;
}

function Bak({stR,qzR,histR,onRestore}){

  const exp=()=>{
    const p={v:8,ts:new Date().toISOString(),status:stR.current||{},quiz:qzR.current||{},hist:histR.current||{}};

    if(!sc&&!qc){setMsg({t:"저장할 데이터가 없습니다.",c:"#f59e0b"});return}
    const b=new Blob([JSON.stringify(p)],{type:"application/json"});

    a.href=u;a.download="audit_"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
    setMsg({t:"백업 완료! (상태 "+sc+"개 + 퀴즈 "+qc+"개)",c:"#10b981"});

      const p=JSON.parse(ev.target.result),s=p.status||{},q=p.quiz||{};

        <input ref={fR} type="file" accept=".json" onChange={imp} style={{display:"none"}}/>
        <button onClick={()=>fR.current?.click()} style={{width:"100%",padding:13,borderRadius:10,border:"1.5px solid #3b82f6",background:"#1e40af20",color:"#93c5fd",fontSize:14,fontWeight:700,cursor:"pointer"}}>📤 백업 복원</button>
      </div>
      {msg&&<div style={{marginTop:10,padding:10,borderRadius:8,fontSize:12,color:msg.c,background:"#0f172a",border:"1px solid #334155"}}>{msg.t}</div>}
    </div>
  </div>;
}

        <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9",marginBottom:16,textAlign:"center"}}>출제: {pool.length}개{pool.length<4&&<span style={{color:"#ef4444",fontSize:12}}> (최소 4개 필요)</span>}</div>
        <button onClick={()=>start(pool)} disabled={pool.length<4} style={{width:"100%",padding:14,borderRadius:12,border:"none",background:pool.length>=4?"linear-gradient(135deg,#8b5cf6,#7c3aed)":"#334155",color:"#fff",fontSize:15,fontWeight:700,cursor:pool.length>=4?"pointer":"not-allowed",marginBottom:10}}>시작</button>
        {marked.length>=4&&<button onClick={()=>start(marked)} style={{width:"100%",padding:14,borderRadius:12,border:"1px solid #ef4444",background:"#ef444420",color:"#fca5a5",fontSize:14,fontWeight:600,cursor:"pointer"}}>틀린/헷갈린 ({marked.length}개)</button>}
      </div>}
      {tab==="play"&&q&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:12,color:"#94a3b8"}}>{ci+1}/{qi.length}</div>
          <div style={{display:"flex",gap:8}}><span style={{fontSize:12,color:"#10b981"}}>✓{ss2.c}</span><span style={{fontSize:12,color:"#ef4444"}}>✗{ss2.w}</span></div>
        </div>
        <div style={{height:4,borderRadius:2,background:"#1e293b",marginBottom:16}}>
          <div style={{height:"100%",borderRadius:2,width:(ci/qi.length*100)+"%",background:"#8b5cf6",transition:"width 0.3s"}}/>
        </div>
        <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",borderRadius:14,padding:20,marginBottom:16,textAlign:"center",border:"1px solid #475569"}}>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:8}}>{dir==="a2t"?"앞글자→주제":"주제→앞글자"}</div>
          <div style={{fontSize:dir==="a2t"?28:15,fontWeight:800,color:dir==="a2t"?"#c4b5fd":"#f1f5f9",letterSpacing:dir==="a2t"?6:0}}>{dir==="a2t"?q.ac:q.tp}</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:8}}>{q.ch}</div>
        </div>
        <div style={{display:"grid",gap:8,marginBottom:12}}>
          {q.options.map((o,i)=>{
            let bg="#1e293b",bd="#334155",tc="#e2e8f0";
            if(sr){if(o===q.answer){bg="#065f4640";bd="#10b981";tc="#10b981"}else if(o===sel){bg="#991b1b30";bd="#ef4444";tc="#ef4444"}}
            else if(o===sel){bg="#334155";bd="#8b5cf6"}
            return<button key={i} onClick={()=>pick(o)} disabled={sr} style={{padding:"14px 16px",borderRadius:10,border:"1.5px solid "+bd,background:bg,color:tc,fontSize:13,fontWeight:500,textAlign:"left",cursor:sr?"default":"pointer"}}>{o}</button>;
          })}
        </div>
        {sr&&<div>
          <div style={{background:sel===q.answer?"#065f4630":"#991b1b20",borderRadius:10,padding:12,marginBottom:10,border:"1px solid "+(sel===q.answer?"#10b981":"#ef4444")}}>
            <div style={{fontSize:14,fontWeight:700,color:sel===q.answer?"#10b981":"#ef4444",marginBottom:4}}>{sel===q.answer?"정답!":"오답!"}</div>
            <div style={{fontSize:12,color:"#cbd5e1"}}><strong>{q.ac}</strong> = {q.tp}</div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:6,lineHeight:1.5,maxHeight:200,overflowY:"auto"}}>{q.ct}</div>
          </div>
          <div style={{fontSize:11,color:"#94a3b8",marginBottom:6}}>표시:</div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {["완벽","헷갈림","틀림"].map(mk=>{
              const cur=gq(q.id);const on=cur===mk;
              return<button key={mk} onClick={()=>{sqz(q.id,mk);if(mk==="완벽")ss(q.id,"완벽");else ss(q.id,"헷갈림")}} style={{flex:1,padding:8,borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:on?"2px solid":"1px solid #334155",borderColor:mk==="완벽"?"#10b981":mk==="헷갈림"?"#f59e0b":"#ef4444",background:on?(mk==="완벽"?"#065f4630":mk==="헷갈림"?"#92400e30":"#991b1b30"):"#1e293b",color:mk==="완벽"?"#10b981":mk==="헷갈림"?"#f59e0b":"#ef4444"}}>{mk}</button>;
            })}
          </div>
          <button onClick={next} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>{ci<qi.length-1?"다음 문제 →":"결과 보기"}</button>
        </div>}
      </div>}
      {tab==="result"&&<div>
        <div style={{background:"linear-gradient(135deg,#1e293b,#334155)",borderRadius:16,padding:24,textAlign:"center",marginBottom:16,border:"1px solid #475569"}}>
          <div style={{fontSize:48,marginBottom:8}}>🏆</div>
          <div style={{fontSize:22,fontWeight:800,color:"#f1f5f9",marginBottom:4}}>퀴즈 완료!</div>
          <div style={{fontSize:36,fontWeight:800,color:ss2.c/ss2.t>=0.8?"#10b981":ss2.c/ss2.t>=0.5?"#f59e0b":"#ef4444"}}>{Math.round(ss2.c/ss2.t*100)}%</div>
          <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{ss2.c}/{ss2.t}</div>
        </div>
        <button onClick={()=>setTab("setup")} style={{width:"100%",padding:14,borderRadius:10,border:"none",background:"linear-gradient(135deg,#8b5cf6,#7c3aed)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>새 퀴즈</button>
        <button onClick={back} style={{width:"100%",padding:14,borderRadius:10,border:"1px solid #334155",background:"#1e293b",color:"#94a3b8",fontSize:14,cursor:"pointer"}}>홈</button>
      </div>}
    </div>
  </div>;
}

function Stats({stats,gs,gq,histR,back}){
  const cs=useMemo(()=>{
    const m={};ALL.forEach(it=>{if(!m[it.ch])m[it.ch]={t:0,"완벽":0,"헷갈림":0,"진행 중":0};m[it.ch].t++;m[it.ch][gs(it.id)]++});
    return Object.entries(m).map(([ch,s])=>({ch,...s,p:Math.round(s["완벽"]/s.t*100)}));
  },[gs]);
  const qs=useMemo(()=>{const s={"맞음":0,"틀림":0,"헷갈림":0};ALL.forEach(it=>{const m=gq(it.id);if(m&&s[m]!==undefined)s[m]++});return s},[gq]);
  const wd=useMemo(()=>{
    const h=histR.current||{},days=[];
    for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000).toISOString().slice(0,10);days.push({d:d.slice(5),n:h[d]?.i?.length||0})}
    return days;
  },[histR]);
  const mx=Math.max(...wd.map(d=>d.n),1);
  return<div style={{minHeight:"100vh",background:"#0f172a",color:"#e2e8f0",fontFamily:"'Pretendard','Noto Sans KR',sans-serif"}}>
    <div style={{maxWidth:520,margin:"0 auto",padding:"12px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <button onClick={back} style={{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}}>←</button>
        <h2 style={{fontSize:17,fontWeight:700,margin:0}}>통계</h2>
      </div>
      <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #334155"}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>최근 7일</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
          {wd.map((d,i)=><div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:60,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
              <div style={{width:"100%",height:Math.max(4,d.n/mx*56),borderRadius:4,background:d.n>0?"linear-gradient(180deg,#8b5cf6,#6d28d9)":"#334155"}}/>
            </div>
            <div style={{fontSize:9,color:"#64748b",marginTop:4}}>{d.d}</div>
            <div style={{fontSize:9,color:d.n>0?"#8b5cf6":"#475569",fontWeight:600}}>{d.n}</div>
          </div>)}
        </div>
      </div>
      <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #334155"}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>전체 현황</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["완벽","#10b981",stats["완벽"]],["헷갈림","#f59e0b",stats["헷갈림"]],["진행 중","#3b82f6",stats["진행 중"]]].map(([l,c,n])=>
            <div key={l} style={{textAlign:"center",padding:10,borderRadius:8,background:"#0f172a"}}>
              <div style={{fontSize:20,fontWeight:800,color:c}}>{n}</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{l}</div>
              <div style={{fontSize:10,color:"#64748b"}}>{Math.round(n/stats.total*100)}%</div>
            </div>)}
        </div>
      </div>
      <div style={{background:"#1e293b",borderRadius:14,padding:16,marginBottom:12,border:"1px solid #334155"}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>퀴즈</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[["맞음","#10b981",qs["맞음"]],["틀림","#ef4444",qs["틀림"]],["헷갈림","#f59e0b",qs["헷갈림"]]].map(([l,c,n])=>
            <div key={l} style={{textAlign:"center",padding:10,borderRadius:8,background:"#0f172a"}}>
              <div style={{fontSize:20,fontWeight:800,color:c}}>{n}</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{l}</div>
            </div>)}
        </div>
      </div>
      <div style={{background:"#1e293b",borderRadius:14,padding:16,border:"1px solid #334155"}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12}}>단원별</div>
        <div style={{maxHeight:400,overflowY:"auto"}}>
          {cs.map((x,i)=><div key={i} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,color:"#94a3b8",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.ch}</span>
              <span style={{fontSize:11,fontWeight:700,color:x.p>=80?"#10b981":x.p>=40?"#f59e0b":"#ef4444",marginLeft:8}}>{x.p}%</span>
            </div>
            <div style={{height:6,borderRadius:3,background:"#0f172a",overflow:"hidden"}}>
              <div style={{display:"flex",height:"100%"}}>
                <div style={{width:(x["완벽"]/x.t*100)+"%",background:"#10b981"}}/>
                <div style={{width:(x["헷갈림"]/x.t*100)+"%",background:"#f59e0b"}}/>
                <div style={{width:(x["진행 중"]/x.t*100)+"%",background:"#3b82f6"}}/>
              </div>
            </div>
          </div>)}
        </div>
      </div>
    </div>
  </div>;
}

try{ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App))}catch(e){document.getElementById("root").innerHTML='<div style="color:#ef4444;padding:20px;font-size:13px">'+e.message+'</div>'}

</script>
</body>
</html>

window.RD=[[0,"완","재공감신판","감사는 감사대상 재무제표가 회사의 재무상태와 경영성과 및 기타 재무정보를 회계기준에 따라 중요성의 관점에서 공정하게 표시하고 있는지에 대하여 감사인이 독립적으로 의견을 표명 함으로써 재무제표의 신뢰성을 제고하고 재무제표의 이용자가 회사에 관하여 올바른 판단을 할 수 있도록 함을 목적으로 한다","감사의 목적"],[0,"완","재포왜정정못경","재무제표에 포함되어 있는 왜곡표시된 정보를 이용하여 정보이용자가 잘못된 경제적 의사결 정을 내릴 위험","정보위험 정의"],[0,"헷","이원복대","① 정보이용자와 정보제공자간 이해관계의 상충 ② 회계정보가 정보이용자에게 미치는 중대한 영향 ③ 회계정보의 복잡성 ④ 정보이용자와 정보원과의 원격성","정보위험 원인"],[0,"진","자매종부사","외부감사의 대상(주권비상장회사) 「외감법 §4 자매부종사 ① 직전 연도의 자산총액 120억원 이상 ② 직전 연도의 부채총액 70억원 이상 ③ 직전 연도의 매출액이 100억원 이상 ④ 직전 연도 말의 종업원 수가 100명 이상 ⑤ 사원수가 50인 이상(유한회사만 해당)","감사대상"],[0,"진","부투차내","회계감사를 통해 감사대상회사가 얻을 수 있는 효익 내비예 ① 내부통제의 개선 ② 자본조달비용의 감소 ③ 부정과 오류의 예방","감사대상 효익"],[0,"완","고설","감사기준이 절대적인 수준의 확신을 요구하지 않는 이유 고설 ① 감사에는 고유한계가 존재하며 ② 감사인의 결론도출과 의견표명의 기초가 되는 대부분의 감사증거는 결정적 증거이기 보다는 설득적 증거이기 때문이다","감사 고유한계"],[0,"진","재절합","감사의 고유한계의 원인 재감합 ① 재무보고의 성격 ② 감사절차의 성격 ③ 재무보고의 적시성 및 효익과 비용간의 균형","고유한계 원인"],[0,"헷","판주평불특","① 재무보고의 성격(골프지구폭발) • 기업이 해당 재무보고체계에서 요구하는 사항을 그 기업의 사실과 상황에 적용하여 재무제 표를 작성할 때는 경영진의 판단이 수반됨 • 다수의 재무제표 항목에는 주관적인 결정이나 평가 또는 불확실성이 수반됨","재무보고 성격"],[0,"헷","완공범","② 감사절차의 성격(완전부은공법) • 정보를 완전하게 제공하지 않을 수 있다 • 부정에는 이를 은폐하기 위해 정교하고 치밀하게 구성된 계획이 수반될 것이다 • 감사는 범죄 혐의를 밝히려는 공적 수사가 아니다.따라서 수색권한과 같은 특정한 법적 권 한을 부여받고 있지 않다","감사절차 성격"],[0,"헷","합시합비 테집계","높은 수준의 확신을 달성하기 위하여 요구되는 감사절차 계집테스트 ① 감사가 효과적으로 수행될 수 있도록 계획함 ② 부정이나 오류에 의한 중요왜곡표시위험이 포함될 것으로 가장 높게 예상되는 분야에 감사노 력을 집중하고, 그렇지 아니한 다른 분야에는 상대적으로 적은 노력을 기울임 ③ 모집단의 왜곡표시를 조사하기 위해 테스트나 기타 수단을 사용함","시간/비용 한계"],[0,"완","대생낮만","감사의 고유한계가 대체적인 절차가 없는 감사절차의 생략의 근거가 될 수 없는 이유 대생낮만 어려움, 시간 또는 비용의 문제 그 자체는 감사인이 대체적인 절차가 없는 감사절차를 생략하 거나 보다 설득력이 낮은 감사증거에 만족하는 정당한 근거가 되지 못한다","대체절차 생략불가"],[0,"완","발완정분기표","감사대상기간의 거래 및 사건의 유형과 관련된 공시 전류표/발생사실/정기 ① 완전성 ② 분류 ③ 표시 ④ 발생사실 ⑤ 정확성 ⑥ 기간귀속","거래유형 주장"],[0,"완","실완권평정분표","보고기간말 계정잔액 및 관련공시 전류표/실재성/정평배 권위 ① 완전성 ② 분류 ③ 표시 ④ 실재성 ⑤ 정확성, 평가 및 배분 ⑥ 권리와 의무","계정잔액 주장"],[0,"헷","범명묵 이명","공정표시 재무보고체계와 준수 재무보고체계 범명묵 이명 ① 재무제표의 공정한 표시를 달성하기 위하여 경영진이 해당 체계가 특정하여 요구하는 범위 이 상으로 공시하는 것이 필요할 수 있다고 명시적이거나 묵시적으로 인정함 ② 재무제표의 공정한  인증업무팀원과 인증의뢰인이나 그 경영자 간에 형성된 친밀한 사업관계의 경우 안전장치 윤리기준 290.132 종감제거 ① 해당 사업관계 종료 ② 이해관계가 중요하지 않고 명백하게 경미한 관계가 되도록 금액 감소 ③ 해당 인증업무 수행 거절 또는 해당 구성원을 인증업무팀에서 제외","친밀한 사업"],[2,"진","투일마","인증의뢰인과 친밀한 사업관계 예시 윤리기준 290.132 판공마 ① 회계법인과 인증의뢰인의 서비스나 상품을 결합하여 일괄 판매하는 약정을 체결한 경우(상호 상품 결합판매) ② 감사대상회사의 공동투자에서 중요한 재무적 이해관계를 가지는 경우(공동투자관계) ③ 회계법인이나 인증의뢰인이 상대방의 상품이나 서비스를 유통하거나 마케팅을 수행하는 약정 을 체결한 경우(상호마케팅)","친밀사업 예시"],[2,"진","공이변 사제품업근 내제품","(인증업무와 동시 수행 시) 비인증업무의 성공보수 안전장치 윤리기준 290.212 내3품 ① 보수의 성격과 범위를 감사위원회 등 내부감시기구에 보고 ② 독립된 제3자에 의한 최종보수의 검토 또는 결정 ③ 품질관리 정책과 절차","성공보수 안전장치"],[2,"진","현상연이","감사업무를 수임할 수 있으나 안전장치가 필요한 경우 현보연예 ① 현저히 낮은 감사보수로 감사계약을 체결하는 경우(윤리기준 290.209) ② 특정회사의 감사보수가 회계법인 보수총액의 상당한 부분을 차지하는 경우(윤리기준 290.206) ③ 감사보수의 연체(윤리기준 290.208) ④ 감사대상회사로 이직할 예정인 경우(윤리기준 290.145)","이기적(안전)"],[2,"진","적시자구인기지품","현저히 낮은 감사보수로 계약 체결 시 안전장치 윤리기준 290.209 적시자구 인기지품 ① 적절한 시간의 투입과 자질있는 구성원을 해당 업무에 배정함을 입증함 ② 인증업무와 관련된 모든 기준, 지침 및 품질관리절차의 준수를 입증함","낮은 보수 안전장치"],[2,"진","내수외제","특정 인증의뢰인에 대한 보수총액이 회계법인 보수총액의 상당한 부분을 차지하는 경우 안전장치 윤리기준 290.206 내수외제 ① 감사위원회 등 내부감시기구와 보수의 범위와 성격에 관하여 논의 ② 의뢰인에 대한 수임의존도를 줄이기 위한 조치를 취함 ③ 외부의 품질관리검토를 받음 ④ 해당 감독기관 또는 다른 공인회계사 등 제3자로부터 자문을 받음","보수 비중 과다 안전장치"],[2,"진","내공언","연체된 보수 안전장치 윤리기준 290.208 내 모공 연대심각 ① 다음의 안전장치 후 수임가능 • 감사위원회 등 내부감시기구와 연체보수의 규모에 관하여 논의함 • (해당 인증업무에 참여하지 않은) 공인회계사를 추가로 투입하여 인증업무팀이 수행한 업무 를 검토하거나 필요한 경우 조언을 제공하도록 함 ② 다음을 고려하여 재선임되는 것이 적절한지 여부 판단 • 연체보수가 의뢰인에 대한 대출에 상응한 것으로 간주될 수 있는지 여부 • 연체보수의 심각성(중요성)","보수 연체 안전장치"],[2,"진","이협통제독토","현재 인증업무팀원이 장래에 인증의뢰인에게 고용될 것을 알고 있거나 이를 믿을 만한 근거가 있는 경우 안전장치 윤리기준 290.145 통제독 ① 해당 개인이 이러한 사실을 회계법인에게 통보하도록 요구하는 정책과 절차(필수) ② 해당 개인을 해당 인증업무에서 제외시킴(필수) ③ 해당 개인이 업무수행기간동안 행한 중요한 판단에 대하여 독립적인 검토를 수행할 것을 고려","이직 예정 안전장치"],[2,"진","직심제/명않제책상","직계가족과 측근가족이 감사대상회사의 임직원인 경우 안전장치 290.137, 138 제책상 ① 해당 개인을 인증업무팀에서 제외시킴 ② 구성원이 직계가족 또는 측근가족의 책임 하에 있는 사항들을 다루지 않도록 역할과 책임을 조정 ③ 구성원이 독립성 관련 문제를 회계법인 내의 상급자에게 전달하도록 하는 정책과 절차를 마련","가족 임직원 안전장치"],[2,"진","작구실타계자 내임 인형","감사와 동시에 수행할 수 없는 비감사서비스 「CPA법」§21 재내구매 인사 알그보경 ① 회계기록과 재무제표의 작성 ② 내부감사  증보 ① 회사는 직전 사업연도에 해당 회사에 대하여 감사업무를 한 감사인(전기감사인) 외의 다른 감 사인을 감사인으로 선임하거나 전기감사인을 해임하려면 해당 전기감사인에게 감사 또는 감 사위원회에 의견을 진술할 수 있는 기회를 주어야 한다 ② 회사는 해임되는 감사인이 의견을 진술한 경우 그 내용을 증권선물위원회에 보고하여야 한다","감사인 변경"],[5,"진","R중질","감사증거의 충분성에 영향을 미치는 요소(더 많은 양의 감사증거가 요구되는 경우)\n① (중요)왜곡표시위험이 높은 경우\n② 감사증거의 질(적합성)이 낮은 경우(단, 더 많은 감사증거를 입수하는 것이 곧 그 증거의 낮은 품질을 보완할 수는 없음.)\n③ 중요성이 낮은 경우","증거 충분성"],[5,"진","원성통","감사증거의 적합성 중 신뢰성에 영향을 미치는 요소\n500-A31 원성통\n① 감사증거의 원천\n② 감사증거의 성격(문서 형태)\n③ 증거의 작성과 유지에 대한 통제","증거 신뢰성"],[5,"진","절증결기","감사문서의 정의\n230-6 절증결기\n감사문서란 감사인이 수행한 감사절차, 입수한 관련 감사증거 및 감사인이 도달한 결론에 관한 기록을 말하며 감사조서라고도 한다. 감사문서는 전자 혹은 기타 매체의 형태로 기록될 수 있을 것이다.","감사문서 정의"],[5,"진","결근기계수 획감책유품검","감사문서(조서)의 기본 목적\n230-2 결근기법\n① 감사인의 전반적인 목적의 달성에 관한 결론의 근거\n② 감사가 감사기준과 관련 법규의 요구사항에 따라 계획되고 수행되었다는 사실\n감사문서(조서)의 추가적인 목적]\n230-3 수지임기사수\n① 업무팀이 감사를 계획하고 수행하는 것을 지원함\n② 감독책임이 있는 업무팀원들이 감사업무를 지휘•감독하며 감사기준에 따른 검토책임을 완수하도록 지원함\n③ 업무팀이 자신이 수행한 업무에 대하여 책임질 수 있도록 함\n④ 향후의 감사에 지속적으로 유의적인 사항에 대한 기록을 유지함\n⑤ 품질관리기준에 따른 품질관리검토와 검사를 가능하게 함\n⑥ 관련 법규 또는 기타 요구사항에 따른 외부 검사업무 수행을 가능하게 함","조서 작성목적"],[5,"진","유결판증차","숙련된 감사인이 충분히 이해하기 위하여 감사조서에 포함되어야 하는 내용\n230-8 기뻐/수감중/유도한판\n① 감사기준과 관련법규의 요구사항을 준수하기 위해 수행한 감사절차의 성격, 시기 및 범위\n② 감사절차의 수행결과 및 입수한 감사증거\n③ 감사 중 발생한 유의적 사항, 그러한 사항에 대해 도달된 결론 및 결론에 도달할 때 행한 유의적인 전문가적 판단","숙련된 감사인"],[5,"진","정완감증목충정세평","기업이 생산한 정보를 감사증거로 사용할 경우 감사절차\n500-9 정완감증/목충정세평\n① 해당 정보의 정확성과 완전성에 대한 감사증거를 입수함\n② 정보가 감사인의 목적을 위해 충분히 정확하고 자세한지 여부를 평가함","기업정보 사용"],[5,"진","60일","최종감사파일의 취합완료일: 감사보고서일로부터 60일 이내","조서 취합완료"],[5,"진","과지방유부추예","최종감사파일의 취합완료일을 감사보고서일로부터 60일 이내로 정한 이유 과지방 유부추예\n① 감사조서의 취합이 과다하게 지연되는 것을 방지하고\n② 향후 감리나 소송 등에 있어서 감사조서가 감사인에게 유리하게 작용하도록 부당하게 수정되거나 추가되는 행위를 예방하기 위함","취합기한 이유"],[5,"진","유자시","감사인이 감사조서를 수정하거나 추가할 때 문서화할 사항\n230-16 유자시(누가, 언제, 왜)\n① 감사문서를 수정하거나 추가하는 구체적 이유\n② 감사문서를 수정, 추가하고 이를 검토한 자와 그 시기","수정/추가 문서"],[5,"진","당새변검시","감사보고서일 이후 입수한 후속사건의 감사증거에 대해 문서화할 사항 \n230-13 당면/절절한감 또보영/변검시\n① 당면한 상황\n② 수행한 새로운 감사절차 또는 추가적인 감사절차, 입수한 감사증거, 도달된 결론 및 감사보고서에 미친 영향\n③ 이에 따른 감사문서의 변경자와 검토자 및 그 시기","후속사건 문서"],[5,"진","감사중복이유예","감사문서(조서)의 형태, 내용 및 범위를 결정할 때 고려하는 요소\n230-A2 손문수 유예절규중\n① 입수된 감사증거의 유의성\n② 식별된 예외사항의 성격과 범위\n③ 수행하여야 할 감사절차의 성격\n④ 기업의 규모와 복잡성\n⑤ 식별된 중요왜곡표시위험\n⑥ 수행한 업무나 입수한 감사증거의 문서화를 통하여는 손쉽게 결정을 내릴 수 없는 결론이나 그 근거에 대한 문서화의 필요성\n⑦ 이용된 감사 방법론과 수단","문서 형태/범위"],[5,"진","비추상기비적증","분석적절차\n500-A21 비추상기 비적증\n비율과 추세, 관련 있는 재무 또는 비재무정보 간 상관관계를 이용하여 특정 계정잔액에 대한 합리적인 기대치를 산출하고 이를 재무제표상의 금액과 비교함으로써 재무제표상의 금액이 적정한지 여부에 대한 증거를 수집하는 것을 말한다","분석적절차"],[5,"진","상관지속","분석적절차의 가정\n520-A6 상관/지속\n① 데이터 간 상관관계가 존재\n② 알려진 조건에 대한 반증이 없는 한 그러한 관계가 지속된다는 기대","분석적절차 가정"],[5,"진","추재상","분석적절차의 종류\n추재상\n① 추세분석\n• 연도별 매출액의 추세분석(→ 당기 매출이 정상적이인 규모인지 파악)\n• 월별 매출액의 추세분석(→ 비정상적인 매출액이 발생한 월을 파악)\n② 재무비율분석\n• 활동성 비율분석(ex. 당기의 매출채권회전율을 전기, 산업평균과 비교)\n• 수익성 비율분석(ex. 당기의 매출총이익률을 전기, 산업평균과 비교)\n• 안정성 비율분석(ex. 당기의 부채비율을 전기, 산업평균과 비교)\n③ 상관관계분석\n• 차입금과 이자비용 간의 관계 분석\n• 감가상각자산과 감가상각비의 관계 분석\n• 인건비와 종업원 수 간의 관계 분석","분석적절차 종류"],[5,"진","질입타","분석적절차 결과 장부와 기대치가 중요하게 차이가 있는 경우 추가적 감사절차\n520-7 질입타\n① 경영진에게 질문하고 경영진의 답변과 관련성이 있는 적합한 감사증거를 입수함\n② 그러한 상황에 필요한 기타의 감사절차를 수행함","유의적 차이"],[5,"진","알식중평","감사 단계별 분석적절차의 목적\n① 위험평가절차로서의 분석적 절차(생략 불가)\n• 감사인이 알지 못한 기업의 측면들을 식별하고 변화와 같은 고유위험요소가 경영진주장 수준의 왜곡표시 가능성에 어떻게 영향을 미치는지 이해함으로써, 중요왜곡표시위험의 식별과 평가에 도움을 주기 위해 수행해야 함","위험평가 분석"],[5,"진","관신증","② 실증적인 분석적 절차(생략 가능)\n• 관련성이 있고 신뢰할 수 있는 감사증거를 입수하기 위함","실증절차 분석"],[5,"진","이재일결론","③ 전반적인 결론을 내리기 위한 분석적 절차(생략 불가)\n• 감사의 종료시점에 근접하여 기업에 대하여 이해한 바와 재무제표가 일치하는지에 대하여 전반적인 결론을 내리기 위함","결론형성 분석"],[5,"진","필경중세적 데신 기도개충정 수차","실증적 분석적절차의 적용절차\n520-5 절신기차/절데대충차\n① 적절성 결정: 주어진 경영진주장에 대한 평가된 중요왜곡표시위험과 해당되는 경우 이러한 주장에 대한 세부테스트를 고려하여, 특정 실증적인 분석적절차가 적절한지를 결정함\n② 데이터의 신뢰성 평가: 기록된 금액이나 비율에 대한 감사인의 기대치가 도출될 데이터의 신뢰성을 평가함. 이때, 이용가능한 정보의 원천이나 비교가능성 및 그 성격과 관련성을 고려하고, 그 작성에 대한 통제를 고려한다.\n③ 기대치 도출: 기록된 금액이나 비율에 대한 기대치를 도출하고, 그러한 기대치가 개별적으로 또는 다른 왜곡표시와 합쳐져서 재무제표를 중요하게 왜곡표시 시킬 수 있는지 왜곡표시를 식별할 정도로 충분히 정확한지 여부를 평가함\n④ 차이금액 결정: 추가적인 조사를 하지 않고 수용할 수 있는 차이금액을 결정함","실증분석 4단계"],[5,"진","원격교제","사용할 자료의 신뢰성\n520-A12 원격교제\n① 이용가능한 정보의 원천\n② 이용가능한 정보의 성격과 관련성\n③ 이용가능한 정보의 비교가능성\n④ 정보의 완전성과 정확성 및 타당성을 보장하도록 설계된, 정보의 작성에 대한 통제","데이터 신뢰성"],[5,"진","예정세용","기대치의 정확성을 결정짓는 요소\n520-A15 예세정\n① 실증적인 분석적절차의 예상결과가 예측되는 정확성\n② 정보가 세분화될 수 있는 정도\n③ 재무 및 비재무 정보의 이용가능성","기대치 정확성"],[5,"진","중확성","기대치와 차이가 있는 금액이 추가적인 조사없이 수용될 수 있는지 여부를 결정할 때 고려할 요소\n520-A16 중확성\n① 중요성(위험평가 수준)\n② 요구되는 확신수준과의 부합 정도\n③ 왜곡표시가 개별적으로 또는 다른 왜곡표시들과 합칠 때 재무제표를 중요하게 왜곡표시 시킬 가능성","수용가능여부"],[5,"진","과비기대치유사","분석적절차의 예시(재무정보 비교대상 예시)\n520-A1 과예유\n① 과거 보고기간에 대한 비교가능한 정보\n② 기업의 예산 또는 예측과 같은 기업의 기대치 또는 감가상각비의 추정과 같은 감사인의 기대\n③ 유사한 산업정보","비교대상"],[5,"진","이의제기","질문을 통해 증거를 확보하는 이유(질문으로서 얻을 수 있는 증거)\n500-A23~24 확! 이의제기\n① 질문에 대한 답변에서 이전에 갖지 못했던 정보나 확인적 감사증거를 입수할 수 있다\n② 경영진의 의도와 관련될 질문을 통하여 경영진의 의도에 대한 확신을 얻을 수 있다\n③ 질문 이외에 다른 선택가능한 절차가 제한적인 경우 질문은 선택가능한 좋은 감사절차이다\n④ 감사인이 입수한 다른(기존) 정보와 유의적으로 차이가 있는 정보가 입수되는 때도 있다","질문 증거"],[5,"진","참반문동원적선","현금실사 시 유의사항\n재호반 본선\n① 실사일: 재무제표일에 실시한다. 부득이 재무제표일 전이나 후에 실물검사를 실시하는 경우 실물검사일로부터 재무제표일까지의 입출금에 대하여 추가적인 증거(문서검사 등)을 확보하여\n야 한다\n② 동시 실사:현금은 받을어음, 유가증권, 투자자산과 상호 호환성이 있기 때문에 동시에 실시하여야 한다.\n③ 담당자 참관: 실물의 분실 등으로 인한 오해의 소지를 없애기 위하여 담당자 참관 하에 실사를 진행하고, 실사 후 즉시 반환하였음을 확인증 등을 통해 확인받아야 한다\n④ 예금통장 등을 확인할 때에는 반드시 원본을 확인하여야 한다\n⑤ 선택실사할 경우 실사장소를 감사대상회사에 미리 통보하면 감사대상회사가 관련자산의 융통을 저지를 수 있으므로 실사장소를 미리 통보하지 않아야 한다","실사 유의사항"],[5,"진","외직문","외부조회로 입수한 감사증거가 신뢰성이 높은 이유\n외직문(직외독 종전기문)\n① 기업 외부의 독립된 원천으로부터 입수된 감사증거\n② 감사인이 직접 입수한 감사증거\n③ 종이, 전자문서, 기타매체 등 문서형태의 감사증거","외부조회 신뢰성"],[5,"진","불R통무모","소극적 조회를 할 수 있는 예외적인 상황\n505-15 불R통무모 다질소\n① 불일치사항의 발생률이 매우 낮을 것으로 예상됨\n② 감사인은 중요왜곡표시위험(RMM)이 낮다고 평가하였고, 경영진주장과 관련된 통제의 운영효\n과성에 대하여 충분하고 적합한 감사증거를 입수하였음\n③ 감사인은 소극적 조회의 수신자가 그러한 요청을 무시할 상황이나 조건에 대하여 알고있지 아니함\n④ 소극적 조회절차의 대상이 되는 항목의 모집단이 다수의 동질적이며 소액인 계정잔액이나 거\n래 또는 조건들로 구성되어 있음","소극적 조회"],[5,"진","정결 조선 설계 발송","조회과정에서 반드시 감사인이 직접수행해야 하는 절차\n정성송수요\n① 조회대상(조회처)의 선정 및 주소확인\n② 조회서의 작성(단, 발송자 명의는 회사이며, 단순 작업의 경우 회사가 보조가능)\n③ 조회서의 발송\n④ 조회서의 회수\n⑤ 조회결과의 요약•평가","직접통제 4절차"],[5,"진","잔구약계조이면없다","외부조회를 통해서 확인할 수 있는 정보\n505-A1 잔구 조 이\n① 계정잔액과 그 구성요소에 관한 정보\n② 해당기업과 다른 당사 간의 약정, 계약 또는 거래의 조건\n③ 이면계약과 같은 특정의 조건이 없다는 사실","확인 정보"],[5,"진","조종선수표직접회신","조회서의 설계시 결정사항\n수종회\n① 조회서에 수신인이 적절히 표시되었는지 여부\n② 조회서의 종류: 적극적 조회와 소극적 조회 중에 선택\n③ 감사인에게 직접 발송되도록 회신에 관한 정보가 포함되었는지 여부","조회서 설계"],[5,"진","독추대","적극적 조회서 발송 후 미회신 시 대응절차\n독추대\n① 회사를 통해서 독촉(→ 감사대상회사를 통해 회신을 독촉하게 되면 보다 효과적이고 효율적으로 회신율을 높일 수 있음)\n② 추가조회서의 발송이 가능함(→ 조회처가 조회서를 받지 못했다고 답변하는 경우 최초의 주소가 정확한지 다시 확인한 후에 추가적(후속적)인 조회서를 보낼 수 있음. 단, 이것은 필수적인 절차가 아님)\n③ 대체적 감사절차를 수행함(ISA 505-A18)","적극적 미회신"],[5,"진","회선근 지서수","매출채권•매입채무 적극적 조회 미회신에 대한 대체적 절차\n505-A18\n회선말 지상서\n① 매출채권\n• 재무제표일 후 특정 현금회수 조사\n• 선적서류 조사\n• 보고기간말에 근접하여 발생한 매출거래에 대한 조사\n② 매입채무\n• 재무제표일 후 현금 지급 조사\n• 상품수령증의 조사\n• 제3자로부터 서신 조사","미회신 대체절차"],[5,"진","외입부신무공","적극적 조회의 회신이 반드시 필요한 경우\n505-A20 오외/부신\n① 경영진주장을 확인하기 위해 이용가능한 정보가 오직 기업의 외부에서만 입수가능한 경우\n② 특정 부정위험요소로 인하여 감사인이 기업에서 입수한 증거를 신뢰할 수 없는 경우","회신 필수 상황"],[5,"진","왜오부품미","불일치사항의 의미\n505-A21~22 왜부품점\n① 불일치사항은 재무제표의 왜곡표시 또는 잠재적 왜곡표시를 나타내는 것일 수 있다\n② 불일치사항은 외부조희 절차의 시기나 측정상의 문제, 또는 사무적 오류에서 발생된 것일 수도 있고 부정으로 인한 것일 수도 있다\n③ 불일치사항이 유사한 조회처 또는 계정의 회신에 대한 품질을 판단할 수 있는 지침을 제공할 수 있다\n④ 불일치사항은 또 기업의 재무보고에 대한 내부통제의 미비점을 나타내는 것일 수 있다","불일치 의미"],[5,"진","동신미불","외부조회 결과의 분류\n505-A24 동신미불\n① 조회서에 제시된 정보에 대하여 동의를 표하였거나 어떠한 불일치사항이 없이 요청된 정보를 제공해 온 회신\n② 신뢰할 수 없다고 여겨지는 회신\n③ 미회신\n④ 불일치사항을 표시하고 있는 회신","조회결과 분류"],[5,"진","질타합증R평다평","경영진이 감사인의 조회서 발송을 거부할 경우 감사절차\n505-8 대시 질문\n① 관련성이 있고 신뢰할 수 있는 감사증거를 입수할 수 있도록 설계된 대체적 감사절차를 수행\n② 경영진의 거부가 부정위험 등 관련 중요왜곡표시위험에 대한 감사인의 평가와 다른 감사절차의 성격, 시기 및 범위에 대하여 갖는 시사점을 평가함\n③ 경영진의 거부사유에 관하여 질문하고 그 타당성과 합리성에 관해 감사증거를 구함","경영진 거부"],[5,"진","간전확직서 발신자신원 암전 웹 전확 신추 무효화","조회의 회신에 대한 신뢰성에 의문이 제기되는 경우\n505-A12~16 메제 전구간\n① 조회처가 전자메일로 회신하는 경우\n② 회신의 이용에 대한 제한적인 문구가 포함\n③ 팩스나 전자우편 등 전자적으로 수령한 회신\n④ 구두회신\n⑤ 감사인에게 간접적으로 전달","신뢰성 의심"],[5,"진","배컴감시","조회서의 발송에 대한 경영진의 거부 사유가 비합리적이거나 대체적 감사절차로부터 충적감증을 입수하지 못한 경우\n505-9 배컴 감시\n① 지배기구와 커뮤니케이션하여야 한다\n② 해당 감사와 감사의견에 대한 시사점을 결정하여야 한다","거부 비합리"],[5,"진","적역객평업이업적평","경영진측 전문가에 의해 생성된 정보를 이용할 경우 감사절차\n500-8 이적평\n① 경영진측 전문가의 적격성, 역량 및 객관성을 평가\n② 경영진측 전문가가 수행한 업무를 이해\n③ 관련 경영진주장에 대한 감사증거로서, 경영진측 전문가가 수행한 업무의 적합성을 평가","경영진측 전문가"],[5,"진","토토과자감전문","감사인측 전문가의 적격성, 역량 및 객관성 관련 정보의 원천\n620-A15 토토과자질문\n① 감사인측 전문가와의 토의\n② 해당 감사인측 전문가의 업무에 익숙한 타감사인 또는 다른 사람들과의 토의\n③ 감사인측 전문가의 과거 업무에 대한 개인적 경험\n④ 해당 전문가의 관련 자격, 전문직 단체나 협회의 회원, 개업면허 또는 기타 형태의 외부적 공인에 대한 감사인의 지식\n⑤ 감사인이 속한 회계법인의 품질관리정책과 절","정보 원천"],[5,"진","가방데결관합관완정","경영진측 전문가가 수행한 업무의 적합성 평가\n500-A49 가방데결\n① 해당 전문가가 유의적인 가정과 방법을 사용한 경우, 그러한 가정과 방법의 관련성과 합리성\n② 해당 전문가가 수행한 업무에 원천데이터가 유의적으로 사용되는 경우에는, 그러한 원천데이터의 관련성, 완전성 및 정확성\n③ 해당 전문가의 발견사항이나 결론의 관련성과 합리성, 다른 감사증거와의 일관성, 그리고 이들이 재무제표에 적합하게 반영되었는지 여부","업무적합성 평가"],[5,"진","필검평절업적평","감사인이 감사인측 전문가 활용을 결정할 때 고려할 사항(경영진측 전문가 활용 재무제표 작성의 경우)\n620-A9 요내업적고통\n① 경영진측 전문가가 기술적인 수행기준 또는 기타 전문직 요구사항이나 소속 산업의 요구사항을 준수하여야 하는지 여부\n② 경영진측 전문가의 업무에 대한 기업 내부의 통제\n③ 경영진측 전문가의 업무의 성격, 범위 및 목적\n④ 경영진측 전문가의 적격성과 역량\n⑤ 경영진측 전문가가 기업에 고용되었는지 또는 관련 서비스를 제공하도록 기업과 계약된 계약당사자인지 여부\n⑥ 경영진이 경영진측 전문가의 업무에 대하여 통제를 하거나 영향을 줄 수 있는 정도","감사인측 전문가"],[5,"진","안전질서","감사인측 외부전문가의 객관성 평가 시 관련 절차\n620-A20 안전질서\n① 적용가능한 안전장치(해당 전문가에 적용되는 전문직 요구사항 포함)에 대하여 해당 전문가와\n토의하고, 그러한 안전장치가 위협을 수용가능한 수준으로 감소시키는 데 적절한지 여부를 평가함\n② 기업과 감사인측 외부전문가 간에 전문가의 객관성에 영향을 미칠 수 있는 알려진 이해 또는 관계들에 대하여 기업에 질문함\n③ 감사인은 경우에 따라 감사인측 외부전문가가 알고 있는 기업과의 이해 또는 관계들에 대하여 감사인측 전문가로부터 서면진술을 입수하는 것이 적합할 수도 있다","객관성 평가"],[5,"진","경성중예","감사인이 감사인측 전문가 활용을 결정할 때 고려할 사항(일반적인 경우)\n620-A8 활당유원지\n① 경영진이 재무제표를 작성할 때 경영진측 전문가를 활용하였는지 여부\n② 해당 사항의 복잡성 등 관련 사항의 성격과 유의성\n③ 해당 사항에 포함된 중요왜곡표시위험\n④ 해당 사항과 관련된 전문가의 업무에 대한 감사인의 지식과 경험 등 식별된 위험에 대응하는 감사절차의 예상되는 성격, 그리고 감사증거에 대한 대체적 원천의 이용가능성","활용결정 고려"],[5,"진","성준적내고영","감사인이 감사인측 전문가 활용을 결정할 때 고려할 사항(경영진측 전문가 활용 재무제표 작성의 경우)\n620-A9 요내업적고통\n① 경영진측 전문가가 기술적인 수행기준 또는 기타 전문직 요구사항이나 소속 산업의 요구사항을 준수하여야 하는지 여부\n② 경영진측 전문가의 업무에 대한 기업 내부의 통제\n③ 경영진측 전문가의 업무의 성격, 범위 및 목적\n④ 경영진측 전문가의 적격성과 역량\n⑤ 경영진측 전문가가 기업에 고용되었는지 또는 관련 서비스를 제공하도록 기업과 계약된 계약당사자인지 여부\n⑥ 경영진이 경영진측 전문가의 업무에 대하여 통제를 하거나 영향을 줄 수 있는 정도","F/S 작성 활용"],[5,"진","토토과자질문","감사인측 전문가의 적격성, 역량 및 객관성 관련 정보의 원천\n620-A15 토토과자질문\n① 감사인측 전문가와의 토의\n② 해당 감사인측 전문가의 업무에 익숙한 타감사인 또는 다른 사람들과의 토의\n③ 감사인측 전문가의 과거 업무에 대한 개인적 경험\n④ 해당 전문가의 관련 자격, 전문직 단체나 협회의 회원, 개업면허 또는 기타 형태의 외부적 공인에 대한 감사인의 지식\n⑤ 감사인이 속한 회계법인의 품질관리정책과 절차\n⑥ 해당 전문가가 저술한 문헌이나 저서","감사인측 전문가 정보 원천(감)"],[5,"진","성범목결적합평","감사인이 감사인측 전문가의 해당 분야를 이해하는 목적\n620-10 성범목적\n① 감사목적을 위해 감사인측 전문가 업무의 성격, 범위 및 목적을 결정함\n② 감사목적을 위해 감사인측 전문가 업무의 적합성을 평가함","분야이해 목적"],[5,"진","성중유지품","외부 전문가를 활용할 경우 감사절차의 성격, 시기 및 범위\n620-8 R성품유지\n① 전문가의 업무가 관련된 사항에서의 중요왜곡표시위험(RMM)\n② 전문가의 업무가 관련된 사항의 성격\n③ 해당 전문가가 감사인이 속한 회계법인의 품질관리정책과 절차의 적용대상인지 여부\n④ 감사 관점에서 해당 전문가의 업무가 가지는 유의성\n⑤ 해당 전문가가 이전에 수행한 업무에 대한 감사인의 지식과 경험","외부전문가 활용 절차결정 고려"],[5,"진","가방데결","경영진측 전문가가 수행한 업무의 적합성 평가\n500-A49 가방데결\n① 해당 전문가가 유의적인 가정과 방법을 사용한 경우, 그러한 가정과 방법의 관련성과 합리성\n② 해당 전문가가 수행한 업무에 원천데이터가 유의적으로 사용되는 경우에는, 그러한 원천데이터의 관련성, 완전성 및 정확성\n③ 해당 전문가의 발견사항이나 결론의 관련성과 합리성, 다른 감사증거와의 일관성, 그리고 이들이 재무제표에 적합하게 반영되었는지 여부","경영진측 전문가 적합성 평가"],[5,"진","업각커비","감사인측 전문가와 합의할 사항\n620-11 성역커비\n① 감사인측 전문가 업무의 성격, 범위 및 목적\n② 감사인과 감사인측 전문가 각자의 역할과 책임\n③ 감사인측 전문가가 작성하는 보고서의 형태 등 감사인과 감사인측 전문가 간 커뮤니케이션의 성격, 시기 및 범위(감사인측 전문가가 작성하는 보고서의 형태 포함)\n④ 감사인측 전문가가 비밀유지 요구사항을 준수할 필요성","전문가 합의사항"],[5,"진","후합추","감사인측 전문가가 수행한 업무가 부적합할 경우 감사절차\n620-13 후합추수\n① 해당 감사인측 전문가가 수행할 후속업무의 성격과 범위에 대하여 해당 전문가와 합의\n② 해당 상황에 적합한 추가적인 감사절차를 수행: 감사인이 직접 수행하거나 타 전문가를 추가로 활용하는 것을 포함","감사인측 전문가 부적합 시 절차"],[5,"진","배관통효인자기","내부감사기능의 정의\n610-14 배관통효 인자기\n내부감사기능이란 기업지배, 위험관리 및 내부통제 관련 절차들의 효과성을 평가 및 개선하기 위해 설계된 인증 및 자문활동을 수행하는 기업의 기능을 말한다. 예를 들면, 기업에서 상법상 감사, 감사위원회 및 내부감사팀이 여기에 해당된다.","내부감사 정의"],[5,"진","위정객적체","내부감사기능이 수행한 업무의 활용 여부 결정 시 고려할 사항\n610-15 객적체/계수감검문\n① 내부감사기능의 조직 내 위상과 관련 정책 및 절차가 내부감사인의 객관성을 지원하는 정도\n② 내부감사기능의 적격성 수준\n③ 품질관리를 포함하여 내부감사기능이 (계획, 수행, 감독, 검토, 문서화하는) 체계적이고 규율된 접근법을 적용하는지 여부","내부감사기능 활용여부 평가"],[5,"진","충전제조","내부감사기능의 객관성 평가에 영향을 미칠 수 있는 요소\n610-A7 충전제조 고!\n① 내부감사기능의 권한과 책임을 포함하여, 내부감사기능의 조직 내 위상이 전문가적 판단을 무력화하는 편의, 이해의 상충 또는 타인의 부당한 영향으로부터 자유로울 수 있는 내부감사기능의 능력을 지원하는지 여부\n② 이해가 상충되는 내부감사기능의 책임이 없는지 여부\n③ 경영진이나 지배기구가 내부감사기능에 가한 어떠한 제약이나 제한이 있는지 여부\n④ 내부감사인이 관련 전문직 단체의 회원인지 여부\n⑤ 지배기구가 내부감사기능과 관련된 고용결정을 감시하고 있는지 여부","내부감사기능 객관성 요소"],[5,"진","전자2훈련","내부감사기능의 적격성 평가에 영향을 미칠 수 있는 요소\n610-A8\n전자기지 훈련\n① 내부감사인이 관련 전문직 단체의 회원인지 여부\n② 내부감사기능이 기업규모 및 영업성격에 비례하여 적절하고 적합하게 자원을 갖추고 있는지 여부\n③ 내부감사인이 감사에서 적절한 기술적 훈련과 숙련도를 갖추고 있는지 여부\n④ 내부감사인이 기업의 재무보고 및 해당 재무보고체계와 관련하여 필요한 지식을 보유하는지 여부 및 내부감사기능이 기업의 재무제표와 관련된 업무를 수행하는데 필요한 기술을 보유하는지 여부\n⑤ 내부감사업무에 대한 내부감사인의 고용, 훈련 및 업무부여 정책이 수립되어 있는지 여부","내부감사기능 적격성 요소"],[5,"진","토람평계수감검문","내부감사기능이 수행한 업무의 활용 시 수행하여야 할 절차\n610-21~23 토열평/계충결(토요일에 얼평당해서 개충격)\n① 외부감사인이 내부감사기능이 수행한 업무를 활용할 계획인 경우, 외부감사인은 각자의 활동을 조정하는 근거로서 업무의 활용계획을 내부감사기능과 토의하여야 한다\n② 외부감사인은 내부감사인이 수행한 감사절차의 성격 및 범위와 관련된 발견사항을 이해하기 위하여 외부감사인이 활용하기로 계획한 내부감사기능이 수행한 업무와 관련된 내부감사기능의 보고서를 열람하여야 한다\n③ 외부감사인은 다음 사항에 대한 평가를 포함하여 감사목적에 대한 적절성을 결정하기 위해 활용하기로 계획한 내부감사기능의 업무 전체에 대하여 충분한 감사절차를 수행하여야 한다\n• 해당 업무가 적절히 계획, 수행, 감독, 검토 및 문서화되었는지 여부\n• 합리적 결론 도출을 위한 충분하고 적합한 증거가 입수되었는지 여부\n• 도달된 결론이 해당 상황에서 적합하고 내부감사기능이 작성한 보고서가 수행된 업무 결과와 일관성이 있는지 여부","사전절차"],[5,"진","객관적중단","내부감사기능이 수행한 업무가 활용될 수 있는 영역과 범위를 결정하는 근거로 고려될 수 있는 요소\n610-18 객관적 중단\n① 내부감사기능의 조직 내 위상과 관련 정책 및 절차가 내부감사인의 객관성을 적절하게 지원하지 못할수록 업무활용을 줄임\n② 외부감사인의 전반감사전략 및 감사계획에 대한 관련성이 높을수록 업무활용을 늘림\n③ 내부감사기능의 적격성 수준이 낮을수록 업무활용을 줄임\n④ 유의적인 것으로 식별된 위험에 대한 특별한 고려와 함께, 경영진주장 수준의 평가된 중요왜곡표시위험이 높을수록 업무활용을 줄임\n⑤ 관련된 감사절차의 계획 및 수행, 입수된 감사증거의 평가와 같이 많은 판단이 수반될수록 업무활용을 줄임","내부감사기능 활용범위 축소"],[5,"진","위정객적체","내부감사기능이 수행한 업무를 활용한 경우 문서화\n610-36 위정객적체 성범근 적평감\n① 다음 사항에 대한 평가\n• 내부감사기능의 조직 내 위상과 관련 정책 및 절차가 내부감사인의 객관성을 적절하게 지원하는지 여부\n• 내부감사기능의 적격성 수준\n• 품질관리를 포함하여 내부감사기능이 체계적이고 규율된 접근법을 적용하는지 여부\n② 활용된 업무의 성격 및 범위 그리고 해당 결정의 근거\n③ 활용된 업무의 적절성을 평가하기 위하여 외부감사인이 수행한 감사 절차","문서화"],[5,"진","왜개또집재경합상","중요성의 정의\n320-2 왜개또집 재경합상\n누락 등 왜곡표시가 개별적으로 또는 집합적으로 재무제표에 기초한 이용자의 경제적 의사결정에 영향을 미칠 것으로 합리적으로 예상될 수 있는 경우 중요하다고 간주한다","중요성 의미"],[5,"진","불의중지","재무제표 이용자에 대한 감사인의 가정\n320-4 합합중불\n① 이용자는 사업의 경제활동 및 회계에 대하여 합리적인 지식을 보유하고 있으며, 합리적인 주의를 기울여 재무제표에 담긴 정보를 연구하려는 의향을 가지고 있음\n② 이용자는 재무제표에 담긴 정보에 기초하여 합리적인 경제적 의사결정을 함\n③ 이용자는 재무제표가 중요성의 수준에서 작성, 표시되고 감사가 이루어지고 있다는 점을 이해하고 있음\n④ 이용자는 추정치의 사용, 판단 그리고 미래 사건들에 대한 고려에 기초한 금액 측정에 내재하는 불확실성을 인지하고 있음","이용자 가정"],[5,"진","계수왜감평미재평형","중요성 적용시기\n320-5 계수 평 형\n① 감사를 계획하고 수행할 때: 수행중요성\n② 식별된 왜곡표시가 감사에 미치는 영향과 미수정왜곡표시가 있는 경우 재무제표에 미치는 영향을 평가할 때\n③ 감사보고서에 표명할 의견을 형성할 때","중요성 고려 시기"],[5,"진","위중추","감사계획(전반감사전략) 수립시 중요성이 제공하는 정보\n320-6 위중추\n① 위험평가절차의 성격, 시기 및 범위의 결정\n② 중요왜곡표시위험의 식별과 평가\n③ 추가감사절차의 성격, 시기 및 범위의 결정","계획 시 중요성 제공"],[5,"진","재중성소자변","재무제표 전체에 대한 중요성수준을 결정할 때 고려하는 요소\n320-A4 소변 중요성\n① 기업의 소유구조와 자본조달방법\n② 벤치마크의 상대적 변동성\n③ 특정 기업의 재무제표 이용자가 중점을 둘 가능성이 높은 항목들이 존재하는지 여부\n④ 재무제표의 요소\n⑤ 기업의 성격, 기업수명주기상 위치 그리고 기업이 속한 산업 및 경제환경","벤치마크 식별"],[5,"진","기산특","특정 거래유형, 계정잔액, 공시 관련 중요성의 존재 여부 판단 시 고려요소\n320-A11~12 특 산 기대\n① 재무제표에 별도로 공시되는 회사사업의 특정측면에 주의가 집중되는지 여부\n② 기업이 속한 산업에 관련된 주요 공시\n③ 법규, 또는 해당 재무보고체계가 어떤 항목의 측정이나 공시에 대한 이용자의 기대에 영향을 미치는지 여부","특정항목 중요성"],[5,"진","박새로이","중요성 수정이 필요하다고 판단할 수 있는 상황\n320-A14 박새로이\n① 상황이 박뀜(상황의 변화)\n② 새로운 정보\n③ 기업과 사업에 대한 이해의 변화","중요성 수정"],[5,"진","수수추성시범적","전체중요성 수준의 수정 시 수행해야할 감사절차\n320-13 O 낮 추행\n감사인은 제무제표 전체에 대한 중요성(해당되는 경우, 특정 거래유형과 계정잔액 및 공시에 대한 중요성 수준)을 최초에 결정한 중요성보다 낮추는 것이 적합하다고 결정한 경우\n① 추가감사절차의 성격, 시기 및 범위가 여전히 적합한지 여부 결정\n② 수행중요성을 수정하는 것이 필요한지 여부 결정","중요성 낮춘 경우"],[5,"진","판수내고","평가된 중요왜곡표시위험과 관계없이 중요한 거•계•공에 대하여 반드시 실증절차를 설계하고 수행하여야 하는 이유\n330-A42 경통내고 판수\n① 감사인의 위험평가에는 판단이 수반되므로 모든 중요왜곡표시위험이 식별되지 않을 수 있음\n② 경영진의 통제무력화 등 내부통제에 고유한계가 존재","실증절차 필수"],[5,"진","계업의토","적발위험을 감소시키는 데 도움이 되는 사항\n200-A45 PASS (업계전수)\n① 적절한 계획수립(Plan)\n② 업무팀원의 적절한 구성(Assign)\n③ 전문가적 의구심의 적용(Skepticism)\n④ 수행된 감사업무의 감독과 검토(Supervise) 평가된 중요왜곡표시위험과 관계없이 중요한 거•계•공에 대하여 반드","적발위험 감소"],[6,"진","독규지관","본격적으로 감사업무를 시작하기 전 업무팀을 구성하고 업무를 배분하는 과정에서 고려해야 할 사항\n전독규 지관\n① 독립성 및 적격성 고려하여 구성원 선택\n② 회사의 규모, 거래의 복잡성, 감사위험 고려하여 업무팀원 수 결정\n③ 지식과 경험 고려하여 업무배분\n④ 포괄손익계산서 항목 중 재무상태표와 관련성 있는 항목으로 업무배분\n⑤ 전문가 협조 필요성 고려","업무팀 배분"],[6,"진","왜가계용","위험평가절차 수행 시 업무수행이사와 핵심업무팀원이 토의하여야 할 사항\n왜가계용\n① 기업의 재무제표가 중요하게 왜곡표시될 가능성\n② 해당 재무보고체계를 기업의 실질과 상황에 맞게 적용하는 문제","팀원 토의 사항"],[6,"진","통공사특정커","업무팀 내 토의의 기능(효익)\n315-A21 사취통공 배추 중새커\n① 업무팀원들이 기업에 영향을 미치는 사업위험에 대한 정보와 재무제표의 어느 부분이 부정과 오류에 의한 왜곡표시위험에 어떻게 취약한지에 대하여 정보를 교환할 수 있게 함\n② 업무수행이사 등 경험이 많은 업무팀원들이 기업에 대한 지식에 기초하여 가지고 있는 통찰을 서로 공유하는 기회를 제공함\n③ 업무팀원들이 자신에게 배정된 특정 분야의 중요한 왜곡표시 가능성을 더 잘 이해하게 하고, 업무팀원들이 수행하는 감사절차의 결과가 추가감사절차의 성격, 시기 및 범위의 결정 등 감사절차의 다른 측면에 어떻게 영향을 미칠 수 있는지 이해하게 함\n④ 업무팀원들이 중요왜곡표시위험의 평가 또는 이러한 위험에 대처하기 위해 수행되는 감사절차에 영향을 미칠 수 있는 새로운 정보를 감사의 전 과정에 걸쳐 입수하는 경우, 이를 공유하고 커뮤니케이션할 수 있는 기초를 제공함","토의의 효익"],[6,"진","분질관검","위험평가절차[위험평가절차시 사용되는 감사증거 입수방법(감사기술)]\n315-6 질관검분\n① 경영진, 내부감사기능 내의 적합한 담당자 그리고 부정이나 오류로 인한 중요왜곡표시위험을 식별할 때 도움이 될 수 있는 정보를 가지고 있다고 판단되는 기업 내부의 관련자에 대한 질문\n② 분석적절차의 수행에 사용되는 기대치 도출\n③ 관찰과 검사","위험평가 기술"],[6,"진","주변복불편","고유위험요소 5가지\n(1) 주관성\n(2) 변화\n(3) 복잡성\n(4) 불확실성\n(5) 경영진 편의나 기타 부정위험요소로 인한 왜곡표시 가능성","고유위험요소 5가지"],[6,"진","위법중전기","계획수립에 포함되는 중요왜곡표시위험 평가 전 고려사항\n300-A2 위법중전기\n① 위험평가절차로서의 적용될 분석적절차\n② 기업에 적용되는 법규 및 기업이 그러한 법규를 어떻게 준수하는 지에 대한 개괄적인 이해\n③ 중요성의 결정\n④ 전문가의 참여\n⑤ 기타위험평가절차의 수행","위험평가 전 계획"],[6,"진","수중고R선기대감","기업과 기업환경에 대한 이해의 정보가 사용되는 전문가적 판단\n315-A1 수(감사계약 체결 전)\n감사업무(고객)를 수용 또는 유지할 것인지 여부를 결정\n315-A1 R중정특(위험평가절차단계)\n① 재무제표의 중요왜곡표시위험(RMM) 평가\n② 중요성의 결정\n③ 회계정책의 선택과 적용의 적합성 및 재무제표 공시의 적절성에 대한 고려\n④ 예를 들어 특수관계자와의 거래, 경영진이 사용한 계속기업가정의 적절성 등 감사상 특별한 고려가 필요한 분야의 식별\n315-A1 기대감(감사수행단계)\n① 분석적절차의 수행에 사용되는 기대치 도출\n② 충분하고 적합한 감사증거를 입수하기 위한 추가감사절차의 설계와 수행 등 평가된 중요왜곡표시 위험에 대한 대응\n③ 제 가정들과 경영진의 구두 또는 문서화된 진술의 적절성 등 입수된 감사증거의 충분성과 적합성에 대한 평가","기업이해 판단\n개정 사라짐 추정"],[6,"진","위재전다경경오발규","중요왜곡표시위험을 식별하고 평가하기 위한 구체적 절차(4단계 RMM 식별과 평가 순서)\n315-26\n식평연발(기재반경 스오발표)\n① 해당 위험과 관련된 통제 등 기업과 기업환경을 이해하는 전 과정에서, 그리고 재무제표의 거래유형, 계정잔액 및 공시(공시의 양적 또는 질적 측면 포함)를 고려함으로써 위험을 식별함\n② 식별된 위험을 평가하며, 그러한 위험이 재무제표 전체에 더 전반적으로 관련되어 있는지 여부와 다수의 경영진주장에 잠재적으로 영향을 미치는지 여부를 평가함\n③ 감사인이 테스트하려는 관련 통제를 고려하여 식별된 위험을 경영진주장 수준의 오류가능성과 연결시킴\n④ 복합적 왜곡표시의 가능성 등 왜곡표시의 발생가능성과 그러한 잠재적 왜곡표시가 중요한 왜곡표시가 될 만큼 규모가 큰 것인지 여부를 고려함","RMM 4단계\n개정 사라짐 추정"],[6,"진","외회사재기","기업과 기업환경과 관련하여 이해해야 할 사항\n315-11 회사성 과외\n① 회계정책의 선택 및 적용과 회계정책의 변경시 그 이유\n② 기업의 목적과 전략 및 중요왜곡표시위험을 초래할 수 있는 관련 사업위험\n③ 재무제표에 예상되는 거계공 등의 이해를 위한 기업의 성격\n④ 재무성과의 측정과 검토\n⑤ 해당 재무보고체게를 포함하여 관련 산업적 요인, 규제적 요인, 및 기타 외부적 요인","기업이해 사항\n개정 사라짐 추정"],[6,"진","경소투조자","재무제표에 예상되는 거래유형, 계정잔액 및 공시 등의 이해를 위한 기업의 성격\n315-11 경투조소\n① 기업의 경영활동\n② 특수목적기업에 대한 투자 등 기업이 진행 중이거나 계획하고 있는 투자의 유형\n③ 기업의 조직구조와 자금조달 방식\n④ 기업의 소유 및 지배구조","기업 성격 이해\n개정 사라짐 추정"],[6,"진","실신부적절결함","사업위험이 발생할 수 있는 상황\n315-A38 실신 부적절 결함\n① 실패가능성이 있는 신제품이나 새로운 서비스의 개발\n② 성공적인 개발에도 불구하고 제품과 서비스를 뒷받침하기에 부적절한 시장\n③ 배상책임 또는 평판위험을 초래할 수 있는 제품 및 서비스 상의 결함","사업위험 상황"],[6,"진","경험/감/예/전/감독","재무제표 수준의 위험에 대응하는 일반적인 감사절차\n330-A1 변 적기예감\n① 업무팀이 전문가적 의구심을 유지할 필요성을 강조함\n② 보다 경험이 풍부하거나 특수한 기술을 보유한 인력을 배정하거나 또는 전문가를 활용함\n③ 수행될 추가 감사절차를 선택할 때 예측불가능성 요소를 추가로 반영함\n④ 감독활동을 강화함\n⑤ 감사절차의 성격, 시기 또는 범위를 전반적으로 변경함","F/S 수준 대응"],[6,"진","조회 부적","보고기간말 또는 그 이후에만 수행할 수 있는 감사절차\n330-A13 조회 부적\n① 재무제표의 작성과정에서 발생한 조정사항을 검토하는 절차\n② 재무제표의 정보가 기초가 되는 회계기록과 일치하는지 확인하거나 차이를 조정하는 절차\n③ 보고기간말에 기업이 부적절한 판매계약을 체결하거나 거래가 완결되지 않을 위험에 대응하는 절차","보고기간 말 절차 수행절차"],[6,"진","일부실증 당 실확증 말 사업장","비효과적인 통제환경에 대한 감사인의 대응 방법\n330-A2 실확증 말 사업장\n① 실증절차를 통해 보다 확대된 감사증거를 입수함\n② 기중보다 보고기간말에 더 많은 감사절차를 수행함\n③ 감사범위에 포함되는 사업장의 수를 확대함","통제환경 효과성"],[6,"진","표확세분고실분통통","위험이 낮다는 평가에 기초하여 실증절차를 수행할 계획인 경우 적합한 감사절차\n330-A10 고실분 통통\n① 고유위험 때문에 위험이 낮은 경우: 실증적 분석적절차만으로 충분하고 적합한 감사증거를 입수할 수 있다\n② 통제위험 때문에 위험이 낮은 경우: 통제테스트를 수행한다","실증절차 계획"],[6,"진","성신관추확 시말예 범표세분","(경영진주장 수준에서 RMM이 높은 경우) 추가감사절차의 성격\n240-A38 신관추확\n① 보다 신뢰할 수 있거나 관련성이 있는 감사증거 입수\n② 추가적인 확인적 정보를 입수하기 위하여 변경\n(경영진주장 수준에서 RMM이 높은 경우) 추가감사절차의 시기\n330-A11 말실 불예감\n① 기중보다는 보고기간말 또는 보고기간말에 근접한 시기에 실증절차를 수행하거나\n② 불시에 또는 예측불가능한 시기에 감사절차를 수행하는 것이 더 효과적\n추가감사절차의 범위\n330-A15 중평확분 세분표확\n① 필요하다고 판단되는 감사절차의 범위는 중요성, 위험평가 그리고 감사인이 얻고자 하는 확신의 수준을 고려하여 결정된다. 단일의 목적이 여러 절차들의 조합에 의해 달성되는 경우, 개별적인 절차의 범위는 분리하여 고려한다\n② 중요왜곡표시위험이 증가할수록 감사절차의 범위도 증가한다. 예를 들어, 부정으로 인한 중요왜곡표시위험에 대한 평가내용에 대응할 때는,\n• 표본규모를 늘리거나(확대하거나)\n• 보다 상세한 수준의 실증적 분석절차를 수행하는 것이 적합할 수 있다\n③ 감사절차의 범위를 확대하는 것은 해당 감사절차 자체가 특정 위험과 관련성이 있는 경우에만 효과적이다","주장 수준 대응"],[6,"진","중요한 잠문제 해결 효과적 배정","계획수립의 역할(효익)\n300-2 지배부문 효주\n① 업무팀원에 대한 지휘 및 감독과 업무결과에 대한 검토가 용이하게 이루어지도록 함\n② 예상되는 위험에 대응하기 위해 적합한 수준의 역량과 적격성을 갖춘 업무팀원을 선정하고,\n적절하게 업무를 배정하는 것을 도움\n③ 해당되는 경우, 부문감사인 및 전문가가 수행한 업무의 조정을 도움\n④ 감사인이 잠재적 문제를 적시에 식별하고 해결함\n⑤ 감사인이 감사업무를 적절히 조직화하고 관리함으로써 효율적이고 효과적인 감사가 수행되게 함\n⑥ 감사인이 중요한 감사분야에 적합한 주의를 기울임","계획수립 효익"],[6,"진","경식높","감사계획의 수립 시 업무수행이사와 핵심업무팀원들이 참여할 경우의 효익\n300-A4 경식 효효높\n① 이들의 경험과 식견을 이용할 수 있다\n② 이에 따라 계획수립의 효과성과 효율성이 높아진다","팀원 참여 효익"],[6,"진","양치기감독","전반감사전략에 포함할 사항\n300-A8 양치기 감독\n① 특정 감사분야에 할당할 자원의 양\n② 특정 감사분야에 배치할 자원\n③ 자원의 배치시기\n④ 자원을 관리, 지휘, 및 감독하는 방법","전략 도움 결정"],[6,"진","감일유예자","전반감사전략을 수립할 때 수행할 절차\n300-7~8 감사 보유필수\n① 감사범위를 정의하게 될 해당 감사업무의 특성을 식별함\n② 감사일정을 계획하기 위하여 해당 업무의 보고목적을 확인하며 요구되는 커뮤니케이션 성격을 확인함\n③ 감사인의 전문가적 판단에 따라, 업무팀의 업무방향을 설정하는 데 유의적이라고 판단되는 요소들을 고려함\n④ 해당 감사를 수행하는 데 필요한 자원의 성격, 시기 및 범위를 확인함\n⑤ 감사업무의 예비적 활동의 결과, 그리고 해당되는 경우 업무수행이사가 감사대상 기업을 위해 수행하였던 다른 업무에서 얻은 지식이 관련성이 있는지를 고려함","전반감사전략"],[6,"진","추위타","(세부)감사계획에 포함되어야 할 사항\n300-9 \n① 계획된 위험평가절차의 성격, 시기 및 범위\n② 경영진주장 수준에서 계획된 추가감사절차의 성격, 시기 및 범위\n③ 해당 감사를 감사기준에 따라 수행하기 위해 요구되는 기타의 계획된 감사절차","세부감사계획"],[6,"진","쟁기전품","초도감사시 전반감사전략과 (세부)감사계획을 수립할 때 추가적으로 고려할 사항\n300-A22 전쟁초품\n① 법규에서 금지되지 않는 한, 전임감사인의 감사조서 검토 등 전임감사인과 협의할 사항\n② 해당 감사인의 최초 선임과 관련하여 경영진과 논의되었던 쟁점들(회계기준 또는 감사기준의 적용 등), 이러한 쟁점에 대한 지배기구와의 커뮤니케이션 및 해당 사항이 전반감사전략과 감사계획에 미치는 영향\n③ 기초잔액에 관한 충분하고 적합한 감사증거를 입수하기 위해 필요한 감사절차\n④ 초도감사에 대하여 해당 회계법인의 품질관리시스템이 요구하는 절차. (ex. 초도감사업무를 품질관리검토대상에 포함)","초도감사 계획"],[6,"진","전독탁시","지배기구의 정의\n200-13 전독탁시절\n기업의 전략방향을 감독할 책임과 기업의 수탁책임을 감시할 의무가 있는 사람이나 조직 (예를 들어, 기업의 이사회). 이러한 책임에는 재무보고절차에 대한 감시가 포함된다. 국가에 따라\n서는 일반기업 또는 공공부문의 이사회 집행임원이나 소유경영자와 같이 경영진의 구성원이 지배기구에 포함될 수 있다.","지배기구"],[6,"진","범시계초 발사최 유어조 독유판","","커뮤니 시기 예시"],[6,"진","책임 감 유 실어경보기 독","감사인이 지배기구와 커뮤니케이션할 사항\n260-14~17, A12 책임감유독\n① 재무제표감사와 관련된 감사인의 책임\n② 계획된 감사범위와 시기(계감위기)\n③ 감사에서의 유의적 발견사항\n④ (상장기업) 감사인의 독립성","커뮤니 형태"],[6,"진","유성치","커뮤니케이션 시기에 영향을 미치는 요인\n260-A49 유성치\n① 유의성\n② 성격\n③ 지배기구가 취할 것으로 예상되는 조치","커뮤니 시기"],[6,"진","유독","(1) 감사대상회사가 주권상장법인일 경우 감사인의 독립성\n(2) 내부통제의 유의적 미비점","반드시 서면 커뮤니 사항"],[6,"진","개/부계 중분계 내접 중","계획된 감사범위와 시기에 대해 지배기구와 커뮤니케이션할 때 포함될 수 있는 구체적 사항 \n1) 감사시기와 범위의 계획에 대한 개요 \n2) 다음 사항이 포함될 수 있다\n  • 부정이나 오류로 인한 유의적인 중요왜곡표시위험에 감사인이 대처하는 방법\n  • 중요왜곡표시위험이 높게 평가된 분야에 대처하기 위해 감사인이 대처하는 방법\n  •  감사와 관련 있는 내부통제 접근방식 \n  •  감사상 중요성 개념의 적용 등","감사시기/범위"],[6,"진","의책경X","지배기구와 커뮤니케이션 할 사항 중에서 재무제표감사와 관련된 감사인의 책임\n260-14 의 책경X\n① 감사인은 지배기구의 감시 하에 경영진이 작성한 재무제표에 대하여 의견을 형성하고 표명할 책임이 있음\n② 재무제표감사는 경영진 또는 지배기구의 책임을 경감시키지 아니함","감사인 책임"],[6,"진","실질유모보절","지배기구와 커뮤니케이션 할 사항 중에서 감사에서의 유의적 발견사항 \n(1) 회계정책과 회계추정 및 재무제표 공시 등 해당 기업 회계실무의 윤리적 질적 측면에 대한 감사인의 견해\n(2) 감사 중 직면한 유의적 어려움이 있다면 그 내용\n(3) 지배기구의 모든 구성원이 기업의 경영에 참여하고 있지 않는 한, 다음의 각 사항\n  • 감사 중 발생해 경영진과 논의했거나 서신을 주고 받았던 유의적인 사항\n  • 감사인이 요청하고 있는 서면진술\n(4) 감사보고서의 형태와 내용에 영향을 미치는 상황\n(5) 감사 중 발생한 기타 유의적 사항으로서, 감사인의 전문가적 판단에 비추어 볼 때 재무보고절차의 감시와 관련성이 있는 사항","유의적 발견사항"],[6,"진","윤진독관제안","지배기구와 커뮤니케이션 할 사항 중에서 (상장기업) 감사인의 독립성 \n(1) 업무팀, 회계법인의 타 구성원, 회계법인은 독립성에 대한 관련 윤리적 요구사항을 준수하고 있다고 진술함\n(2) 감사인의 전문가적 판단에 따라 회계법인, 네트워크 회계법인 그리고 기업 사이에 독립성 문제와 관련된다고 합리적으로 판단되는 모든 관계와 기타사항들 \n(3) 식별된 독립성 훼손위협을 제거시키거나 수용가능한 수준으로 감소시키기 위한 관련 제도적 안전장치","독립성(지배기구)"],[6,"진","건발정책감","지배기구와의 커뮤니케이션의 역할(효익)\n260-4 건발/정/책R감\n① 감사인과 지배기구가 감사에 관련된 사항을 이해하고 건설적인 업무관계를 수립함. 이러한 관계는 감사인의 독립성과 객관성을 유지하며서 발전된다\n② 감사인이 지배기구로부터 감사와 관련된 정보를 입수함\n③ 지배기구가 재무보고절차를 감시하는 책임을 완수함으로써 재무제표의 중요왜곡표시위험 (RMM)을 감소시킴","커뮤니 효익"],[6,"진","연회비","회계감사기준에서 감사위원회가 수행하도록 권장하는 양호한 지배원칙\n260-A7 연회비\n① 감사위원회의 위원장 및 관련되는 경우 감사위원회의 구성원은 감사인과 주기적으로 연락함\n② 감사위원회의 회의에 감사인이 정기적으로 참여하도록 초청함\n③ 감사위원회는 최소한 1년에 한번씩 경영진을 참석시키지 않고 감사인과 만남(비경영진)","감사위 지배원칙"],[6,"진","책제의","지배기구를 위해 작성된 커뮤니케이션 문서가 제3자에게 제공될 때를 대비하여 문서에 명시해야 하는 사항\n260-A43 책제의\n① 감사인은 제3자에 대하여 어떤 책임도 지지 아니함\n② 제3자에 대한 공개 또는 배포에 대한 제한사항\n③ 커뮤니케이션 문서는 지배기구, 그리고 해당되는 경우 그룹경영진과 그룹감사인만을 위해 작성되었으며, 제3자가 이에 의존해서는 안됨","제3자 제공 명시"],[6,"진","변법외컴해","260-A53 형법해커\n① 감사범위의 제한을 근거로 감사의견을 변형시킴\n② 다른 일련의 조치의 경우 그 결과에 대한 법적 조언을 얻음\n③ 관련 법규상 가능하다면, 감사업무를 해지함\n④ 제3자, 기업의 소유주와 같이 지배구조상 기업의 외부에 존재하는 상위기관, 또는 공공부문의 경우 책임이 있는 정부의 주무부서나 의회와 커뮤니케이션함","커뮤니 불충분"],[7,"진","부:공회 경무회 / 오:인판 인붕","내부통제시스템의 고유한계 원인\n  1) 부정\n(1) 둘 이상의 사람아 공모로 통제를 회피할 수 있다.\n(2) 경영진의 통제 무력화로 통제를 회피할 수 있다.\n2) 오류\n(1) 의사결정에서 인간의 판단이 잘못될 수 있다. \n(2) 인간의 실수로 인해 내부통제시스템의 붕괴가 발생할 수 있다.","내부통제시스템 한계"],[7,"진","CRIME","내부통제의 구성 (CRIME): \n(1) 통제환경\n(2) 기업의 위험평가절차\n(3) 내부통제시스템에 대한 기업의 모니터링 절차\n(4) 정보시스템과 커뮤니케이션\n(5) 통제활동","내부통제시스템 5요소"],[7,"진","철권조적정지인","통제환경[E]의 요소\n315 보론1~2\n철권조적 정지인\n① 경영진의 철학과 경영방식\n② 권한과 책임의 할당\n③ 조직구조\n④ 적격성 구비\n⑤ 정직성 및 윤리적 가치의 커뮤니케이션과 실천\n⑥ 지배기구의 참여\n⑦ 인적자원에 대한 정책과 실무","(E) 통제환경\n개정 사라짐 추정"],[7,"진","사유가조","기업의 재무보고 관련 위험평가절차 \n경영진이 해당 재무보고체계에 따른 재무제표의 작성과 관련된 (1)사업위험을 식별하고, (2)그 유의성을 추정하고 (3)발생할 가능성을 평가하며, 그 위험들과 그 결과를 관리하기 위한 (4)조치를 결정하는 방법을 포함함","(R) 기업의 위험평가절차"],[7,"진","적유내미","기업에 문서화된 위험평가절차가 없는 경우 (적 유미상): **적**합한지 평가 -> **유**의적 **내**부통제 **미**비점인지 결정","(R) 문서화 없음"],[7,"진","식위결 위못이 시고","경영진이 식별하지 못한 중요왜곡표시위험을 감사인이 식별한 경우 수행절차\n(1) 해당 위험이 기업의 위험평가절차에서 식별할 것으로 기대하였던 종류의 위험인지 결정하고, 만약 그렇다면 기업의 위험평가절차가 해당 중요왜곡표시위험을 식별하지 못한 이유에 대하여 이해한다.\n(2) 기업의 위험평가절차와 관련하여 평가할 사항에 대한 감사인의 평가에 대한 시사점을 고려한다.","경영진이 식별하지 못한 RMM 감사인 식별시 수행절차"],[7,"진","내효평적수","모니터링 절차 정의\n기업의 내부통제시스템의 효과성을 평가하고 적시에 필요한 수정조치를 취하는 연속적인 과정","(M) 모니터링"],[7,"진","분장인물논대검","통제활동 구성요소 형태\n  1) 권한부여와 승인\n  2) 업무분장\n  3) 물리적 통제, 또는 논리적 통제\n  4) 대사\n  5) 검증","(C) 통제활동"],[7,"진","내책 조수","기업이 내부감사기능을 가지고 있는 경우 이해해야 할 사항\n315-23, A117 내책조수\n① 내부감사기능에 대한 책임\n② 조직상태\n③ 수행됐거나 수행될 활동의 성격\n내부감사기능이 수행한 업무의 활용 여부 결정 시 고려할 사항","내부감사 이해"],[7,"진","효기 실만없","통제테스트를 수행하는 상황\n(1) 감사인이 경영진주장 수준의 중요왜곡표시위험을 평가할 때, 통제가 효과적으로 운영되고 있다는 기대를 한 경우로서, 감사인이 실증절차의 성격, 시기 및 범위를 결정할 때, 통제의 운영효과성을 테스트에 의존하려고 하는 경우 (선택/감사의 효율성)\n(2) 실증절차만으로 경영진주장 수준의 충분하고 적합한 감사증거를 제공할 수 없는 경우 (필수/감사의 효과성)","통제테스트 상황"],[7,"진","재질관검","통제테스트에 사용되는 감사증거 입수방법 \n재수행, 질문, 관찰, 검사","통제테스트 기술"],[7,"진","질타 일방적 통의","통제테스트의 구체적인 수행절차 \n  1) 통제의 운영효과성에 대한 감사증거를 입수하기 위해 다음과 같은 사항이 포함된 질문과 더불어 기타의 감사절차를 수행함 \n  (1) 통제의 일관된 적용 \n  (2) 감사대상 기간 중 관련 시기에 해당 통제가 적용된 방법\n  (3) 통제 적용의 수행자 또는 수단\n 2) 이미 대응되지 않는 한 테스트할 통제가 다른 통제에 의존하고 있는지 여부를 결정함. 만약 그렇다면 그러한 간접통제가 효과적으로 운영되고 있음을 뒷받침하는 증거를 입수할 필요가 있는지 여부를 결정해야 한다.","테스트 수행절차"],[7,"진","잔변","중간기간에 통제테스트를 수행한 경우 잔여기간에 대해 수행할 절차\n (1) 중간기간 이후 해당 통제에 유의적인 변화가 있었는지에 대해 감사증거를 입수한다.\n (2) 잔여기간에 대해 입수할 추가적인 감사증거를 결정한다.","중간기간 수행시 잔여기간에 대해 수행할 절차"],[7,"진","R통통잔변감","잔여기간의 통제에 대해 어떤 추가적인 감사증거를 입수할지 결정할 때 고려 사항 \n (1) 경영진주장 수준의 평가된 중요왜곡표시위험의 유의성\n (2) 통제환경\n (3) 감사인이 후속 실증절차를 감소시키기 위해 통제에 의존하려는 정도\n (4) 잔여기간의 정도\n (5) 중간기간에 테스트하였던 특정 통제, 그리고 정보시스템*절차*담당자의 변경 등 테스트 이후 특정 통제의 유의적 변경\n (6) 통제의 운영효과성에 대한 감사증거의 입수정도","잔여기간 증거"],[7,"진","이존빈수련","통제테스트의 범위 및 의존도를 결정할 때 고려할 사항\n330-A28 기적빈다율\n① 감사대상 기간 중 감사인이 통제의 운영효과성에 의존하는 기간\n② 경영진주장 수준의 통제에 대한 운영효과성에 관하여 입수하고자 하는 감사증거의 관련성과 신뢰성(적합성)\n③ 해당 기간 중 기업이 통제를 수행한 빈도\n④ 해당 경영진주장과 관련하여 다른 통제테스트로부터 입수되는 감사증거의 범위\n⑤ 통제로부터의 기대이탈률","테스트 범위"],[7,"진","다중일변적특","이전의 감사에서 입수된 감사증거의 이용 시 고려사항\n (1) 통제환경, 기업의 통제 모니터링, 그리고 기업의 위험평가 절차 등 내부통제의 다른 요소들의 효과성\n (2) 중요왜곡표시위험과 통제에 대한 의존정도\n (3) 정보기술 일반통제의 효과성\n (4) 특정 통제의 변화가 결여되어 주변 상황이 변화하면 위험이 초래될 가능성이 있는지 여부\n (5) 통제의 적용과 관련하여 이전의 감사에서 발견된 이탈의 성격과 범위, 그리고 통제의 적용에 유의적인 영향을 미치는 담당자의 변화가 있었는지 등 통제와 통제를 적용할 때 효과성\n (6) 통제가 수작업에 의하고 있는지 또는 자동화되어 있는지 여부 등 통제의 특성에서 발생되는 위험","이전 증거 활용 & 재수행하지 않아도 될 경과기간 결정"],[7,"진","질검관","이전 감사증거의 활용시 수행해야 할 절차\n질문, 검사, 관찰 (재수행x)","유의적 변화*관련성 확인 감사기술"],[7,"진","31 일반","통제에 유의적인 변화가 없는 경우 통제테스트를 수행해야 하는 기간 등\n (1) 매 3회 감사에 최소한 1번 이상은 통제에 대한 테스트를 수행해야 한다.\n (2) 매 보고기간의 감사마다 일부 통제에 대한 테스트는 반드시 수행해야 한다.","통제에 유의적인 변화가 없는 경우 통제테스트 수행 기간"],[7,"진","구질 테결의근 추테필 왜실","의존하고자 하는 통제에 이탈이 발견된 경우 수행절차 \n1) 통제의 이탈을 발견한 경우 관련 구체적인 질문을 해야 한다.\n2) 구체적인 질문 후 다음의 사항을 결정해야 한다.\n (1) 통제테스트를 수행한 결과가 해당 통제에 의존하는 것에 대한 근거를 제공하는지 여부\n (2) 통제에 대한 추가적인 테스트가 필요한지 여부\n (3) 중요왜곡표시에 대한 위험에 대처하기 위해 실증절차를 적용할 필요가 있는지","통제 이탈 발견시 수행절차"],[7,"진","예발수X설실운 필통누","내부통제 미비점의 정의 \n (1) 어떠한 통제가 재무제표의 왜곡표시를 적시에 예방 또는 발견 및 수정할 수 없게 설계, 실행 또는 운영되는 경우\n (2) 재무제표의 왜곡표시를 적시에 예방 또는 발견 및 수정하기 위해 필요한 통제가 누락된 경우","미비점 정의"],[7,"진","자주충중","감사인의 전문가적 판단에 따라, 지배기구가 주의를 기울일 만큼 충분히 중요하다고 판단되는 내부통제의 미비점 또는 미비점들의 결합","유의적 미비점"],[7,"진","잠실가","내부통제 미비점 또는 이들이 결합된 미비점에 대한 유의성에 영향을 미칠 수 있는 요소\n265-A5 잠실가\n① 왜곡표시의 잠재적 크기\n② 왜곡표시가 실제로 발생하였는지 여부\n③ 왜곡표시가 발생할 수 있는 가능성","유의성 요소"],[7,"진","미미 의표설내재식","유의적 미비점에 대한 서면 커뮤니케이션 내용 \n 1) 미비점들에 대한 내역과 그러한 미비점들의 잠재적 영향에 대한 설명\n 2) 지배기구와 경영진이 커뮤니케이션의 관점을 이해할 수 있도록 하는 충분한 정보. 특히 감사인은 다음을 설명해야 한다.\n (1) 감사의 목적은 감사인이 재무제표에 대한 의견을 표명하는 것임.\n (2) 감사는 내부통제의 효과성에 대한 의견표명이 아닌, 해당 상황에 적합한 감사절차를 설계하기 위해, 내부통제에 대한 고려를 포함하고 있음.\n (3) 보고할 사항은 감사인이 감사 중에 식별한 미비점들로서, 지배기구에 보고할 만큼 충분히 중요하다고 결정한 미비점들로 제한됨.","유의적 미비점"],[7,"진","다컴 이질 합유","이전의 감사에서 커뮤니케이션한 유의적 미비점들이 시정되고 있지 않은 경우 \n (1) 이전의 커뮤니케이션 진술을 반복하더라도, 다시 커뮤니케이션해야 함.\n (2) 경영진(필요한 경우 지배기구)에게 해당 유의적 미비점이 시정되지 않은 이유에 대해 질문할 수 있음.\n (3) 합리적인 이유 없이 시정조치를 취하지 않고 있는 것은 그 자체로서 유의적 미비점을 나타내는 것일 수 있음.","전기 유의적 미비점 시정X시"],[7,"진","복 적이정 추모우분","정보기술이 내부통제에 미치는 유용성\n (1) 사전에 정의된 사업규칙을 일관되게 적용하고 대량의 거래나 데이터를 처리하는 복잡한 계산을 수행한다.\n (2) 정보의 적시성, 이용가능성, 정확성을 강화한다.\n (3) 정보의 추가적인 분석을 돕는다.\n (4) 기업의 활동과 기업의 정책 및 절차의 수행에 대한 모니터링 능력을 강화한다. \n (5) 통제가 우회될 위험을 감소시켜 준다.\n (6) IT 응용프로그램, 데이터베이스, 운영시스템에 대한 보안통제를 실행함으로써, 효과적인 업무분장 달성하는 능력을 강화한다.","IT 효익"],[7,"진","분파마접변필수","정보기술의 사용으로 인한 위험\n (1) 정보기술 직원이 할당된 업무를 수행하는 데 필요한 권한을 넘어 접근 권한을 얻을 수 있으며, 이에 따라 업무분장이 무너짐\n (2) 승인되지 않거나 존재하지 않는 거래의 기록 또는 부정확한 거래의 기록을 포함하여 데이터가 파괴하거나, 데이터가 부적절하게 변경될 수 있는 데이터에 대한 승인되지 않는 액세스\n (3) 마스터 파일 내 데이터의 승인받지 않은 변경\n (4) 데이터가 잠재적 손실 또는 필요한 데이터 접근 불능\n (5) IT 응용프로그램 또는 IT 환경의 기타 측면에 대한 승인받지 않은 변경\n (6) IT 응용프로그램 또는 IT 환경의 기타 측면에 대하여 필요한 변경의 실패\n (7) 부적절한 수동 개입","IT 위험"],[7,"진","프데접응시","회계감사기준에서의 정보기술 일반통제의 분류\n315-A108 프데접응시\n① 프로그램 변경\n② 데이터 센터와 네트워크 운용\n③ 접근 보안\n④ 응용시스템의 취득, 개발 및 유지\n⑤ 시스템 소프트웨어의 취득, 변경 및 유지","일반통제(감사)"],[7,"진","접영 개발 변경 업무","내부회계관리제도에서의 정보기술 일반통제의 분류\n개경보운분\n① 프로그램 개발\n② 프로그램 변경\n③ 프로그램과 데이터에 대한 접근 보안\n④ 컴퓨터 운영\n⑤ 업무분장","일반통제(K-SOX)"],[7,"진","프운보","일반통제와 관련된 업무분장 \n프로그래밍, 컴퓨터 운용, 자료 보관","IT 업무분장"],[7,"진","모병통","컴퓨터 자체감사의 유형\n 모의자료법, 병행처리법, 통합자료법","자체감사 유형"],[7,"진","모: 직별 실삭","1) 모의자료법 \n장점 : \n(1) 프로그램에 대한 직접적인 검증이 이루어지게 됨\n(2) 병행처리법과 같이 별도의 프로그램을 개발할 필요가 없음\n단점 :\n(1) 회사가 사용한 프로그램이 실제로 사용하는 프로그램인지 확인할 수 없음\n(2) 모의자료를 작성하고 삭제해야 하는 번거로움이 있음","유형별 장단점\n모의자료법"],[7,"진","유영상계","서비스조직의 서비스 및 통제와 관련하여 이해할 사항\n (1) 서비스조직이 제공하는 서비스의 성격과 그러한 서비스가 이용자기업에 미치는 유의성 (이용자기업의 내부통제에 대한 영향)\n (2) 서비스조직이 처리한 거래 또는 해당 조직에 의해 영향을 받는 계정이나 재무보고절차의 성격과 중요성\n (3) 서비스조직이 수행하는 활동의 상호작용 정도\n (4) 서비스조직이 수행하는 활동에 대한 계약 조건 등 서비스조직과 이용자기업간 관계의 성격","서비스조직"],[7,"진","12 접촉 방문 타","이용자기업을 통해 충분히 이해하지 못한 경우 추가 수행절차\n (1) 가능한 경우, 유형 1 또는 유형 2 보고서를 입수함\n (2) 특정 정보를 얻기 위하여 이용자기업을 통하여 서비스조직과 접촉함\n (3) 서비스조직을 방문하여 서비스조직의 관련 통제에 대하여 필요한 정보를 제공할 절차를 수행함\n (4) 타 감사인이 수행한 업무를 활용하여, 서비스조직의 통제에 필요한 정보를 제공할 절차를 수행함","이해 부족 시"],[7,"진","기계일기 (증:적독기절) 보관","서비스조직의 이해 관련하여 유형 1 또는 유형 2 보고서를 이용하기 위한 감사절차\n (1) 서비스조직의 통제에 대한 기술과 설계가 이용자기업 감사인의 감사목적에 적합한 일자와 적합한 기간에 대한 것인지 여부를 평가함\n (2) 서비스조직의 통제 이해를 위해 해당 보고서가 제공하는 증거의 충분성과 적합성을 평가함\n (3) 서비스조직에 의해 식별된 보충적인 이용자기업 통제가 이용자기업과 관련성이 있는지 여부를 결정함. 만약 관련성이 있다면 이용자기업이 그러한 통제를 설계했고 실행했는지 여부를 이해함","보고서 이용시 추가절차"],[7,"진","운일기 시증테","통제테스트로서 유형 2 보고서를 이용할 경우 추가절차\n (1) 서비스조직 통제에 대한 기술, 설계 및 운영효과성이 이용자기업 감사인의 감사목적에 적합한 일자 또는 적합한 기간에 대한 것인지 여부를 평가함\n(2) 통제테스트의 대상기간 및 그러한 통제테스트를 수행한 후 경과된 시간의 적절성을 평가함\n(3) 서비스감사인의 감사보고서에 기술된 해당 감사인의 통제테스트와 그 결과가 이용자기업 재무제표의 경영진주장과 관련이 있으며, 이용자기업 감사인의 위험평가에 도움이 되도록 충분하고 적합한 감사증거를 제공하는지 여부를 평가함\n(4) 서비스조직에 의해 식별된 보충적인 이용자기업 통제가 이용자기업과 관련성이 있는지 결정하고, 관련성이 있다면 이용자기업이 그러한 통제를 설계하였고 실행하였는지 여부를 이해하고 통제의 운영효과성을 테스트함","유형2 보고서 이용 추가절차"],[7,"진","2통타","서비스조직의 통제에 대한 통제테스트 수행방법\n(1) 입수 가능한 경우, 유형 2 보고서를 입수함\n(2) 서비스조직의 통제에 대해 적합한 통제테스트를 수행함\n(3) 서비스조직의 통제에 대해 통제를 수행한 타 감사인 업무를 활용함","서비스조직 통제테스트"],[8,"진","회차 분수","재무제표 결산절차와 관련된 실증절차 \n (1) 재무제표가 그 기초가 되는 회계기록과 일치하는지를 확인하거나 차이를 조정함\n (2) 재무제표를 작성하는 과정에서 행한 중요한 분개나 수정사항에 대해 조사함","결산절차"],[8,"진","구대실세","유의적 위험에 대응하는 절차\n (1) 감사인이 경영진주장 수준의 중요왜곡표시위험을 유의적이라고 결정하면, 그러한 위험에 대처하기 위해 구체적으로 대응하는 실증절차를 수행해야 한다.\n (2) 유의적 위험에 대응하는 접근 방식이 실증절차만으로 구성되어 있는 경우에는, 반드시 세부테스트를 포함해야 한다","유의적 위험 실증절차"],[8,"진","잔통실 충실","중간기간에 입수한 감사증거를 이용할 경우 감사절차\n (1) 잔여기간에 대해 통제테스와 실증절차를 수행함\n (2) 만약 감사인이 충분하다고 결정한 경우, 후속적인 실증절차만을 수행함","잔여기간 추가감사절차"],[8,"진","비식 조사 잔","기중에 실증절차를 수행하고 기말 잔액에 대한 정보를 기중 일자의 비교가능한 정보와 비교하고 조정하는 목적\n (1) 비경상적으로 보이는 금액을 식별함\n (2) 해당 금액에 대해 조사함\n (3) 잔여기간에 대한 테스트를 위해, 실증적인 분석적절차 또는 세부테스트를 수행함","비교조정 효과적 이유"],[9,"진","왜잔포 정관용 변해따","초도감사 - 기초잔액에 대한 2가지 감사목적\n (1) 당기재무제표에 중요하게 영향을 미치는 왜곡표시가 기초잔액에 포함되었는지 여부\n (2) 기초잔액에 반영 된 적합한 회계정책이 당기 재무제표에 일관되게 적용되었는지 여부 (만약, 회계정책이 변경되었다면 해당 재무보고체계에 따라 적절하게 처리되고 적절하게 표시 및 공시되었는지 여부)","초도감사 목적"],[9,"진","마재 반변 전절특 / 절: 당수절기증","기초잔액이 중요하게 왜곡표시되었는지에 대한 감사절차 \n 1) 전기의 마감잔액이 정확하게 당기로 이월되었는지, 또는 적절히 재작성되었는지 여부를 결정함\n 2) 기초잔액에 적합한 회계정책이 반영되어 있는지, 회계변경은 적절히 처리되었는지 여부를 결정함\n 3) 다음의 절차 중 하나 이상을 수행함\n (1) 전기 재무제표가 감사를 받은 경우, 기초잔액에 관해 증거를 입수하기 위해 전임 감사인의 조서를 검토함\n (2) 당기에 수행한 감사절차가 기초잔액과 관련된 감사증거를 제공하는지 여부를 평가함\n (3) 기초잔액에 대한 증거를 입수하기 위해 다음의 특정의 감사절차를 수행함","기초 왜곡표시 포함여부 감사절차"],[9,"진","입수 평 매기","기초잔액에 관한 증거를 입수하기 위한 특정의 감사절차\n (1) 당기 재고자산의 실사에 입회하고, 그 결과를 기초 재고자산의 수량으로 조정함\n (2) 기초 재고자산의 평가에 대한 감사절차를 수행함\n (3) 매출총이익과 기간귀속에 대해 감사절차를 수행함","유동항목 - 재고 특정감사"],[9,"진","기회조사 3","비유동자산과 비유동부채\n (1) 기초잔액의 근거가 되는 회계기록과 기타의 정보를 조사함\n (2) 제3자에 대한 조회를 실시함","비유동항목"],[9,"진","R유회전","기초잔액 관련 감사절차의 성격•범위에 영향을 주는 요인\n510-A3 R회감유\n① 계정잔액, 거래유형 및 공시의 성격과, 당기재무제표에서 중요왜곡표시위험(RMM)\n② 기업이 적용한 회계정책\n③ 전기재무제표가 감사받았는지 여부, 그리고 감사받은 경우 전임감사인의 의견이 변형되었는지 여부\n④ 당기재무제표에 대한 기초잔액의 유의성","기초 성격범위"],[9,"진","법초잉","재무제표별로 구분하여 의견을 표명하기 위해 충족되어야 하는 조건\n510-A8 법초잉\n① 법규상 금지되지 않고,\n② 초도감사이며,\n③ 당기손익을 이익잉여금과 구분하여 표시하지 않아야 한다","의견분리"],[9,"진","초과금 보내다","예외적으로 의견의 분리가 허용되는 경우 \n (1) 초도감사에서 기초잔액에 대하여 충분하고 적합한 감사증거를 입수할 수 없어서 재무성과와 현금흐름에 대해서는 한정의견이나 의견거절, 재무상태에는 적정의견을 표명하는 경우\n (2) 동일한 감사보고서 내에서 하나의 재무보고체계에 따라 작성된 재무제표에 대하여 적정의견을 표명하고, 동일한 재무제표에 대해 다른 재무보고체계에 따라서는 부적정의견을 표명하는 경우","예외 허용"],[9,"진","경배컴 알","전임감사인이 적정의견 표명한 전기재무제표에 중요한 왜곡표시 존재 시 감사절차\n (1) 적합한 수준의 경영진과 지배기구가 적시에 커뮤니케이션하고 이러한 왜곡표시를 수정할 것을 요청한다.\n (2) 기초잔액에 중요한 왜곡표시가 존재한다는 사실을 전임감사인에게 알리도록 요청해야 한다.","기초잔액 중요왜곡표시 식별시"],[9,"진","업비 금단 말증","현금및현금성자산에 부정위험의 징후가 존재하는 상황\n비단말\n① 현금및현금성자산이 감사대상회사의 업종을 고려해볼 때 자산에서 차지하는 비중이 지나치게\n높은 경우\n② 금리가 높은 단기차입금이 많은 회사가 현금시재액 및 수익률이 굉장히 낮은 현금성자산을 지\n나치게 많이 보유하고 있는 경우\n③ 기중에 비해서 기말에 현금잔액이 지나치게 증가하는 경우","현금 부정징후"],[9,"진","사규타 계출 담시유통","보고기간말 부적합하게 대규모의 현금및현금성자산을 보유하고 있는 경우 감사절차\n (1) 보유사유, 보유규모의 타당성 검토\n (2) 재무제표일 후 계속 보유여부를 확인해야 하고, 재무제표일 후 인출된 경우에는 그 사용내역을 추가로 확인\n (3) 예금의 경우 금융기관 담당자에게 시제액에 대해 유선조회를 하거나 통장실물을 확인","대규모 현금"],[9,"진","R전통시장계절","재고자산 실사의 입회를 계획할 때 고려할 사항\n (1) 재고자산과 관련된 중요왜곡표시위험\n (2) 감사인 측 전문가의 도움이 필요한지 여부\n (3) 재고자산과 관련된 내부통제의 성격\n (4) 재고자산 실사의 시기\n (5) 적절한 입회장소를 결정시 보관장소\n (6) 기업이 계속기록법을 유지하는지 여부\n (7) 재고자산 실사를 위해 적절한 절차가 수립되고 적절한 지시가 전달될 것으로 예상되는지 여부","실사 계획"],[9,"진","평관조테","재고자산 실사의 입회절차\n (1) 재고자산을 기록하고 통제하기 위한 경영진의 지시와 절차에 대한 평가\n (2) 경영진이 수행하는 재고자산 실사에 대한 관찰\n (3) 재고자산에 대해 조사\n (4) 테스트 실사의 수행","실사 수행"],[9,"진","적통 공진 수 입출고","경영진의 지시와 재고조사 절차가 효과적인지 여부를 평가할 때 관련성 있는 사항\n (1) 적합한 통제 여부 (ex.사용한 재고실사표의 회수, 미사용된 재고실사표의 처리, 수량파악 및 검증의 절차 등)\n (2) 재공품의 완성도, 회전율이 낮거나 진부화 또는 손상된 항목 및 제3자가 소유한 재고자산에 대한 정확한 식별\n (3) 실제수량을 추정하기 위한 절차\n (4) 재고자산의 보관장소간 이동과 실사기준일 전후의 재고자산 입출고에 대한 통제 절차","실사 통제지시"],[9,"진","정재로 완기로","구체적인 테스트 실사절차\n (1) 실사기록의 정확성에 대한 감사증거를 입수하기 위하여 실사기록에서 선정된 항목을 실제의 재고로 추적한다\n (2) 실사기록의 완전성에 대한 감사증거를 입수하기 위하여 실제 재고자산에서 선정된 항목을 실사기록으로 추적한다","구체적인 테스트 실사절차"],[9,"진","차바신","재고자산의 실사일과 재무제표일 사이의 금액변동이 적절히 기록되었는지 여부에 대한 감사절차 \n (1) 실사 중 입수된 정보와 계속기록법에 의한 재고기록간의 유의적 차이에 대한 이유\n (2) 계속기록법에 의한 재고기록이 바르게 조정되는지 여부\n (3) 기업의 계속기록법에 의한 재고기록의 신뢰성","일자 차이 감사절차 설계 고려사항"],[9,"진","생략X: 다른날 사이","예상치 못한 상황으로 일시적으로 재고실사에 입회할 수 없는 경우\n501-6 다른 일자/사이거래\n감사인이 예상하지 못한 상황으로 재고자산 실사에 입회할 수 없는 경우에는 ① 다른 일자를 정하여 재고자산을 실사하거나 실사에 입회하여야 하며 ② 기업의 재고자산 실사일과 감사인의 실사일(또는 실사입회일) 사이의 거래에 대한 감사절차를 수행하여야 한다","실사 생략"],[9,"진","생략: 안전상이유 -> 대체 변형","재고실사의 입회가 불가능한 경우\n501-7 대체/변형\n재고자산 실사의 입회가 실행가능하지 않은 경우 감사인은 재고자산의 실재성과 상태에 관한 충분하고 적합한 감사증거를 입수하기 위해 ① 대체적인 감사절차를 수행하여야 한다. ② 이러한 절차를 수행하는 것이 가능하지 않은 경우 감사의견을 변형시켜야 한다.","입회 생략"],[9,"진","직접 서비스 창조","제3자의 성실성과 객관성이 의심되는 경우 수행절차\n제3자에 대한 조회에 대신하여, 또는 이에 추가하여 다음과 같은 기타의 감사절차를 수행한다.\n (1) 실행가능한 경우, 제3자가 수행하는 재고자산 실사에 직접 입회하거나 타 감사인이 입회하도록 조치함\n (2) 재고자산이 바르게 실사되고 적절하게 보호되는지 확인하기 위해 제3자의 내부통제가 적절한지에 대한 타감사인의 감사보고서 또는 서비스조직 감사인의 감사보고서 (유형 2 보고서)를 입수함\n (3) 창고보관증과 같이 제3자가 보관하는 재고자산에 관한 문서를 조사함\n (4) 재고자산이 담보로 제공되어 있다면 해당 당사자에 대해 조회를 요청함","제3자 의심"],[10,"진","1이기의","240-12\n1이기의\n① 경영진, 지배기구, 종업원 또는 제3자 중 1인 이상이 ② 부당하거나 불법적인 이득을 취하기 위해 ③ 기만행위가 연루된 의도적 행위","부정 정의"],[10,"진","3진전문의","회계기록이나 문서가 진실하지 아니하다고 믿는 경우 수행하여야 할 추가조사절차\n (1) 제3자에게 직접 조회\n (2) 문서의 진실성을 평가하기 위해 전문가를 이용","부정 문서 의심"],[10,"진","중법진진","부정의 개념과 관련하여 유의할 사항\n 1) 부정은 광범위한 법률적 개념이지만 감사인은 감사기준의 목적상 재무제표의 중요한 왜곡표시를 초래하는 부정에 관심을 둔다. 따라서 임직원 개인의 부정이 회사의 재무제표에 영향을 미치지 않는다면 감사인은 그것을 고려하지 않는다.\n 2) 부정이 실제로 발생했는지 여부에 대한 법률적 결정을 내리지 않는다.\n 3) 감사기준에 따라 수행되는 감사에 문서의 진위 판별이 수반되는 경우는 거의 없으며, 감사인은 문서의 진위에 대한 전문가로서 훈련을 받지 않았으며, 그렇게 기대될 수도 없다. 따라서 그렇지 않다고 믿을 이유가 없는 한 감사인은 회계기록이나 문서가 진실하다고 믿을 수 있다.","부정 개념 유의 사항"],[10,"진","작제무치","경영진의 부정으로 인한 중요한 왜곡표시를 발견하지 못할 위험이 종업원의 부정으로 인한 경우보다 큰 이유  \n: 경영진은 회계기록을 직*간접적으로 조작하고 허위의 재무정보를 제공하거나 다른 종업원에 의해 유사한 부정이 예방되도록 설계된, 통제를 무력화할 수 있는 위치에 있는 경우가 빈번하기 때문이다","경영진>종업원"],[10,"진","은위누거설","부정으로 인한 중요한 왜곡표시를 발견하지 못할 위험이 오류로 인한 경우보다 큰 이유 \n부정의 경우 그 사실을 은폐하기 위해, 위조, 거래의 기록에 대한 계획적인 누락 또는 감사인에 대한 의도적인 거짓 진술 등 정교하고 면밀하게 설계된 수단들이 이용되기 때문이다.","부정>오류"],[10,"진","동기합","부정의 특성 \n동기*압력, 기회, 합리화\n부정위험요소 : 부정을 행할 동기나 압력, 기회를 나타내는 사건이나 상황","부정 3요소"],[10,"진","이동부통령","업무팀 토의에 포함될 수 있는 사항\n240-A12\n이동 부통령\n① 이익조정을 나타내는 상황\n② 경영진 또는 그 외의 사람들이 부정을 저지를 동기나 압력을 유발하고, 부정이 실행될 기회를 제공하며 부정을 범하는 것을 합리화 시킬 수 있는 문화 또는 환경을 나타내는, 기업에 영향을\n미치는 알려진 내•외부 요소들에 대한 고려\n③ 재무제표가 어떻게 그리고 어느 부분에서 부정으로 인하여 중요하게 왜곡표시되기 쉬운지, 경영진이 부정한 재무보고를 어떻게 수행하고 은폐하는지, 그리고 기업의 자산이 어떻게 횡령될\n수 있는지에 대한 업무팀원간 의견 교환\n④ 경영진이 내부통제를 무력화할 위험에 대한 고려\n⑤ 횡령하기 쉬운 현금이나 기타의 자산을 다루는 종업원에 대한 경영진의 감시 여부에 대한 고려","부정 토의"],[10,"진","평식지종","경영진에게 질문할 사항 \n (1) 재무제표가 부정으로 인해 중요하게 왜곡표시될 위험에 대한 경영진의 평가 \n (2) 경영진이 기업의 부정위험을 식별하고 대응하는 절차\n (3) 해당 사항이 있는 경우, 기업의 부정위험을 식별하고 대응하는 절차에 관해 경영진이 지배기구에게 하는 커뮤니케이션\n (4) 해당 사항이 있는 경우, 기업의 영업실무와 윤리적 행동에 대한 경영진의 견해에 대한 경영진이 종업원에게 행한 커뮤니케이션","부정 위험평가절차시 경영진 질문 일반사항"],[10,"진","통공 적누 결어","부정에 대한 업무팀 토의의 효과 \n (1) 재무제표가 어떻게, 그리고 어느 부분에서 부정으로 인해 왜곡표시되기 쉬운지에 대하여 업무팀원 중 경험이 많은 사람들의 통찰을 공유할 기회를 제공한다.\n (2) 감사인이 그러한 위험성에 대한 적합한 대응을 고려할 수 있게 해주고, 업무팀원 중 누구에게 어느 감사절차를 맡길지 결정할 수 있게 해준다. \n (3) 감사인이 감사절차의 수행결과를 업무팀원과 어떻게 공유할지, 감사인이 주목할 만한 부정혐의를 어떻게 다루어야 할지 결정할 수 있게 한다.","토의 효과"],[10,"진","부고다수윤복","부정의 존재 또는 의심에 대하여 감사인이 질문을 할 기업 내의 적합한 사람 (부고다수 윤복)\n① 부정혐의를 다루는 업무를 맡고 있는 사람(내부감사기능)\n② 내부 법률고문\n③ 다른 수준의 권한을 가진 종업원\n④ 재무보고절차에 직접 관여하지 않는 일상업무 수행인원\n⑤ 윤리담당 임원 또는 그에 상응하는 사람\n⑥ 복잡하거나 비경상적인 거래의 개시, 처리 또는 기록에 관여하는 종업원과 그러한 종업원을 감독하거나 모니터링하는 사람","부정 위험평가절차시 내부관련자 질문"],[10,"진","실의혐알","구체적인 사항 질문할 사항\n실제로 발생했거나, 의심 중인 부정 또는 혐의 중인 부정을 알고 있는지 여부","부정 위험평가절차시 경영진과 내부 관련자 질문 구체적인 사항"],[10,"진","업예부","재무제표수준의 부정으로 인한 중요왜곡표시위험에 대한 전반적인 대응 \n (1) 유의적 업무수행 책임을 부여할 개별 구성원의 지식, 기술 및 능력과 해당 감사업무에 있어서 부정으로 인한 중요왜곡표시위험에 대한 감사인의 평가결과를 고려하여 업무를 배정하고 감독함\n (2) 감사절차의 성격, 시기 및 범위를 선택할 때, 예측 불가능한 요소를 포함시킴\n (3) 특히 주관적인 측정과 복잡한 거래와 관련된 경우, 회계정책의 선택과 적용이 경영진의 이익 조정 노력에 따른 부정한 재무보고의 징후인지 여부를 평가함","F/S수준 부정 대응"],[10,"진","중수기업분","감사인이 부정으로 인한 중요왜곡표시위험을 나타내는지 여부를 식별할 수 있는 기타정보\n240-A23 중수기분 업\n① 해당기업에 제공한 다른 업무로부터 얻은 경험(중간재무제표의 검토업무)\n② 감사인의 의뢰인 수용과 유지여부의 절차로부터 입수한 정보\n③ 기업과 그 환경에 관하여 입수한 기타의 정보\n④ 분석적절차의 적용으로부터 입수한 정보\n⑤ 업무팀 내부의 토의","부정으로 인한 RMM 기타정보"],[10,"진","성신관추확 시말예 표확세분","경영진주장 수준의 부정으로 인한 중요왜곡표시위험에 대응하는 감사절차\n 1) 성격 : 보다 신뢰할 수 있거나 관련성 있는 감사증거 입수\n 2) 시기 : 보고기간말 또는 보고기간말에 근접한 때에 실증절차를 수행, 불시에 또는 예측 불가능한 시기에 감사절차를 수행\n 3) 범위 : 표본규모를 확대, 보다 세부적인 수준에서 분석적절차를 수행","경영진주장 수준 부정 대응"],[10,"진","범위: 표확 세분 예특 동모","재고자산의 수량에 영향을 미치는 부정으로 인한 중요왜곡표시위험을 식별한 경우\n240-A39 예특동모\n① 예고 없이 특정 장소에서 재고자산 실사에 입회하거나\n② 동일한 일자에 모든 장소에서 재고자산을 실사한다","재고 수량 부정"],[10,"진","저 회 비","경영진의 통제무력화 위험에 대한 평가결과에 관계없이, 감사인이 계획하고 수행할 절차\n (1) 총계정원장에 기록된 분개와 재무제표 작성시 이루어진 조정사항의 적절성을 테스트함\n (2) 회계추정치에 편의가 있는지 검토하고, 편의가 있다면 이를 유발하는 환경이 부정으로 인한 중요왜곡표시위험을 나타내는 것인지 여부를 평가함\n (3) 기업의 정상적인 사업과정을 벗어나는 거래 또는 기업과 그 환경에 대한 감사인의 이해와 감사중에 입수한 정보에 근거했을 때 비경상적으로 보이는 유의적 거래의 경우 감사인은 해당거래의 사업상 논리적 근거에 비추어 볼 때 그러한 거래가 부정한 재무보고를 수행하거나 자산의 횡령을 은폐하기 위해 체결되었음을 나타내는 것인지 여부를 평가해야 함","통제무력화위험 대응"],[10,"진","평영 신공","중요성과 관계없이 경영진이 연루된 부정을 식별한 경우 수행할 절차\n (1) 부정으로 인한 중요왜곡표시위험의 평가와 이러한 평가에 대응했던 추가감사절차의 성격, 시기 및 범위에 미치는 영향을 재평가해야 한다.\n (2) 이전에 입수한 증거의 신뢰성을 재고려할 때, 상황이나 조건들이 종업원, 경영진 또는 제3자가 관여된 공모의 가능성을 나타내는지 고려해야 한다.","상위경영진 & 부정의 결과로 인한 왜곡표시 식별"],[10,"진","배컴 성시범","경영진이 연루된 부정이 의심되는 경우 수행하여야 할 절차 \n (1) 이러한 의심에 대하여 지배기구에게 커뮤니케이션하고,\n (2) 감사를 완료하기 위하여 필요한 감사절차의 성격, 시기 및 범위를 이들과 논의해야 함","경영진 연루 부정 의심"],[10,"진","내평연영","부정 관련 서면진술을 입수해야 하는 사항 \n (1) 부정의 예방과 발견을 위한 내부통제의 설계, 실행 및 유지에 대한 책임은 이들에게 있다는 사실을 인정한다는 것\n (2) 부정에 의하여 재무제표가 중요하게 왜곡표시 될 위험에 대한 경영진의 평가결과를 감사인에게 공개하였다는 것\n (3) 다음의 사람들이 연루되고 기업에 영향을 미치는 부정 또는 의심되는 부정에 대하여 이들이 알고 있는 바를 감사인에게 공개하였다는 것 : 경영진, 내부통제에 유의적 역할 수행하는 종업원, 부정이 재무제표에 중요한 영향을 미칠 수 있는 경우의 기타 내부 관련자\n(4) 기업의 재무제표에 영향을 미치는 부정 또는 의심되는 부정에 대한 주장들로서, 이들이 종업원, 과거의 종업원, 분석가, 규제기관 등으로부터 알고 있는 사항을 감사인에게 모두 공개하였다는 것","부정 서면진술"],[10,"진","정회 시제용통","부정행위 등의 보고의무\n (① 감사인의 보고의무\n• 감사인은 직무를 수행할 때 이사의 직무수행에 관하여 부정행위 또는 법령이나 정관에 위반되는 중대한 사실을 발견하면 감사 또는 감사위원회에 통보하고 주주총회(사원총회)에 보고하여야 한다\n• 감사인은 회사가 회계처리 등에 관하여 회계처리기준을 위반한 사실을 발견하면 감사 또는 감사위원회에 통보하여야 한다\n• 감사인은 이사의 직무수행에 관하여 부정행위 또는 법령에 위반되는 중대한 사실을 발견하거나 감사 또는 감사위원회로부터 이러한 사실을 통보받은 경우에는 증권선물위원회에 보고하여야 한다\n② 감사(감사위원회)의 보고의무\n• 회사의 회계처리기준 위반사실을 통보받은 감사 또는 감사위원회는 회사의 비용으로 외부전문가를 선임하여 위반사실 등을 조사하도록 하고 그 결과에 따라 회사의 대표자에게 시정 등을 요구하여야 한다\n• 감사 또는 감사위원회는 회계처리기준 위반사실에 따른 조사결과 및 회사의 시정조치 결과 등을 즉시 증권선물위원회와 감사인에게 제출하여야 한다\n• 감사 또는 감사위원회는 회계처리기준 위반사실의 직무를 수행할 때 회사의 대표자에 대하여 필요한 자료나 정보 및 비용의 제공을 요청할 수 있다.이 경우 회사의 대표자는 특별한 사유가 없으면 이에 따라야 한다\n• 감사 또는 감사위원회는 이사의 직무수행에 관하여 부정행위 또는 법령이나 정관에 위반되는 중대한 사실을 발견하면 감사인에게 통보하여야 한다","외감법 22조"],[10,"진","전부 적절한 적성","부정으로 감사계약을 지속할 수 없는 경우 \n (1) 부정으로 인한 중요왜곡표시위험에 대한 감사인의 검토와 테스트 결과가 중요하고도 전반적인 부정에 대해 유의적인 위험을 나타내고 있음\n (2) 부정이 비록 재무제표에 중요하지 않지만, 부정에 대하여 감사인이 해당 상황에 필요하다고 생각하는 적절한 절차를 기업이 취하지 않음\n (3) 감사인이 경영진 또는 지배기구의 적격성과 성실성을 매우 우려함","계속불가 상황"],[10,"진","책해 사토 법","부정으로 감사계약을 지속할 수 없는 경우 감사절차 \n 1) 해당 상황에 적합한 전문가로서의 책임과 법률적 책임을 결정함\n 2) 관련 법규상 감사업무를 해지하는 것이 가능한 경우, 해당 감사업무를 해지하는 것이 적절한지 여부를 고려함\n 3) 감사인이 감사를 해지하는 경우에는 다음의 절차를 수행함\n (1) 감사인이 감사업무를 해지한다는 사실과 그 이유에 대해, 적합한 수준의 경영진 및 지배기구와 토의함\n (2) 감사인을 선임한 당사자 또는 규제기관에 감사인의 감사업무해지와 그 이유를 보고할 전문가로서 요구사항이나 법률적인 요구사항이 존재하는지 여부를 결정함","계속불가 절차"],[11,"진","기판데이투예민","추정불확실성 정도의 평가\n540-10, A45 판기 데이투 예민\n① 회계추정치가 판단에 의존하는 정도\n② 추정불확실성을 완화시킬 수 있는 널리 인정된 측정 기법의 존재\n③ 외부 원천에서 나온 신뢰할 수 있는 데이터의 이용가능성\n④ 회계추정치가 관찰가능한 투입자료 혹은 관찰불가능한 투입자료에 근거한 정도\n⑤ 예측기간의 길이, 그리고 과거 사건으로부터 도출된 데이터가 미래사건을 예측하는데 갖는 관련성\n⑥ 회계추정치가 가정의 변경에 대하여 민감한 정도","불확실성 평가"],[11,"진","주변 일유낙","회계추정치에 관련된 경영진의 편의가능성을 나타내는 징후\n540-A125 주유일낙\n① 경영진이 상황의 변화가 있었다고 주관적으로 평가한 경우의 회계추정치나 도출방법의 변경\n② 경영진의 목적에 유리한 점추정치가 도출되는 유의적 가정을 선택하거나 구축함\n③ 공정가치 회계추정치의 도출을 위해 기업 스스로의 가정을 적용했으나 관찰가능한 시장의 가정과 일관성이 없음\n④ 낙관적이거나 비관적으로 일정한 유형을 나타낼 수도 있는 점추정치의 선택","회계추정치 편의가능성 징후"],[11,"진","공주매독사","공정가치 회계추정치의 예\n540-A7 공주매독사\n① 활성 공개시장에서 거래되지 않는 복잡한 금융상품\n② 주식기준보상\n③ 매각 목적으로 보유 중인 자산이나 설비\n④ 독립된 당사자간에 금전적 대가없이 자산이나 부채의 교환을 수반하는 거래\n⑤ 영업권이나 무형자산 등 사업결합에서 취득한 자산과 부채","공정가치 예시"],[11,"진","충진판각회장소","일반적인 회계추정치의 예\n540-A6 소대회장재판감\n① 소송의 합의와 판결에 따른 비용\n② 대손충당금\n③ 회수가능성과 관련하여 불확실성이 있는 투자자산의 장부가액에 대한 충당금\n④ 장기계약의 향후 결과\n⑤ 재고자산의 진부화\n⑥ 판매보증의무\n⑦ 감가상각방법 및 자산의 내용연수","기타 추정치"],[12,"진","질왕 비용","소송과 배상청구를 파악하기 위한 감사절차\n501-9 왕비질\n① 경영진, 내부 법률고문 등 기업 내부의 다른 사람에게 질문함\n② 지배기구의 회의록 및 기업과 외부 법률고문간의 왕복문서를 검토함\n③ 법률비용 계정을 검토함","소송 식별"],[12,"진","작발 커대","외부 법률고문과 커뮤니케이션 절차\n501-10 작발/커요/금대\n① 경영진이 작성한 질의서를 감사인이 직접 발송하며,\n② 외부 법률고문이 감사인과 직접 커뮤니케이션하도록 요청하여야 한다.\n③ 법규 또는 관련 법률전문직 단체에 의해 외부 법률고문간의 직접적인 커뮤니케이션이 금지된\n경우에는, 대체적인 감사절차를 수행하여야 한다.","법률고문 커뮤 절차"],[12,"진","R평그밖","기업의 외부 법률고문과 직접 커뮤니케이션을 모색해야 하는 경우\n501-10 소르배/그밖존\n① 파악한 소송이나 배상청구에 중요왜곡표시위험(RMM)이 있다고 평가한 경우\n② 감사절차를 수행한 결과 그 밖의 중요한 소송이나 배상청구가 존재할 가능성이 있는 경우","외부법률고문 직접 커뮤니"],[12,"진","소추평가","외부 법률고문과 커뮤니케이션(일반질문서)\n501-A22 사가무\n① 외부 법률고문이 인지하고 있는 모든 소송과 배상청구 사항\n② 그 결과에 대한 평가\n③ 관련 비용 등 재무적 영향의 추정치","일반질문서"],[12,"진","소추평가 타당불부추","외부 법률고문과 커뮤니케이션(세부질문서)\n501-A22 목/가무/타추\n① 소송과 배상청구의 목록\n② 가능한 경우, 각 소송과 배상청구의 결과에 대한 경영진의 평가 및 관련 비용 등 재무적 영향에 대한 경영진의 추정치\n③ 경영진의 평가가 타당한지 외부 법률고문이 확인해주고 소송과 배상청구 목록이 불완전하거나 부정확하다고 판단되면 추가적인 정보를 감사인에게 제공해 줄 것을 요청하는 내용","세부질문서"],[12,"진","유복불","소송이나 배상청구의 예상되는 결과를 논의하기 위하여 기업의 외부 법률고문과 만날 필요가 있는 상황\n501-A24 유자차\n① 유의적 위험이 있는 사항이라고 결정한 경우\n② 사항이 복잡한 경우\n③ 경영진과 외부 법률고문 간에 의견의 불일치가 있는 경우(의견차이)","법률고문 직접 만남"],[12,"진","경질 외갱","소송과 배상청구의 감사보고서일까지의 감사증거 입수방법\n501-A25 경질/외갱\n① 소송과 배상청구의 진행상태에 대한 감사보고서일까지의 감사증거는 관련 사항을 다룰 책임\n이 있는 경영진(사내 법률고문 포함)에게 질문하여 입수할 수 있을 것이다.\n② 감사인은 경우에 따라 외부 법률고문으로부터 갱신된 정보를 입수하는 것이 필요할 수도 있을 것이다.","감사보고서일까지 소송 증거"],[12,"진","실모공 회공","소송과 배상청구 관련 서면진술에 포함하여야 하는 내용\n501-12 실모공/회공\n① 경영진이 재무제표를 작성할 때 그 영향을 고려해야 할 알려진 실제의 또는 발생가능한 소송과 배상청구를 감사인에게 모두 공개하였음\n② 해당 재무보고체계에 따라 회계처리하고 공시하였음","소송 서면진술"],[13,"진","모알못 공은조","특수관계자가 감사의 고유한계를 증가시키는 이유\n550-6 공기구경\n① 특수관계는 경영진에 의한 공모, 은폐, 조작의 기회를 더 많이 제공할 수 있음\n② 특히 해당 재무보고체계에서 특수관계자에 관한 요구사항이 없는 경우, 경영진이 특수관계 및 특수관계자 거래를 모두 알지 못할 수 있음","특수관계자 한계"],[13,"진","복시정","특수관계자와의 거래가 중요왜곡표시위험이 높은 경우\n550-2 광복시계 템거래\n① 특수관계자들은 그 성격상 광범위하고 복잡한 관계 및 구조를 통해 사업을 수행하고 이에 따라 특수관계자 거래의 복잡성이 증가하는 경우\n② 특수관계자 거래가 정상적인 시장의 계약조건 하에서 수행되지 않을 경우(ex. 특수관계자 거래가 대가의 교환 없이 수행될 경우)\n③ 정보시스템이 해당 기업과 그 특수관계자들 간의 거래와 잔액을 식별하거나 요약하는 데 효과적이지 않을 경우","특관 RMM 높은이유"],[13,"진","R식평대","특수관계자 및 특수관계자 거래 또는 잔액과 관련한 감사인의 책임\n550-3 R식평대\n감사인은 특수관계 및 특수관계자 거래 또는 잔액을 해당 재무보고체계의 요구사항에 따라 적합하게 회계처리 하지 않거나 공시하지 않음으로써 발생하는 중요왜곡표시위험(RMM)을 식별하고, 평가하며 이에 대응하기 위한 감사절차를 수행할 책임이 있다","특관 거래에 대한 감사인 책임"],[13,"진","이문공","특수관계자 및 특수관계자 거래와 연관된 위험평가절차\n550-12~17 이문공\n① 기업의 특수관계 및 특수관계자 거래에 대한 이해\n② 기록 또는 문서의 검토에 있어 특수관계자 정보에 대한 주의 유지\n③ 업무팀의 특수관계자 정보의 공유","특관 위험평가"],[13,"진","신성거형목","기업의 특수관계 및 특수관계자 거래에 대한 이해 중 경영진에게 질문할 사항\n550-13 원격거래\n① 특수관계자들의 신원\n② 기업과 특수관계자들 간 관계의 성격\n③ 기업이 해당 기간 중에 특수관계자와 거래를 체결했는지 여부, 만약 그렇다면 그러한 거래의 형태와 목적","특관 이해 사항"],[13,"진","은법주지기기","기록 또는 문서의 검토에 있어 특수관계자 정보에 대한 주의 유지\n550-15 주지확문/관성\n① 주주총회의사록과 지배기구(회의)의사록\n② 감사절차의 일부로서 입수한 은행의 확인서(은행조회서)나 법률문제에 관한 확인서(은행조회서나 변호사조회서)\n③ 해당 기업의 상황에서 감사인이 필요하다고 생각하는 기타의 기록이나 문서\n기업의 정상적인 사업과정을 벗어난 유의적 거래를 식별한 경우, 감사인은 경영진에게 다음 사항에 대하여 질문하여야 한다\n• 특수관계자가 관여될 가능성\n• 해당 거래의 성격","특관 식별 검사 문서"],[13,"진","실절고추커 (절: 추새식공실)","이전에 식별 또는 공개되지 않았던 특수관계자 또는 유의적인 특수관계자 거래의 식별\n550-22 실질고추커요\n① 업무팀의 다른 구성원에게 관련 정보를 신속하게 커뮤니케이션을 함\n② 해당 재무보고체계에서 특수관계자에 관한 요구사항을 정하고 있는 경우 다음의 절차를 수행\n함\n• 감사인의 추가적인 평가를 위해 경영진에게 새로 식별된 특수관계자와의 모든 거래를 식별\n할 것으로 요청함\n• 특수관계 및 특수관계자 거래에 대한 기업의 통제가 해당 특수관계나 특수관계자거래를 식별하거나 공개하는 데 실패한 이유를 질문함\n③ 새로 식별된 특수관계자 또는 이들과의 유의적인 거래에 대하여 적합한 실증감사절차를 수행함\n④ 만약 경영진의 미공개가 고의적인 경우에는, 해당 감사에 대한 시사점을 평가함\n⑤ 경영진이 이전에 식별하지 못하였거나 감사인에게 공개하지 않았던 다른 특수관계자 및 이들과의 유의적 거래가 존재할 위험을 다시 고려하고, 필요에 따라 추가적인 감사절차를 수행함","새로운 특관 식별시"],[13,"진","계검평(부횡일회)  권승","기업의 정상적인 사업과정을 벗어난 유의적인 특수관계자 거래를 식별한 경우\n550-23 사거리/승인\n① 근거 계약이나 약정이 존재한다면 이를 검사하여 다음 사항을 평가한다\n• 해당 거래의 사업상 이유에 비추어 볼 때, 그러한 거래가 부정한 재무보고를 행하거나 자산\n의 유용을 은폐하기 위해 체결되었을 것임을 나타내는지 여부\n• 해당 거래의 조건이 경영진의 설명과 일관성이 있는지 여부\n• 해당 거래가 해당 재무보고체계에 따라 적합하게 회계처리되고 공시되었는지 여부\n② 해당 거래가 적합하게 권한이 부여되고 승인되었다는 감사증거를 입수함","정상벗어난 거래"],[13,"진","신관거 적회공","특수관계자 및 특수관계가 거래에 대한 서면진술 내용\n550-26 신모공 회공\n① 경영진(적절한 경우 지배기구 포함)은 그들이 알고 있는 기업의 특수관계자들의 신원과 모든 특수관계 및 특수관계자 거래의 내용을 감사인에게 모두 공개하였음\n② 경영진(적절한 경우 지배기구 포함)은 이러한 관계 및 거래들을 해당 재무보고체계에 따라 적합하게 회계처리하고 공시하였음","서면진술"],[14,"진","영정 은행 위법","감사대상회사의 법규위반을 발견하는데 고유한계의 잠재적 영향이 큰 이유 250-5 영은위법\n① 전형적으로 재무제표에 영향을 미치지 않고 기업의 재무보고와 관련된 정보시스템에 의해 포착되지 않는, 주로 기업의 영업활동 측면과 관련된 법규가 다수 존재한다\n② 법규위반은 공모, 위조, 거래의 고의적인 기재 누락, 경영진의 통제무력화 또는 감사인에 대한 의도적인 허위진술 등을 은폐하기 위한 목적으로 설계된 행위들과 관련된 것일 수 있다\n③ 특정 행위가 위반에 해당되는지 여부는 궁극적으로 법원 또는 기타 적합한 판결기관이 결정한 사항이다","법규위반 한계"],[13,"진","조부장/가천절(개천절)","특관자 거래가 독립된 당사자 간의 통용되는 조건과 동등한 조건으로 수행되었다는 경영진 주장 입수\n550-24 조부장/가천절(개천절)\n① 경영진이 감사인에게 입증하는 절차\n• 해당 특수관계자 거래의 조건을 하나 이상의 특수관계가 아닌 당사자와의 동일하거나 유사한 거래의 조건과 비교함\n• 해당 거래에 대한 시장가치의 결정 및 시장계약조건의 확인을 위하여 외부전문가를 활용함\n• 해당 거래의 조건을 공개시장의 대체로 유사한 거래에 대하여 알려진 시장조건과 비교함\n② 감사인이 경영진 주장을 평가하는 절차\n• 해당 주장의 근거가 되는 유의적 가정의 합리성을  모집단의 표본단위의 수\n⑥ 감사인이 중요왜곡표시위험을 높게 평가함\n⑦ 동일한 경영진주장에 대한 다른 실증절차의 적용을 증가시킴","표본규모"],[16,"진","체무층금","통계적 표본추출방법\n530-보론4 체무층\n통계적 표본추출방법\n• 체계적 추출법\n• 무작위 추출법\n• 층화 추출법","통계적 추출"],[16,"진","모선동 어선다선","무착위추출법의 요건\n530-보론4 모선동 어선다선\n① 모집단의 모든 항목(표본단위)이 선택될 확률이 동일하다\n② 어떤 한 항목의 선택이 다른 항목의 선택에 영향을 미치지 않는다","무작위 요건"],[16,"진","변규감소","모집단을 계층화함으로써 얻을 수 있는 효익\n530-보론1 변줄수줄 \n계층화를 통해 각 계층 내 항목의 변동성을 줄임으로써 표본위험의 증가 없이 표본수를 줄일 수 있다","계층화 이유"],[16,"진","내유간상","체계적 추출법을 사용할 수 있는 모집단의 상황\n530-보론4 내유간상\n모집단의 표본단위에 내재된 특정한 유형이 표본추출 간격과 상응하는 방식으로 구성되어 있\n지 않는 상황일 때 체계적 추출법을 사용할 수 있다","체계적 유의점"],[16,"진","구임","비통계적 표본추출방법\n• 구획 추출법\n• 임의 추출법","비통계적 추출"],[16,"진","모연유 모다다","구획추출법을 표본감사에서 사용할 수 없는 이유\n530-보론4 모연유 모다다\n대부분의 모집단은 연속된 항목들끼리 서로 유사한 특성을 가지며 모집단의 다른 부분에 있는 항목들은 다른 특징을 가지도록 구성되어 있기 때문에 전체 모집단에 대하여 유효한 추론을 하기에는 적합하지 않다","구획추출 불가"],[16,"진","큰반 대민 없계 특파 영음","금액가중확률 표본감사의 기대 효과\n530-보론1 큰출수줄\n잔액이 큰 항목의 추출기회를 높임으로써 이들 항목에 감사가 집중되도록 하고 감사대상 표본 수를 줄이게 하는 효과\n금액가중확률 표본감사가 효과적인 경우\n음거단속\n① 계정잔액이 0 또는 음(-)의 금액을 갖지 않을 떄\n② 상대적으로 오류액이 거의 없거나 적은 것으로 예상되는 계정잔액을 검증할 떄(포아송분포와 그 특징이 같다)\n③ 개별항목의 단위가 비교적 크고, 또한 금액이 큰 거래에 대해서는 반드시 표본항목으로 추출하고자 할 때\n④ 자산의 신규쥐득과 같이 거래의 속성을 파악하기 어려울 때","금액비례 효과적"],[16,"진","변투표","세부테스트에서 최선의 추정치\n530-A22 투변합\n세부테스트에 있어서, 모집단의 왜곡표시에 대한 감사인의 최선의 추정치는 투영된 왜곡표시와 변이왜곡표시의 합이다. 투영된 왜곡표시와 변이왜곡표시를 합한 것이 허용왜곡표시를 초과한다면, 표본은 테스트된 모집단에 관한 결론에 합리적인 근거를 제공하지 못한다","오류 추정치"],[16,"진","조수구달","표본감사가 모집단에 대한 결론에 합리적 근거를 제공하지 못하는 경우\n530-A23 조수구달\n① 경영진에게 식별된 왜곡표시 및 잠재적인 추가 왜곡표시에 대하여 조사를 수행하고 필요한 수정을 하도록 요구함\n② 요구되는 확신을 가장 잘 달성할 수 있도록 추가감사절차의 성격, 시기 및 범위를 조정함","근거 미제공 시"],[17,"진","구작인권","재무제표 승인일\n560-5 구작인권\n재무제표를 구성하는 모든 내용이 작성이 완료되고 인정된 권한을 가진 기구(이사회)가 해당\n재무제표에 대하여 책임을 진다고 확인한 날","F/S 승인일"],[17,"진","기영고알","감사보고서일\n560-5 까발알고\n감사인과 경영진 간의 책임의 한계를 구분짓는 하나의 기준일로서 그 날까지 발생한 사건에 대하여 감사인이 알게된 사건과 거래의 영향을 감사인이 고려하였다는 것을 감사보고서 이용자들에게 알리는 것","감사보고서일"],[17,"진","이질중회","재무제표일 후 감사보고서일까지 발생한 사건에 대한 후속사건 감사절차\n560-7 이질중회\n① 후속사건에 대한 경영진의 절차 이해\n② 후속사건에 대하여 경영진에게 질문\n③ 기업의 최근 후속 중간재무제표 열람\n④ 주요 회의록 열람",
